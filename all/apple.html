<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前往 Apple 官网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0b0710;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态深邃背景 —— 流动星云 + 网格 */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(75, 100, 255, 0.18) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(200, 130, 255, 0.15) 0%, transparent 35%),
                        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.02) 0px, rgba(255, 255, 255, 0.02) 2px, 
                                                  transparent 2px, transparent 8px),
                        linear-gradient(145deg, #0a051e 0%, #150e2a 100%);
            z-index: -2;
        }

        /* 浮动的光点层 */
        body::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="1.5" fill="rgba(180,200,255,0.2)"/><circle cx="45" cy="30" r="2" fill="rgba(140,120,255,0.15)"/><circle cx="25" cy="55" r="1.2" fill="rgba(220,160,255,0.25)"/></svg>');
            background-size: 80px 80px;
            opacity: 0.6;
            animation: floatDots 40s linear infinite;
            z-index: -1;
        }

        @keyframes floatDots {
            0% { background-position: 0 0; }
            100% { background-position: 160px 160px; }
        }

        /* 主卡片 — 半透明磨砂 + 微光边框 */
        .gateway {
            background: rgba(18, 20, 38, 0.5);
            backdrop-filter: blur(14px) saturate(180%);
            -webkit-backdrop-filter: blur(14px) saturate(180%);
            border-radius: 5rem;
            padding: 3.5rem 5rem;
            border: 1px solid rgba(140, 160, 255, 0.25);
            box-shadow: 0 40px 70px -15px rgba(0, 0, 0, 0.9),
                        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                        0 0 40px rgba(90, 100, 255, 0.2);
            transition: box-shadow 0.3s;
            position: relative;
            z-index: 10;
        }

        .gateway:hover {
            box-shadow: 0 50px 90px -15px #1f1b4e,
                        0 0 0 1px rgba(180, 200, 255, 0.3) inset,
                        0 0 60px #3a3c9e;
        }

        /* 按钮 — 霓虹质感 + 双重光晕 */
        .warp-button {
            position: relative;
            background: linear-gradient(125deg, #2a2e6d, #1f194b);
            color: #f0f2ff;
            border: none;
            padding: 1.5rem 4rem;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            border-radius: 4rem;
            cursor: pointer;
            box-shadow: 0 15px 25px -5px #0e0c2c,
                        0 0 0 2px rgba(120, 140, 255, 0.4) inset,
                        0 0 15px #4d4eff;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            overflow: hidden;
            z-index: 2;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.4);
        }

        /* 按钮动态流光 */
        .warp-button::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -60%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg at 50% 50%, 
                        transparent 0deg, 
                        rgba(255, 255, 255, 0.15) 30deg, 
                        rgba(200, 220, 255, 0.4) 60deg, 
                        transparent 100deg);
            animation: rotateGlow 6s linear infinite;
            z-index: -1;
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .warp-button:hover {
            transform: scale(1.07) translateY(-4px);
            background: linear-gradient(125deg, #353b8c, #2a1f70);
            box-shadow: 0 25px 35px -5px #1f1b55,
                        0 0 0 2px rgba(200, 220, 255, 0.8) inset,
                        0 0 35px #7a7dff;
        }

        .warp-button:active {
            transform: scale(0.96) translateY(3px);
            box-shadow: 0 10px 15px -3px #14113b,
                        0 0 0 2px rgba(150, 170, 255, 0.6) inset;
        }

        /* 火箭图标区域 — 现在放 SVG 苹果标志 */
        .rocket-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 0 6px #b0c8ff);
            transition: transform 0.25s ease;
        }

        .warp-button:hover .rocket-icon {
            transform: translate(6px, -4px) rotate(10deg);
        }

        /* SVG 图标大小控制 */
        .apple-svg {
            width: 2.2rem;
            height: 2.2rem;
            display: block;
        }

        /* 点击触发的跃迁动画 — 华丽消失 */
        .warp-button.warp-out {
            animation: hyperjump 0.7s cubic-bezier(0.6, 0.1, 0.3, 1) forwards;
            pointer-events: none;
        }

        @keyframes hyperjump {
            0% {
                transform: scale(1) translateY(0) rotate(0deg);
                opacity: 1;
                filter: blur(0px);
                box-shadow: 0 15px 25px -5px #0e0c2c, 0 0 0 2px rgba(120,140,255,0.4) inset, 0 0 15px #4d4eff;
            }
            20% {
                transform: scale(1.3) translateY(-40px) rotate(4deg);
                opacity: 1;
                filter: blur(1px);
                box-shadow: 0 35px 45px 0px #3f3590, 0 0 0 3px #b0c0ff inset, 0 0 50px #8f9cff;
            }
            50% {
                transform: scale(0.9) translateY(30px) rotate(-8deg) skewX(5deg);
                opacity: 0.7;
                filter: blur(4px);
                box-shadow: 0 15px 30px -5px #1f1a5e, 0 0 0 3px #c0caff inset, 0 0 70px #6366f0;
            }
            80% {
                transform: scale(0.4) translateY(150px) rotate(-20deg);
                opacity: 0.2;
                filter: blur(10px);
                box-shadow: 0 0 20px 10px #4d41b3;
            }
            100% {
                transform: scale(0) translateY(300px) rotate(-40deg);
                opacity: 0;
                filter: blur(15px);
                box-shadow: 0 0 30px 20px #5b4cff;
            }
        }

        /* 下方小字 更精致 */
        .hint {
            text-align: center;
            margin-top: 2rem;
            color: #a6b0e6;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.7;
            transition: opacity 0.3s, text-shadow 0.3s;
            text-shadow: 0 0 10px rgba(130, 140, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .gateway:hover .hint {
            opacity: 1;
            text-shadow: 0 0 15px #99aaff;
        }

        /* 装饰性边缘光点 */
        .gateway::after {
            content: "";
            position: absolute;
            top: -2px;
            left: 15%;
            width: 70%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #aab9ff, #7f96ff, transparent);
            border-radius: 50%;
            filter: blur(2px);
            opacity: 0.6;
            animation: borderPulse 3s infinite;
        }

        @keyframes borderPulse {
            0% { opacity: 0.3; width: 50%; left: 25%; }
            50% { opacity: 1; width: 80%; left: 10%; }
            100% { opacity: 0.3; width: 50%; left: 25%; }
        }

        /* 响应式优化 */
        @media (max-width: 550px) {
            .gateway {
                padding: 2rem 2rem;
                border-radius: 3rem;
            }
            .warp-button {
                padding: 1.2rem 2.2rem;
                font-size: 1.8rem;
            }
            .apple-svg {
                width: 1.8rem;
                height: 1.8rem;
            }
        }

        /* 预加载字体优雅降级 */
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,500;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="gateway">
        <!-- 跃迁按钮：文字改为“前往 Apple 官网”，图标用 SVG 苹果标志 -->
        <button class="warp-button" id="warpBtn">
            <span>前往 Apple 官网</span>
            <span class="rocket-icon">
                <!-- SVG 苹果标志，适配所有平台 -->
                <svg class="apple-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16.5 4.5C17.2 3.6 17.7 2.4 17.6 1.2C16.5 1.3 15.2 2 14.5 2.9C13.8 3.8 13.2 5 13.4 6.2C14.6 6.3 15.8 5.5 16.5 4.5Z" fill="white"/>
                    <path d="M19.8 12.8C19.8 10.7 21.3 9 23 8.2C21.9 6.5 19.8 5.7 18 5.7C16.1 5.7 14.5 6.7 13.5 6.7C12.4 6.7 11 5.8 9.4 5.8C6.9 5.8 4.5 7.5 3 10.2C1.4 13.3 2.1 18.1 4 20.8C5 21.9 6.1 23 7.6 23C9 23 9.6 22.2 11.3 22.2C13 22.2 13.6 23 15 23C16.5 23 17.7 21.8 18.7 20.7C19.5 19.8 20.1 18.8 20.4 17.7C18.4 16.9 16.9 15 16.9 12.8H19.8Z" fill="white"/>
                </svg>
            </span>
        </button>
        <div class="hint">
            <span>✦ 点击进入 Apple 官网 ✦</span>
            <!-- 小字旁边也加一个迷你 SVG 苹果标志，保持视觉统一 -->
            <svg class="apple-svg" style="width: 1rem; height: 1rem;" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M16.5 4.5C17.2 3.6 17.7 2.4 17.6 1.2C16.5 1.3 15.2 2 14.5 2.9C13.8 3.8 13.2 5 13.4 6.2C14.6 6.3 15.8 5.5 16.5 4.5Z" fill="#a6b0e6"/>
                <path d="M19.8 12.8C19.8 10.7 21.3 9 23 8.2C21.9 6.5 19.8 5.7 18 5.7C16.1 5.7 14.5 6.7 13.5 6.7C12.4 6.7 11 5.8 9.4 5.8C6.9 5.8 4.5 7.5 3 10.2C1.4 13.3 2.1 18.1 4 20.8C5 21.9 6.1 23 7.6 23C9 23 9.6 22.2 11.3 22.2C13 22.2 13.6 23 15 23C16.5 23 17.7 21.8 18.7 20.7C19.5 19.8 20.1 18.8 20.4 17.7C18.4 16.9 16.9 15 16.9 12.8H19.8Z" fill="#a6b0e6"/>
            </svg>
        </div>
    </div>

    <script>
        (function() {
            const btn = document.getElementById('warpBtn');
            const targetUrl = 'https://www.apple.com.cn/';
            let isWarping = false;

            btn.addEventListener('click', function(e) {
                e.preventDefault();

                if (isWarping) return;

                btn.classList.add('warp-out');
                isWarping = true;

                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 700);
            });
        })();
    </script>
</body>
</html>
