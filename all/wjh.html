<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💢 狂炸连击·核能拆弹 💢 | 极限爽感 一秒引爆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #0a0000, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', 'Segoe UI', 'Courier New', monospace;
            overflow: hidden;
            cursor: crosshair;
            position: relative;
        }

        /* 动态火焰光晕 */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: repeating-radial-gradient(circle at 30% 40%, rgba(255, 60, 0, 0.2) 0px, rgba(255, 0, 0, 0) 100px);
            animation: firePulse 0.8s infinite alternate;
            pointer-events: none;
        }
        @keyframes firePulse {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.9; transform: scale(1.05); }
        }

        /* 主游戏容器 - 核爆风格 */
        .game-core {
            position: relative;
            width: 92%;
            max-width: 820px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 70px;
            padding: 18px 20px 30px;
            box-shadow: 0 0 60px rgba(255, 40, 0, 0.9), inset 0 0 25px rgba(255, 80, 0, 0.5);
            border: 2px solid #ff4d2e;
            z-index: 5;
            animation: borderRage 0.12s infinite alternate;
        }
        @keyframes borderRage {
            0% { border-color: #ff2a0a; box-shadow: 0 0 30px #ff2a0a; }
            100% { border-color: #ff7a3a; box-shadow: 0 0 65px #ff7a3a; }
        }

        /* 顶栏 狂躁状态 */
        .top-rage {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }
        .bomb-zone {
            background: #150b07cc;
            border-radius: 60px;
            padding: 6px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(8px);
            border-left: 5px solid #ff4d2e;
        }
        .bomb-icon {
            font-size: 4rem;
            filter: drop-shadow(0 0 12px #ff4400);
            animation: bombVibrate 0.08s infinite alternate;
        }
        @keyframes bombVibrate {
            from { transform: rotate(-1deg) translateX(-1px); }
            to { transform: rotate(1deg) translateX(1px); }
        }
        .status-text {
            font-size: 1.2rem;
            font-weight: bold;
            background: #000000bb;
            padding: 6px 18px;
            border-radius: 60px;
            color: #ff8550;
            text-shadow: 0 0 8px #ff3300;
            letter-spacing: 2px;
        }
        .combo-nuke {
            background: linear-gradient(135deg, #ff3a00, #ff9f3a);
            padding: 6px 20px;
            border-radius: 50px;
            text-align: center;
            box-shadow: 0 0 25px #ff6600;
            animation: comboPulse 0.2s infinite alternate;
        }
        @keyframes comboPulse {
            from { box-shadow: 0 0 12px #ff8800; }
            to { box-shadow: 0 0 35px #ff3300; }
        }
        .combo-label {
            font-size: 0.7rem;
            font-weight: bold;
            color: #ffe0a3;
        }
        .combo-number {
            font-size: 2.4rem;
            font-weight: 900;
            color: #fff3cc;
            text-shadow: 0 0 12px #ff5500;
            line-height: 1;
        }

        /* 双数据面板 */
        .stats-panel {
            display: flex;
            gap: 15px;
            margin: 12px 0;
        }
        .stat-card {
            background: #02020fcc;
            border-radius: 50px;
            padding: 8px 15px;
            flex: 1;
            text-align: center;
            backdrop-filter: blur(8px);
            border: 1px solid #ff7a4e;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #ffb47a;
        }
        .stat-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffe0b0;
            text-shadow: 0 0 5px #ff6622;
            line-height: 1;
        }
        .time-value {
            color: #ff5e2a;
        }
        .danger-time {
            animation: timeBlink 0.08s infinite alternate;
            color: #ff2200 !important;
            text-shadow: 0 0 12px red !important;
        }
        @keyframes timeBlink {
            from { opacity: 1; }
            to { opacity: 0.6; text-shadow: 0 0 20px #ff4400; }
        }

        /* 导火索 - 暴燃条 */
        .fuse-rage {
            margin: 8px 0 18px;
        }
        .fuse-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            font-weight: bold;
            color: #ffaa66;
            margin-bottom: 6px;
        }
        .fuse-track {
            background: #2f1c0c;
            border-radius: 40px;
            height: 22px;
            overflow: hidden;
            box-shadow: inset 0 0 6px #000, 0 0 12px #ff5e00;
        }
        .fuse-burn {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ffcc66, #ff3a00, #ff0000);
            border-radius: 40px;
            transition: width 0.02s linear;
            box-shadow: 0 0 20px #ff7700;
        }

        /* 谜题区 - 巨大算式 */
        .puzzle-zone {
            background: #0a0c20dd;
            border-radius: 65px;
            padding: 20px 15px;
            margin: 15px 0;
            text-align: center;
            border: 2px solid #ff8844cc;
            box-shadow: 0 0 30px rgba(255, 70, 0, 0.7), inset 0 0 12px rgba(0,0,0,0.5);
        }
        .math-question {
            font-size: 3.2rem;
            font-weight: 900;
            background: #000000cc;
            display: inline-block;
            padding: 12px 28px;
            border-radius: 70px;
            color: #fff3cf;
            text-shadow: 0 0 10px #ff884d, 0 0 3px white;
            letter-spacing: 5px;
            font-family: 'Courier New', monospace;
            margin-bottom: 20px;
        }

        /* 三根致命引线 - 巨大爽按区 */
        .wire-row {
            display: flex;
            gap: 22px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .wire-btn {
            flex: 1;
            min-width: 130px;
            background: #141e2a;
            border: none;
            border-radius: 70px;
            padding: 22px 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.04s linear;
            box-shadow: 0 12px 0 #00000088;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }
        .wire-btn:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #00000088;
        }
        .wire-color-tag {
            font-size: 1rem;
            background: #000000aa;
            padding: 5px 20px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            font-weight: bold;
        }
        .wire-value {
            font-size: 3rem;
            font-weight: 900;
            background: #000000aa;
            padding: 8px 20px;
            border-radius: 70px;
            min-width: 100px;
            text-shadow: 0 0 8px white;
        }
        .wire-red { background: linear-gradient(145deg, #e73c24, #a01306); border-bottom: 6px solid #ffaa88; }
        .wire-blue { background: linear-gradient(145deg, #2f6fd0, #0f3b70); border-bottom: 6px solid #7ac4ff; }
        .wire-yellow { background: linear-gradient(145deg, #f0b32a, #b8740a); border-bottom: 6px solid #ffe6aa; }
        .wire-btn:hover { filter: brightness(1.1); transform: scale(1.02); box-shadow: 0 11px 0 #00000088; }

        /* 控制区 */
        .action-bar {
            display: flex;
            justify-content: center;
            margin: 20px 0 12px;
        }
        .restart-btn {
            background: #2a1a2f;
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 12px 34px;
            border-radius: 60px;
            color: #ffc285;
            font-family: monospace;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 8px 0 #120b12;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .restart-btn:active { transform: translateY(4px); box-shadow: 0 3px 0 #120b12; }
        .message-box {
            text-align: center;
            margin-top: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            min-height: 58px;
            color: #ffcf9a;
            text-shadow: 0 0 6px #ff4400;
            background: #000000aa;
            border-radius: 60px;
            padding: 10px;
            backdrop-filter: blur(8px);
        }

        /* 特效canvas */
        #fxCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }
        .screen-flash {
            animation: flashBang 0.12s ease-out;
        }
        @keyframes flashBang {
            0% { background-color: rgba(255, 200, 100, 0.9); }
            100% { background-color: rgba(255, 100, 0, 0); }
        }
        .shake-cam {
            animation: shake 0.2s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }
        @keyframes shake {
            0% { transform: translate(0,0);}
            20% { transform: translate(-4px, 2px);}
            40% { transform: translate(4px, -2px);}
            60% { transform: translate(-3px, 2px);}
            80% { transform: translate(3px, -3px);}
            100% { transform: translate(0,0);}
        }
        .disabled-click {
            pointer-events: none;
            opacity: 0.6;
        }
        @media (max-width: 620px) {
            .wire-btn { min-width: 100px; }
            .wire-value { font-size: 2rem; }
            .math-question { font-size: 1.9rem; }
            .stat-value { font-size: 1.7rem; }
            .combo-number { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="game-core" id="gameCore">
    <div class="top-rage">
        <div class="bomb-zone">
            <div class="bomb-icon" id="bombIcon">💣⚡🔥</div>
            <div class="status-text" id="statusText">剪错了/不剪是GAY</div>
        </div>
        <div class="combo-nuke">
            <div class="combo-label">逃过？劫</div>
            <div class="combo-number" id="comboNumber">0</div>
        </div>
    </div>

    <div class="stats-panel">
        <div class="stat-card">
            <div class="stat-label">用不了的积分</div>
            <div class="stat-value" id="scoreValue">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">神秘倒计时</div>
            <div class="stat-value time-value" id="timerValue">3.0</div>
        </div>
    </div>

    <div class="fuse-rage">
        <div class="fuse-header">
            <span>🔥 导火索暴燃 🔥</span>
            <span id="burnPercent">100%</span>
        </div>
        <div class="fuse-track">
            <div class="fuse-burn" id="fuseBurn" style="width: 100%;"></div>
        </div>
    </div>

    <div class="puzzle-zone">
        <div class="math-question" id="questionText">? ? ?</div>
        <div class="wire-row">
            <button class="wire-btn wire-red" id="wireRed">
                <span class="wire-color-tag">🔴</span>
                <span class="wire-value" id="redVal">??</span>
            </button>
            <button class="wire-btn wire-blue" id="wireBlue">
                <span class="wire-color-tag">🔵</span>
                <span class="wire-value" id="blueVal">??</span>
            </button>
            <button class="wire-btn wire-yellow" id="wireYellow">
                <span class="wire-color-tag">🟡</span>
                <span class="wire-value" id="yellowVal">??</span>
            </button>
        </div>
    </div>

    <div class="action-bar">
        <button class="restart-btn" id="restartBtn">我!不!服！</button>
    </div>
    <div class="message-box" id="messageBox">emeizei</div>
</div>
<canvas id="fxCanvas"></canvas>

<script>
    (function() {
        // ---------- 极致爽感参数 ----------
        let currentScore = 0;
        let currentCombo = 0;
        let timeLeft = 3.0;            // 初始仅3秒！刺激！
        let gameActive = true;
        let timerInterval = null;
        let currentCorrectAnswer = null;
        let currentOptions = [];
        
        // 动态时间控制
        const MAX_TIME = 4.2;
        const MIN_TIME = 2.2;
        let successBonus = -0.1;        // 每次成功增加0.32秒，连击高时减少
        
        // DOM 元素
        const scoreSpan = document.getElementById('scoreValue');
        const timerSpan = document.getElementById('timerValue');
        const comboNumberSpan = document.getElementById('comboNumber');
        const fuseFill = document.getElementById('fuseBurn');
        const burnPercentSpan = document.getElementById('burnPercent');
        const questionTextDiv = document.getElementById('questionText');
        const messageBox = document.getElementById('messageBox');
        const bombIconDiv = document.getElementById('bombIcon');
        const statusTextSpan = document.getElementById('statusText');
        
        const wireRed = document.getElementById('wireRed');
        const wireBlue = document.getElementById('wireBlue');
        const wireYellow = document.getElementById('wireYellow');
        const redValSpan = document.getElementById('redVal');
        const blueValSpan = document.getElementById('blueVal');
        const yellowValSpan = document.getElementById('yellowVal');
        
        // ---------- 狂野粒子系统 ----------
        const canvas = document.getElementById('fxCanvas');
        let ctx = canvas.getContext('2d');
        let particles = [];
        let animFrame = null;
        let canvasRect = { width: 0, height: 0 };
        
        function resizeCanvas() {
            const rect = document.querySelector('.game-core').getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            canvas.style.width = `${rect.width}px`;
            canvas.style.height = `${rect.height}px`;
            canvasRect = { width: rect.width, height: rect.height };
        }
        window.addEventListener('resize', () => resizeCanvas());
        
        class Particle {
            constructor(x, y, vx, vy, size, color, life, gravity = 0.2) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.size = size; this.color = color; this.life = life; this.maxLife = life;
                this.gravity = gravity;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.life -= 4;
                return this.life > 0;
            }
            draw(ctx) {
                const alpha = Math.min(1, this.life / this.maxLife);
                ctx.globalAlpha = alpha * 0.9;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 7;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        function addExplosion(centerX, centerY, color1, color2, count=48, sizeMin=3, sizeMax=9) {
            for(let i=0;i<count;i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 10 + 4;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed - 2;
                let size = Math.random() * (sizeMax-sizeMin) + sizeMin;
                let color = Math.random() > 0.5 ? color1 : color2;
                particles.push(new Particle(centerX, centerY, vx, vy, size, color, 65 + Math.random()*45, 0.22));
            }
        }
        
        function addGoldenBlast(x, y) {
            for(let i=0;i<70;i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 12 + 5;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed - 2.5;
                let size = Math.random() * 6 + 2;
                let hue = 35 + Math.random() * 50;
                let color = `hsl(${hue}, 100%, 60%)`;
                particles.push(new Particle(x, y, vx, vy, size, color, 75, 0.25));
            }
        }
        
        function addBoomExplode(x, y) {
            for(let i=0;i<95;i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 13 + 5;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed - 2;
                let size = Math.random() * 8 + 2;
                let color = `hsl(${Math.random() * 30 + 350}, 95%, 58%)`;
                particles.push(new Particle(x, y, vx, vy, size, color, 95, 0.3));
            }
        }
        
        function animateParticles() {
            if(!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.update());
            for(let p of particles) p.draw(ctx);
            if(particles.length > 0 || animFrame) {
                animFrame = requestAnimationFrame(animateParticles);
            } else {
                if(animFrame) cancelAnimationFrame(animFrame);
                animFrame = null;
            }
        }
        
        function triggerSuccessEffect() {
            const core = document.getElementById('gameCore');
            core.classList.add('screen-flash');
            setTimeout(() => core.classList.remove('screen-flash'), 120);
            bombIconDiv.style.transform = 'scale(1.25)';
            setTimeout(() => bombIconDiv.style.transform = '', 130);
            if(canvasRect.width) {
                let cx = canvasRect.width * 0.5;
                let cy = canvasRect.height * 0.45;
                addGoldenBlast(cx, cy);
                addExplosion(cx, cy, '#FFD966', '#FFA047', 40, 3, 8);
                if(!animFrame && particles.length) animateParticles();
            }
        }
        
        function triggerFailEffect() {
            const core = document.getElementById('gameCore');
            core.classList.add('shake-cam');
            setTimeout(() => core.classList.remove('shake-cam'), 280);
            bombIconDiv.innerHTML = '💥💀💥';
            if(canvasRect.width) {
                let cx = canvasRect.width * 0.5;
                let cy = canvasRect.height * 0.5;
                addBoomExplode(cx, cy);
                addExplosion(cx, cy, '#FF2A00', '#9B1A00', 70, 4, 11);
                if(!animFrame && particles.length) animateParticles();
            }
        }
        
        // ---------- 游戏核心逻辑 ----------
        function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        
        function generateArithmetic() {
            let mode = randomInt(1, 3);
            let a, b, correct;
            if(mode === 1) {
                a = randomInt(2, 28);
                b = randomInt(2, 28);
                correct = a + b;
                if(correct > 99) { a = randomInt(5,22); b = randomInt(5,22); correct = a+b; }
                return { q: `${a} + ${b} = ?`, ans: correct };
            } else if(mode === 2) {
                a = randomInt(12, 48);
                b = randomInt(1, a-2);
                correct = a - b;
                return { q: `${a} - ${b} = ?`, ans: correct };
            } else {
                a = randomInt(2, 12);
                b = randomInt(2, 10);
                correct = a * b;
                if(correct > 99) { a = randomInt(2,8); b = randomInt(2,8); correct = a*b; }
                return { q: `${a} × ${b} = ?`, ans: correct };
            }
        }
        
        function generateDistractors(correct) {
            let d1 = correct + randomInt(-7, 7);
            let d2 = correct + randomInt(-6, 8);
            if(d1 === correct) d1 = correct + (correct===0?1:-1);
            if(d2 === correct) d2 = correct + (correct>=99?-1:1);
            if(d1 === d2) d2 = d2 + (d2>correct? -1 : 1);
            d1 = Math.min(99, Math.max(0, d1));
            d2 = Math.min(99, Math.max(0, d2));
            return [d1, d2];
        }
        
        function refreshPuzzle() {
            const { q, ans } = generateArithmetic();
            currentCorrectAnswer = ans;
            questionTextDiv.innerText = q;
            let [w1, w2] = generateDistractors(ans);
            let opts = [ans, w1, w2];
            for(let i=opts.length-1;i>0;i--) {
                let j = Math.floor(Math.random()*(i+1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            currentOptions = opts;
            redValSpan.innerText = currentOptions[0];
            blueValSpan.innerText = currentOptions[1];
            yellowValSpan.innerText = currentOptions[2];
            wireRed.dataset.value = currentOptions[0];
            wireBlue.dataset.value = currentOptions[1];
            wireYellow.dataset.value = currentOptions[2];
        }
        
        function updateUI() {
            scoreSpan.innerText = currentScore;
            timerSpan.innerText = timeLeft.toFixed(1);
            comboNumberSpan.innerText = currentCombo;
            let maxTimeRef = (gameActive && window._currentMaxTime) ? window._currentMaxTime : 3.5;
            let percent = (timeLeft / maxTimeRef) * 100;
            percent = Math.min(100, Math.max(0, percent));
            fuseFill.style.width = `${percent}%`;
            burnPercentSpan.innerText = `${Math.floor(percent)}%`;
            if(timeLeft <= 1.0 && gameActive) {
                timerSpan.classList.add('danger-time');
                fuseFill.style.boxShadow = '0 0 25px red';
            } else {
                timerSpan.classList.remove('danger-time');
                fuseFill.style.boxShadow = '0 0 18px #ff7700';
            }
        }
        
        function stopTimer() { if(timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
        
        function startTimer() {
            if(timerInterval) stopTimer();
            if(!gameActive) return;
            window._currentMaxTime = timeLeft;
            updateUI();
            timerInterval = setInterval(() => {
                if(!gameActive) return;
                if(timeLeft <= 0.03) {
                    timeLeft = 0;
                    updateUI();
                    endGame(false, "你是GAY");
                } else {
                    timeLeft = Math.max(0, timeLeft - 0.045);
                    updateUI();
                    if(timeLeft <= 0) {
                        timeLeft = 0;
                        updateUI();
                        endGame(false, "你是GAY");
                    }
                }
            }, 45);  // 极速更新，爽感倍增
        }
        
        function addComboAndScore() {
            let addPoints = 1 + Math.floor(currentCombo / 3);
            if(currentCombo >= 7) addPoints += 2;
            if(currentCombo >= 12) addPoints += 3;
            currentScore += addPoints;
            currentCombo++;
            if(currentCombo > 30) currentCombo = 30;
            comboNumberSpan.innerText = currentCombo;
            scoreSpan.innerText = currentScore;
            
            // 动态爽感消息
            if(currentCombo % 4 === 0 && currentCombo > 0) {
                messageBox.innerHTML = `NB x${currentCombo} !! +${addPoints}分`;
            } else {
                messageBox.innerHTML = `连击 ${currentCombo}！ +${addPoints} 分`;
            }
            setTimeout(() => { if(gameActive) messageBox.innerHTML = "不要犹豫，因为由于是给"; }, 950);
            triggerSuccessEffect();
            
            // 动态时间：连击越高奖励时间递减，保持刺激
            let bonus = successBonus - (currentCombo * 0.007);
            if(bonus < 0.2) bonus = 0.2;
            let newTime = timeLeft + bonus;
            if(newTime > MAX_TIME) newTime = MAX_TIME;
            if(newTime < MIN_TIME) newTime = MIN_TIME;
            timeLeft = newTime;
            
            // 每5连击额外特效 + 额外分数闪光
            if(currentCombo % 5 === 0 && currentCombo > 0) {
                messageBox.innerHTML = `牛逼克拉斯 ${currentCombo} !!! 得分+++++++++++++`;
                addGoldenBlast(canvasRect.width/2, canvasRect.height/2);
                currentScore += Math.floor(currentCombo / 2);
                scoreSpan.innerText = currentScore;
            }
            stopTimer();
            if(gameActive) {
                refreshPuzzle();
                startTimer();
            }
            updateUI();
        }
        
        function resetCombo() { currentCombo = 0; comboNumberSpan.innerText = "0"; }
        
        function endGame(isVictory, reason) {
            if(!gameActive) return;
            gameActive = false;
            stopTimer();
            statusTextSpan.innerText = "你是GAY";
            bombIconDiv.innerHTML = "💀💣💀爱爱啦爹扫了搜比你爸也被锁";
            messageBox.innerHTML = reason + "你是GAY";
            triggerFailEffect();
            const btns = [wireRed, wireBlue, wireYellow];
            btns.forEach(btn => { btn.style.pointerEvents = "none"; btn.style.opacity = "0.6"; });
        }
        
        function onCutWire(value, colorName) {
            if(!gameActive) return;
            if(value === currentCorrectAnswer) {
                addComboAndScore();
            } else {
                let errMsg = `❌ 剪错${colorName}线！数值${value} ≠ ${currentCorrectAnswer}，你是GAY`;
                endGame(false, errMsg);
            }
        }
        
        function resetGame() {
            gameActive = true;
            currentScore = 0;
            currentCombo = 0;
            timeLeft = 3.0;               // 开局仅3秒，爽感拉满
            successBonus = 0.32;
            stopTimer();
            bombIconDiv.innerHTML = "💣⚡🔥";
            statusTextSpan.innerText = "啊啊啊啊";
            const btns = [wireRed, wireBlue, wireYellow];
            btns.forEach(btn => { btn.style.pointerEvents = "auto"; btn.style.opacity = "1"; });
            refreshPuzzle();
            updateUI();
            startTimer();
            messageBox.innerHTML = "上一世你是GAY，这一世......";
            particles = [];
            if(animFrame) cancelAnimationFrame(animFrame);
            animFrame = null;
            if(ctx) ctx.clearRect(0,0,canvas.width,canvas.height);
        }
        
        // 绑定事件
        wireRed.addEventListener('click', () => onCutWire(parseInt(wireRed.dataset.value), "红色"));
        wireBlue.addEventListener('click', () => onCutWire(parseInt(wireBlue.dataset.value), "蓝色"));
        wireYellow.addEventListener('click', () => onCutWire(parseInt(wireYellow.dataset.value), "黄色"));
        document.getElementById('restartBtn').addEventListener('click', () => resetGame());
        
        function init() {
            resizeCanvas();
            resetGame();
            setInterval(() => { if(gameActive && canvas) resizeCanvas(); }, 380);
        }
        init();
    })();
</script>
</body>
</html>
