<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流浪地球 · 96炮 · 粒子炮 · 陨石全面提速</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(45deg, #0a0f1e, #1a1f2f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }
        .game-container {
            background: #212634;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.7), inset 0 0 10px #2e3b4e;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            background: radial-gradient(circle at 50% 30%, #263b4f, #0b141e);
            box-shadow: 0 0 0 3px #6d8c9c, 0 15px 25px black;
            cursor: crosshair;
        }
        .stats-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            color: #b7e6f0;
            text-shadow: 0 2px 0 #0a4d5e;
            font-weight: bold;
            font-size: 22px;
            background: #1b2938;
            padding: 12px 25px;
            border-radius: 60px;
            border: 2px solid #578a9e;
            box-shadow: inset 0 3px 8px #0e1a24;
        }
        .stats-panel div {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stats-panel span {
            background: #0f1b24;
            padding: 6px 22px;
            border-radius: 40px;
            border: 1px solid #3e7a8c;
            color: #fbe49b;
            font-size: 28px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.1s;
        }
        .stats-panel span:hover {
            background: #1f3a48;
            transform: scale(1.02);
        }
        .button-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            gap: 8px;
            flex-wrap: wrap;
        }
        button {
            background: #d4a13e;
            border: none;
            color: #171f2b;
            font-weight: bold;
            font-size: 16px;
            font-family: inherit;
            padding: 6px 10px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #7a5727, 0 8px 12px black;
            transition: 0.07s ease;
            letter-spacing: 0.5px;
            border: 2px solid #ffcf8a;
            flex: 1 1 auto;
            min-width: 100px;
        }
        button:hover:not(:disabled) {
            background: #ecb447;
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #7a5727, 0 12px 18px black;
        }
        button:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #7a5727, 0 5px 10px black;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: 0 4px 0 #5a3f1f;
            transform: translateY(3px);
        }
        .tip {
            margin-top: 12px;
            color: #aac7d5;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            background: #0e1b26b3;
            padding: 6px 12px;
            border-radius: 40px;
            border: 1px solid #346675;
        }
        .tip i {
            color: #ffc857;
            font-style: normal;
            background: #253f50;
            padding: 2px 10px;
            border-radius: 20px;
            margin: 0 4px;
        }
        #showerTimer {
            color: #ff7b7b;
            font-size: 26px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div class="stats-panel">
            <div>🌍 安全值 <span id="scoreDisplay">0</span></div>
            <div>⚙️ 发动机 <span id="livesDisplay">8</span> <span id="showerTimer"></span></div>
        </div>
        <div class="button-row">
            <button id="restartBtn">↺ 重启</button>
            <button id="shopBtn5000" disabled>小雨5k</button>
            <button id="shopBtn20000" disabled>中雨20k</button>
            <button id="shopBtn50000" disabled>暴雨50k</button>
            <button id="shopBtn100000" disabled>特大100k</button>
            <button id="shopBtn200000" disabled>灾难200k</button>
            <button id="shopBtn500000" disabled>末日500k</button>
            <button id="shopBtn1000000" disabled>天劫1M</button>
            <button id="laserUpgradeBtn" disabled>⚡激光炮20k</button>
            <button id="particleUpgradeBtn" disabled>✨粒子炮50k</button>
            <button id="buyUpgradableGunBtn" disabled>🛒可升级炮20k (12/48)</button>
            <button id="buyNormalGunBtn" disabled>🛒普通炮20k (0/48)</button>
            <button id="repairBtn" disabled>💓修复10k</button>
        </div>
        <div class="tip">
            <i>✱ 点击投放碎片</i>  <i>🔥 96门炮 · 陨石全面提速</i>  <i>💥 彩蛋：点5次安全值得100万</i>
        </div>
    </div>
    <div style="text-align: center; margin-top: 12px; color: #7d9eb5; font-size: 16px;">
        ⚡ 所有陨石速度提升：手动2~5，陨石雨2.5~6，粒子炮范围爆炸 ⚡
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const width = 800, height = 500;
        canvas.width = width; canvas.height = height;

        // 地面高度
        const GROUND_Y = height - 35;

        // 行星发动机
        const ENGINE = {
            x: width / 2,
            y: GROUND_Y - 30,
            r: 35
        };

        // 所有炮台位置 (96个，从左到右均匀分布)
        const ALL_POSITIONS = [];
        const startX = 20;
        const endX = 780;
        const step = (endX - startX) / 95; // 96个点，95个间隔
        for (let i = 0; i < 96; i++) {
            ALL_POSITIONS.push({
                x: startX + i * step,
                y: GROUND_Y - 16
            });
        }

        // 分配索引：偶数索引为可升级炮，奇数索引为普通炮
        const allUpgradableIndices = [];
        const allNormalIndices = [];
        for (let i = 0; i < 96; i++) {
            if (i % 2 === 0) {
                allUpgradableIndices.push(i);
            } else {
                allNormalIndices.push(i);
            }
        }

        // 初始可升级炮12门，均匀选取（步长4）
        const INIT_UPGRADABLE_GUNS = 12;
        const MAX_UPGRADABLE_GUNS = 48;
        const stepIndex = Math.floor(MAX_UPGRADABLE_GUNS / INIT_UPGRADABLE_GUNS); // 48/12 = 4
        const initialIndicesPos = [];
        for (let i = 0; i < INIT_UPGRADABLE_GUNS; i++) {
            initialIndicesPos.push(i * stepIndex); // 0,4,8,...,44
        }
        // 对应的实际可升级炮索引
        const initialUpgradableIndices = initialIndicesPos.map(pos => allUpgradableIndices[pos]);
        // 剩余可升级炮索引（用于后续购买）
        const remainingUpgradableIndices = allUpgradableIndices.filter((_, index) => !initialIndicesPos.includes(index));

        // 普通炮购买顺序：自然顺序（从左到右）
        const normalBuyOrder = allNormalIndices; // 已经是按x排序

        // 当前激活的可升级炮数组
        let upgradableGuns = [];
        // 当前激活的普通炮数组
        let normalGuns = [];

        // 陨石、子弹数组
        let meteors = [];
        let bullets = [];
        let score = 0;
        let lives = 8;
        const MAX_LIVES = 8;
        let gameActive = true;

        // 子弹参数
        const BULLET_SPEED = 60.0;
        const BULLET_RADIUS = 3;
        const FIRE_COOLDOWN_MAX = 1;     // 射速60fps下每秒60发

        // 重力
        const GRAVITY = 0.12;

        // 碎片分裂参数
        const MIN_RADIUS = 4;
        const SPLIT_COUNT = 3;
        const SPLIT_SPEED_VARIATION = 1.2;

        // 粒子炮爆炸半径
        const PARTICLE_BLAST_RADIUS = 50;

        // ----- 陨石雨商店相关 (每帧平滑生成) -----
        let meteorShowerActive = false;
        let meteorShowerEndTime = 0;
        let meteorShowerRate = 0;
        let meteorShowerAccum = 0;

        const SHOWER_DURATION = 30000;          // 30秒

        // 陨石雨速率配置
        const SHOWER_RATES = {
            5000: 30,
            20000: 60,
            50000: 120,
            100000: 240,
            200000: 480,
            500000: 1200,
            1000000: 2400
        };

        // ----- 升级状态 -----
        let laserUpgraded = false;
        let particleUpgraded = false;
        const LASER_COST = 20000;
        const PARTICLE_COST = 50000;
        let laserEffects = [];                   // 激光特效 { fromX, fromY, toX, toY }
        let particleEffects = [];                 // 粒子爆炸特效 { x, y, radius }

        // ----- 购买炮台相关 -----
        const GUN_COST = 20000;
        const MAX_NORMAL_GUNS = 48;

        // ----- 修复发动机相关 -----
        const REPAIR_COST = 10000;

        // ----- 彩蛋相关 -----
        let easterEggClickCount = 0;
        const scoreSpan = document.getElementById('scoreDisplay');

        // UI 元素
        const livesSpan = document.getElementById('livesDisplay');
        const showerTimerSpan = document.getElementById('showerTimer');
        const restartBtn = document.getElementById('restartBtn');
        const shopBtn5000 = document.getElementById('shopBtn5000');
        const shopBtn20000 = document.getElementById('shopBtn20000');
        const shopBtn50000 = document.getElementById('shopBtn50000');
        const shopBtn100000 = document.getElementById('shopBtn100000');
        const shopBtn200000 = document.getElementById('shopBtn200000');
        const shopBtn500000 = document.getElementById('shopBtn500000');
        const shopBtn1000000 = document.getElementById('shopBtn1000000');
        const laserUpgradeBtn = document.getElementById('laserUpgradeBtn');
        const particleUpgradeBtn = document.getElementById('particleUpgradeBtn');
        const buyUpgradableGunBtn = document.getElementById('buyUpgradableGunBtn');
        const buyNormalGunBtn = document.getElementById('buyNormalGunBtn');
        const repairBtn = document.getElementById('repairBtn');

        // ----- 辅助函数 -----
        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        function circleCollide(x1, y1, r1, x2, y2, r2) {
            const dx = x1 - x2;
            const dy = y1 - y2;
            const dist = Math.sqrt(dx*dx + dy*dy);
            return dist < r1 + r2;
        }

        // 初始化可升级炮：使用 initialUpgradableIndices
        function initUpgradableGuns() {
            upgradableGuns = [];
            for (let i = 0; i < INIT_UPGRADABLE_GUNS; i++) {
                const idx = initialUpgradableIndices[i];
                upgradableGuns.push({
                    ...ALL_POSITIONS[idx],
                    width: 40,
                    height: 16,
                    cooldown: 0,
                    target: null,
                    predicted: { x: ALL_POSITIONS[idx].x, y: ALL_POSITIONS[idx].y }
                });
            }
        }

        // 初始化普通炮：0门
        function initNormalGuns() {
            normalGuns = [];
        }

        // 重置游戏
        function restartGame() {
            meteors = [];
            bullets = [];
            score = 0;
            lives = MAX_LIVES;
            gameActive = true;
            laserUpgraded = false;
            particleUpgraded = false;
            initUpgradableGuns();
            initNormalGuns();
            meteorShowerActive = false;
            meteorShowerEndTime = 0;
            meteorShowerRate = 0;
            meteorShowerAccum = 0;
            laserEffects = [];
            particleEffects = [];
            easterEggClickCount = 0;   // 重置彩蛋计数
            updateDisplay();
        }

        function updateDisplay() {
            scoreSpan.innerText = score;
            livesSpan.innerText = lives;
            // 陨石雨按钮
            shopBtn5000.disabled = !gameActive || score < 5000 || meteorShowerActive;
            shopBtn20000.disabled = !gameActive || score < 20000 || meteorShowerActive;
            shopBtn50000.disabled = !gameActive || score < 50000 || meteorShowerActive;
            shopBtn100000.disabled = !gameActive || score < 100000 || meteorShowerActive;
            shopBtn200000.disabled = !gameActive || score < 200000 || meteorShowerActive;
            shopBtn500000.disabled = !gameActive || score < 500000 || meteorShowerActive;
            shopBtn1000000.disabled = !gameActive || score < 1000000 || meteorShowerActive;
            // 激光升级按钮 (粒子升级后禁用)
            laserUpgradeBtn.disabled = !gameActive || score < LASER_COST || laserUpgraded || particleUpgraded;
            // 粒子升级按钮 (激光升级后禁用)
            particleUpgradeBtn.disabled = !gameActive || score < PARTICLE_COST || particleUpgraded || laserUpgraded;
            // 购买可升级炮按钮
            buyUpgradableGunBtn.disabled = !gameActive || score < GUN_COST || upgradableGuns.length >= MAX_UPGRADABLE_GUNS;
            buyUpgradableGunBtn.innerText = `🛒可升级炮20k (${upgradableGuns.length}/${MAX_UPGRADABLE_GUNS})`;
            // 购买普通炮按钮
            buyNormalGunBtn.disabled = !gameActive || score < GUN_COST || normalGuns.length >= MAX_NORMAL_GUNS;
            buyNormalGunBtn.innerText = `🛒普通炮20k (${normalGuns.length}/${MAX_NORMAL_GUNS})`;
            // 修复按钮
            repairBtn.disabled = !gameActive || score < REPAIR_COST || lives >= MAX_LIVES;
            // 陨石雨计时器
            if (meteorShowerActive && meteorShowerEndTime > 0) {
                const remaining = Math.max(0, Math.ceil((meteorShowerEndTime - performance.now()) / 1000));
                showerTimerSpan.innerText = `⏳ ${remaining}s`;
            } else {
                showerTimerSpan.innerText = '';
            }
        }

        // ----- 鼠标点击投放木星碎片 -----
        canvas.addEventListener('click', (e) => {
            if (!gameActive) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clickX = (e.clientX - rect.left) * scaleX;
            let clickY = (e.clientY - rect.top) * scaleY;

            if (clickY >= GROUND_Y - 40) return;

            const radius = 8 + Math.floor(Math.random() * 11);
            const vx = (Math.random() - 0.5) * 2.2;
            const vy = Math.random() * 3.0 + 2.0; // 速度提升至 2.0~5.0

            meteors.push({
                x: clickX,
                y: clickY,
                vx: vx,
                vy: vy,
                r: radius,
            });
        });

        // ----- 彩蛋：点击安全值5次得100万 -----
        scoreSpan.addEventListener('click', () => {
            if (!gameActive) return;
            easterEggClickCount++;
            if (easterEggClickCount >= 5) {
                score += 1000000;
                updateDisplay();
                alert('🎉 彩蛋触发！获得1,000,000安全值！ 🎉');
                easterEggClickCount = 0; // 重置计数，可多次触发
            }
        });

        // 重启按钮
        restartBtn.addEventListener('click', restartGame);

        // ----- 商店购买陨石雨 (通用) -----
        function startMeteorShower(rate) {
            meteorShowerActive = true;
            meteorShowerEndTime = performance.now() + SHOWER_DURATION;
            meteorShowerRate = rate;
            meteorShowerAccum = 0;
            updateDisplay();
        }

        shopBtn5000.addEventListener('click', () => {
            if (!gameActive || score < 5000 || meteorShowerActive) return;
            score -= 5000;
            startMeteorShower(SHOWER_RATES[5000]);
        });
        shopBtn20000.addEventListener('click', () => {
            if (!gameActive || score < 20000 || meteorShowerActive) return;
            score -= 20000;
            startMeteorShower(SHOWER_RATES[20000]);
        });
        shopBtn50000.addEventListener('click', () => {
            if (!gameActive || score < 50000 || meteorShowerActive) return;
            score -= 50000;
            startMeteorShower(SHOWER_RATES[50000]);
        });
        shopBtn100000.addEventListener('click', () => {
            if (!gameActive || score < 100000 || meteorShowerActive) return;
            score -= 100000;
            startMeteorShower(SHOWER_RATES[100000]);
        });
        shopBtn200000.addEventListener('click', () => {
            if (!gameActive || score < 200000 || meteorShowerActive) return;
            score -= 200000;
            startMeteorShower(SHOWER_RATES[200000]);
        });
        shopBtn500000.addEventListener('click', () => {
            if (!gameActive || score < 500000 || meteorShowerActive) return;
            score -= 500000;
            startMeteorShower(SHOWER_RATES[500000]);
        });
        shopBtn1000000.addEventListener('click', () => {
            if (!gameActive || score < 1000000 || meteorShowerActive) return;
            score -= 1000000;
            startMeteorShower(SHOWER_RATES[1000000]);
        });

        // ----- 激光炮升级 -----
        laserUpgradeBtn.addEventListener('click', () => {
            if (!gameActive || score < LASER_COST || laserUpgraded || particleUpgraded) return;
            score -= LASER_COST;
            laserUpgraded = true;
            updateDisplay();
        });

        // ----- 粒子炮升级 -----
        particleUpgradeBtn.addEventListener('click', () => {
            if (!gameActive || score < PARTICLE_COST || particleUpgraded || laserUpgraded) return;
            score -= PARTICLE_COST;
            particleUpgraded = true;
            updateDisplay();
        });

        // ----- 购买可升级炮 (按剩余顺序添加) -----
        buyUpgradableGunBtn.addEventListener('click', () => {
            if (!gameActive || score < GUN_COST || upgradableGuns.length >= MAX_UPGRADABLE_GUNS) return;
            score -= GUN_COST;
            const nextIndex = upgradableGuns.length - INIT_UPGRADABLE_GUNS; // 已经买了 INIT_UPGRADABLE_GUNS 个初始，后续从0开始
            if (nextIndex >= 0 && nextIndex < remainingUpgradableIndices.length) {
                const idx = remainingUpgradableIndices[nextIndex];
                upgradableGuns.push({
                    ...ALL_POSITIONS[idx],
                    width: 40,
                    height: 16,
                    cooldown: 0,
                    target: null,
                    predicted: { x: ALL_POSITIONS[idx].x, y: ALL_POSITIONS[idx].y }
                });
            }
            updateDisplay();
        });

        // ----- 购买普通炮 (按自然顺序) -----
        buyNormalGunBtn.addEventListener('click', () => {
            if (!gameActive || score < GUN_COST || normalGuns.length >= MAX_NORMAL_GUNS) return;
            score -= GUN_COST;
            const nextIndex = normalGuns.length;
            if (nextIndex < normalBuyOrder.length) {
                const idx = normalBuyOrder[nextIndex];
                normalGuns.push({
                    ...ALL_POSITIONS[idx],
                    width: 40,
                    height: 16,
                    cooldown: 0,
                    target: null,
                    predicted: { x: ALL_POSITIONS[idx].x, y: ALL_POSITIONS[idx].y }
                });
            }
            updateDisplay();
        });

        // ----- 修复发动机 -----
        repairBtn.addEventListener('click', () => {
            if (!gameActive || score < REPAIR_COST || lives >= MAX_LIVES) return;
            score -= REPAIR_COST;
            lives = Math.min(lives + 1, MAX_LIVES);
            updateDisplay();
        });

        // ----- 分裂/伤害处理函数 -----
        // 处理单个碎片被击中（可能分裂或得分）
        function processHit(meteor) {
            if (meteor.r <= MIN_RADIUS) {
                score += 10;
                return []; // 无新碎片
            } else {
                let pieces = [];
                let newR = meteor.r * 0.5;
                if (newR < MIN_RADIUS) newR = MIN_RADIUS;
                for (let i = 0; i < SPLIT_COUNT; i++) {
                    let offsetX = (Math.random() - 0.5) * meteor.r * 0.8;
                    let offsetY = (Math.random() - 0.5) * meteor.r * 0.8;
                    let newVx = meteor.vx + (Math.random() - 0.5) * SPLIT_SPEED_VARIATION;
                    let newVy = meteor.vy + (Math.random() - 0.5) * SPLIT_SPEED_VARIATION;
                    pieces.push({
                        x: meteor.x + offsetX,
                        y: meteor.y + offsetY,
                        vx: newVx,
                        vy: newVy,
                        r: newR,
                    });
                }
                return pieces;
            }
        }

        // 范围爆炸处理
        function applyBlast(centerX, centerY, radius) {
            let affectedMeteors = [];
            for (let i = meteors.length - 1; i >= 0; i--) {
                const m = meteors[i];
                const dx = m.x - centerX;
                const dy = m.y - centerY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist <= radius) {
                    affectedMeteors.push(...processHit(m));
                    meteors.splice(i, 1);
                }
            }
            if (affectedMeteors.length > 0) {
                meteors.push(...affectedMeteors);
            }
            // 记录爆炸特效
            particleEffects.push({ x: centerX, y: centerY, radius: radius });
        }

        // ----- 智能预测 (四次迭代) -----
        function predictPosition(shooterX, shooterY, bulletSpeed, target) {
            let tx = target.x;
            let ty = target.y;
            let tvx = target.vx;
            let tvy = target.vy;

            let predictedX = tx;
            let predictedY = ty;
            for (let iter = 0; iter < 4; iter++) {
                const dx = predictedX - shooterX;
                const dy = predictedY - shooterY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const timeToTarget = dist / bulletSpeed;
                predictedX = tx + tvx * timeToTarget;
                predictedY = ty + tvy * timeToTarget;
            }
            return { x: predictedX, y: predictedY };
        }

        // ----- 更新逻辑 -----
        function update() {
            if (gameActive) {
                // 1. 碎片运动
                for (let m of meteors) {
                    m.x += m.vx;
                    m.y += m.vy;
                    m.vy += GRAVITY;

                    if (m.x - m.r < 0) {
                        m.x = m.r;
                        m.vx *= -0.7;
                    } else if (m.x + m.r > width) {
                        m.x = width - m.r;
                        m.vx *= -0.7;
                    }
                    if (m.y - m.r < 0) {
                        m.y = m.r;
                        m.vy *= -0.5;
                    }
                }

                // 2. 子弹移动
                for (let i = bullets.length - 1; i >= 0; i--) {
                    const b = bullets[i];
                    b.x += b.vx;
                    b.y += b.vy;
                    if (b.x < 0 || b.x > width || b.y < 0 || b.y > height) {
                        bullets.splice(i, 1);
                    }
                }

                // 3. 子弹与碎片碰撞（普通子弹和粒子子弹分开处理）
                for (let i = bullets.length - 1; i >= 0; i--) {
                    const bullet = bullets[i];
                    for (let j = meteors.length - 1; j >= 0; j--) {
                        const meteor = meteors[j];
                        const dx = bullet.x - meteor.x;
                        const dy = bullet.y - meteor.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < meteor.r + BULLET_RADIUS) {
                            // 判断是否为粒子炮子弹
                            if (bullet.isParticle) {
                                // 粒子炮子弹：产生范围爆炸
                                bullets.splice(i, 1);
                                applyBlast(bullet.x, bullet.y, PARTICLE_BLAST_RADIUS);
                                break; // 子弹消失，跳出内层循环
                            } else {
                                // 普通子弹
                                bullets.splice(i, 1);
                                const newPieces = processHit(meteor);
                                meteors.splice(j, 1);
                                if (newPieces.length > 0) meteors.push(...newPieces);
                                updateDisplay();
                                break;
                            }
                        }
                    }
                }

                // 4. 碎片与发动机/地面碰撞
                for (let i = meteors.length - 1; i >= 0; i--) {
                    const m = meteors[i];
                    if (circleCollide(m.x, m.y, m.r, ENGINE.x, ENGINE.y, ENGINE.r)) {
                        meteors.splice(i, 1);
                        lives--;
                        if (lives < 0) lives = 0;
                        gameActive = lives > 0;
                        updateDisplay();
                        continue;
                    }
                    if (m.y + m.r >= GROUND_Y) {
                        meteors.splice(i, 1);
                        lives--;
                        if (lives < 0) lives = 0;
                        gameActive = lives > 0;
                        updateDisplay();
                        continue;
                    }
                }

                // 5. 所有炮台开火 (可升级炮 + 普通炮)
                const allGuns = [...upgradableGuns, ...normalGuns];
                for (let gun of allGuns) {
                    let closestDist = Infinity;
                    gun.target = null;
                    for (let m of meteors) {
                        const dx = m.x - gun.x;
                        const dy = m.y - gun.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < closestDist) {
                            closestDist = dist;
                            gun.target = m;
                        }
                    }

                    if (gun.target && gun.cooldown <= 0) {
                        // 计算预测位置
                        gun.predicted = predictPosition(gun.x, gun.y, BULLET_SPEED, gun.target);
                        gun.predicted.x = clamp(gun.predicted.x, 0, width);
                        gun.predicted.y = clamp(gun.predicted.y, 0, height);

                        // 判断是否为可升级炮且已升级
                        const isUpgradable = upgradableGuns.includes(gun);
                        const isLaser = isUpgradable && laserUpgraded;
                        const isParticle = isUpgradable && particleUpgraded;

                        if (isLaser) {
                            // 激光炮：直接伤害目标
                            const targetIndex = meteors.indexOf(gun.target);
                            if (targetIndex !== -1) {
                                const meteor = meteors[targetIndex];
                                const newPieces = processHit(meteor);
                                meteors.splice(targetIndex, 1);
                                if (newPieces.length > 0) meteors.push(...newPieces);
                                updateDisplay();
                                // 记录激光特效
                                laserEffects.push({
                                    fromX: gun.x,
                                    fromY: gun.y,
                                    toX: meteor.x,
                                    toY: meteor.y
                                });
                            }
                        } else if (isParticle) {
                            // 粒子炮：发射粒子子弹（带标记）
                            const dx = gun.predicted.x - gun.x;
                            const dy = gun.predicted.y - gun.y;
                            const len = Math.sqrt(dx*dx + dy*dy);
                            if (len > 0.01) {
                                const normX = dx / len;
                                const normY = dy / len;
                                bullets.push({
                                    x: gun.x,
                                    y: gun.y,
                                    vx: normX * BULLET_SPEED,
                                    vy: normY * BULLET_SPEED,
                                    isParticle: true  // 标记为粒子子弹
                                });
                            }
                        } else {
                            // 普通炮或未升级的可升级炮：发射普通子弹
                            const dx = gun.predicted.x - gun.x;
                            const dy = gun.predicted.y - gun.y;
                            const len = Math.sqrt(dx*dx + dy*dy);
                            if (len > 0.01) {
                                const normX = dx / len;
                                const normY = dy / len;
                                bullets.push({
                                    x: gun.x,
                                    y: gun.y,
                                    vx: normX * BULLET_SPEED,
                                    vy: normY * BULLET_SPEED,
                                    isParticle: false // 普通子弹
                                });
                            }
                        }
                        gun.cooldown = FIRE_COOLDOWN_MAX;
                    }

                    if (gun.cooldown > 0) gun.cooldown--;
                }

                // 6. 陨石雨平滑生成
                if (meteorShowerActive) {
                    const now = performance.now();
                    if (now >= meteorShowerEndTime) {
                        meteorShowerActive = false;
                        meteorShowerEndTime = 0;
                        meteorShowerRate = 0;
                        meteorShowerAccum = 0;
                        updateDisplay();
                    } else {
                        meteorShowerAccum += meteorShowerRate / 60;
                        while (meteorShowerAccum >= 1) {
                            meteorShowerAccum -= 1;
                            const radius = 4 + Math.floor(Math.random() * 7);
                            const vx = (Math.random() - 0.5) * 2.5;
                            // 所有陨石雨统一使用快速下落（2.5~6.0）
                            const vy = Math.random() * 3.5 + 2.5;
                            meteors.push({
                                x: Math.random() * width,
                                y: 5,
                                vx: vx,
                                vy: vy,
                                r: radius,
                            });
                        }
                    }
                }
            }

            draw();
            // 每帧更新UI，确保倒计时持续刷新
            updateDisplay();
            requestAnimationFrame(update);
        }

        // ----- 绘制 -----
        function draw() {
            ctx.clearRect(0, 0, width, height);

            // 木星背景
            ctx.save();
            ctx.shadowBlur = 80;
            ctx.shadowColor = '#b08d5f';
            ctx.beginPath();
            ctx.arc(680, 120, 130, 0, Math.PI*2);
            const grad = ctx.createRadialGradient(650, 100, 30, 680, 120, 140);
            grad.addColorStop(0, '#b87c4b');
            grad.addColorStop(0.5, '#9f5f38');
            grad.addColorStop(1, '#6d4025');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = '#cfa776';
            ctx.lineWidth = 6;
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.ellipse(670, 80 + i*30, 80, 20, 0.1, 0, Math.PI*2);
                ctx.strokeStyle = '#e6c39455';
                ctx.stroke();
            }
            ctx.restore();

            // 行星发动机光柱
            ctx.save();
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#4ab5ff';
            ctx.fillStyle = '#2f6f9f';
            ctx.globalAlpha = 0.25;
            ctx.fillRect(70, 200, 30, 250);
            ctx.fillRect(140, 180, 25, 270);
            ctx.fillRect(210, 220, 35, 230);
            ctx.globalAlpha = 0.8;
            ctx.fillStyle = '#ffd966';
            ctx.shadowColor = '#ffaa33';
            ctx.shadowBlur = 40;
            ctx.fillRect(80, 440, 12, 30);
            ctx.fillRect(148, 440, 10, 30);
            ctx.fillRect(220, 440, 14, 30);
            ctx.restore();

            // 星空
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 100; i++) {
                let sx = (i * 27) % width, sy = (i * 19) % height;
                ctx.beginPath();
                ctx.arc(sx, sy, (i % 4) + 1, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255,255,200,${0.3+Math.sin(Date.now()*0.001+i)*0.2})`;
                ctx.fill();
            }

            // 地面
            ctx.fillStyle = '#3d5a73';
            ctx.fillRect(0, GROUND_Y, width, height - GROUND_Y + 5);
            ctx.fillStyle = '#5d7a63';
            for (let i = 0; i < 20; i++) {
                let x = (i * 53 + Date.now()*0.05) % width;
                ctx.fillRect(x, GROUND_Y+2, 20, 6);
            }
            ctx.strokeStyle = '#a1c9b0';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y);
            ctx.lineTo(width, GROUND_Y);
            ctx.stroke();

            // 地面发动机
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#2a9df4';
            ctx.beginPath();
            ctx.arc(ENGINE.x, ENGINE.y, ENGINE.r, 0, Math.PI*2);
            const engineGrad = ctx.createRadialGradient(ENGINE.x-10, ENGINE.y-10, 10, ENGINE.x, ENGINE.y, ENGINE.r+10);
            engineGrad.addColorStop(0, '#4ab5ff');
            engineGrad.addColorStop(0.7, '#0f4c81');
            ctx.fillStyle = engineGrad;
            ctx.fill();
            ctx.strokeStyle = '#ffd966';
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.font = 'bold 24px "Courier New", monospace';
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 20;
            ctx.fillText('⏚', ENGINE.x-20, ENGINE.y+8);
            ctx.shadowBlur = 0;

            // 木星碎片
            for (let m of meteors) {
                ctx.beginPath();
                ctx.arc(m.x+3, m.y+3, m.r, 0, Math.PI*2);
                ctx.fillStyle = '#1a1a1a60';
                ctx.fill();

                let color1, color2;
                if (m.r > 10) {
                    color1 = '#c28f5a';
                    color2 = '#874f2e';
                } else if (m.r > 6) {
                    color1 = '#b57a4a';
                    color2 = '#6f3f24';
                } else {
                    color1 = '#a5673a';
                    color2 = '#5a2f1a';
                }
                const gradient = ctx.createRadialGradient(m.x-3, m.y-3, 3, m.x, m.y, m.r);
                gradient.addColorStop(0, color1);
                gradient.addColorStop(0.7, color2);
                gradient.addColorStop(1, '#4f2c19');
                ctx.beginPath();
                ctx.arc(m.x, m.y, m.r, 0, 2*Math.PI);
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.strokeStyle = '#ebc28e';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(m.x-2, m.y-2, 2, 0, 2*Math.PI);
                ctx.fillStyle = '#b5452e80';
                ctx.fill();
            }

            // 子弹
            for (let b of bullets) {
                ctx.shadowColor = b.isParticle ? '#aa88ff' : '#ffaa33';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(b.x, b.y, BULLET_RADIUS+1, 0, 2*Math.PI);
                ctx.fillStyle = b.isParticle ? '#cc88ff' : '#FFD966';
                ctx.fill();
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(b.x, b.y, 2, 0, 2*Math.PI);
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // 绘制激光特效
            for (let laser of laserEffects) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff3333';
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#ff6666';
                ctx.beginPath();
                ctx.moveTo(laser.fromX, laser.fromY);
                ctx.lineTo(laser.toX, laser.toY);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
            laserEffects = [];

            // 绘制粒子爆炸特效
            for (let blast of particleEffects) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#aa66ff';
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#cc88ff';
                ctx.beginPath();
                ctx.arc(blast.x, blast.y, blast.radius, 0, 2*Math.PI);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
            particleEffects = [];

            // 绘制所有炮台
            const allGuns = [...upgradableGuns, ...normalGuns];
            allGuns.forEach(gun => {
                // 判断炮台类型
                const isUpgradable = upgradableGuns.includes(gun);
                let gunColor = '#3c5b6b'; // 默认普通炮颜色
                let gunText = '1130';
                let textColor = '#e8e8e8';
                if (isUpgradable) {
                    if (particleUpgraded) {
                        gunColor = '#aa44aa'; // 粒子炮紫色
                        gunText = 'PART';
                        textColor = '#ffccff';
                    } else if (laserUpgraded) {
                        gunColor = '#ff4444'; // 激光炮红色
                        gunText = 'LASER';
                        textColor = '#ffaaaa';
                    } else {
                        gunColor = '#3c5b6b'; // 未升级可升级炮
                        gunText = '1130';
                        textColor = '#e8e8e8';
                    }
                } else {
                    gunColor = '#3c5b6b'; // 普通炮
                    gunText = '1130';
                    textColor = '#e8e8e8';
                }

                ctx.shadowColor = '#1e2b33';
                ctx.shadowBlur = 12;

                // 底座
                ctx.fillStyle = '#3e525f';
                ctx.beginPath();
                ctx.ellipse(gun.x, GROUND_Y-4, gun.width/2+4, 8, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#57758a';
                ctx.beginPath();
                ctx.ellipse(gun.x, GROUND_Y-6, gun.width/2, 8, 0, 0, Math.PI*2);
                ctx.fill();

                // 旋转炮管
                ctx.save();
                ctx.translate(gun.x, gun.y);
                if (gun.target) {
                    const angle = Math.atan2(gun.predicted.y - gun.y, gun.predicted.x - gun.x);
                    ctx.rotate(angle);
                } else {
                    ctx.rotate(0);
                }
                ctx.fillStyle = gunColor;
                ctx.shadowBlur = 8;
                ctx.fillRect(0, -5, 42, 8);
                for (let i = -2; i <= 2; i++) {
                    ctx.fillStyle = gunColor;
                    ctx.fillRect(36 + i*2, -7, 4, 10);
                }
                ctx.restore();

                // 炮口火焰 (只有非激光炮且开火时才有)
                if (!(isUpgradable && (laserUpgraded || particleUpgraded)) && gameActive && gun.cooldown <= FIRE_COOLDOWN_MAX) {
                    ctx.shadowBlur = 30;
                    ctx.fillStyle = '#ffbb33';
                    ctx.beginPath();
                    ctx.ellipse(gun.x + (gun.target? (gun.predicted.x - gun.x)*0.18 : 14), 
                               gun.y-2 + (gun.target? (gun.predicted.y - gun.y)*0.18 : 0), 
                               18, 6, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#ff7b00';
                    ctx.beginPath();
                    ctx.ellipse(gun.x + (gun.target? (gun.predicted.x - gun.x)*0.12 : 18), 
                               gun.y-3 + (gun.target? (gun.predicted.y - gun.y)*0.12 : 0), 
                               12, 4, 0, 0, Math.PI*2);
                    ctx.fill();
                }

                // 炮身文字
                ctx.shadowBlur = 6;
                ctx.font = 'bold 16px "Courier New", monospace';
                ctx.fillStyle = textColor;
                ctx.fillText(gunText, gun.x-28, gun.y-12);
                ctx.shadowBlur = 0;

                // 预瞄指示器
                if (gun.target && gameActive) {
                    ctx.strokeStyle = '#ffaa33';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([4, 4]);
                    ctx.beginPath();
                    ctx.arc(gun.predicted.x, gun.predicted.y, 18, 0, 2*Math.PI);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.beginPath();
                    ctx.moveTo(gun.x, gun.y);
                    ctx.lineTo(gun.predicted.x, gun.predicted.y);
                    ctx.strokeStyle = '#ffaa3380';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            });

            // 游戏结束蒙层
            if (!gameActive) {
                ctx.fillStyle = '#000000aa';
                ctx.fillRect(0, 0, width, height);
                ctx.font = 'bold 48px "Courier New", monospace';
                ctx.fillStyle = '#f3c682';
                ctx.shadowColor = '#ad5f2a';
                ctx.shadowBlur = 16;
                ctx.fillText('💥 发动机停转', 150, 250);
                ctx.font = '28px monospace';
                ctx.fillStyle = '#fdebb3';
                ctx.fillText('点击"重启"', 300, 350);
                ctx.shadowBlur = 0;
            }

            // 操作提示
            ctx.font = '14px monospace';
            ctx.fillStyle = '#cddde0';
            ctx.fillText('点击投放碎片 · 所有陨石速度提升(手动2~5,雨2.5~6) · 粒子炮范围爆炸(紫) · 彩蛋：点5次安全值得100万', 10, 50);
        }

        // 启动
        restartGame();
        update();

        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
    })();
</script>
