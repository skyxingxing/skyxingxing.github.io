    function buildItemsFromTxt(txt) {
        const lines = txt.split(/\r?\n/);
        let currentCategory = "未知宝藏";
        const items = [];
        for (let line of lines) {
            let trimmed = line.trim();
            if (!trimmed) continue;
            if (trimmed.endsWith("：") || trimmed.endsWith(":") || ["苹果","编程语言","ASML光刻机","ZENVO汽车","哈苏","大疆"].includes(trimmed)) {
                currentCategory = trimmed.replace(/[：:]/g, '').trim();
                continue;
            }
            if (trimmed.length > 0 && !trimmed.startsWith("//")) items.push({ name: trimmed, category: currentCategory });
        }
        return items;
    }

    let rawItems = buildItemsFromTxt(rawTxtData);
    const extraItems = [
        { name: "RTX PRO 6000 Blackwell Server Edition", category: "英伟达数据中心GPU" },
        { name: "Ryzen AI 9 HX 475", category: "AMD移动处理器" },
        { name: "Centodieci", category: "布加迪限量超跑" },
        { name: "Koenigsegg CCGT", category: "柯尼塞格赛道版赛车" },
        { name: "Avata 360", category: "大疆全景FPV无人机" },
        { name: "X2D II 100C", category: "哈苏中画幅相机" },
        { name: "TWINSCAN EXE:5200B", category: "ASML高数值孔径EUV光刻机" },
        { name: "Zenvo ST1 50S", category: "Zenvo限量超跑" }
    ];
    for (let ex of extraItems) if (!rawItems.some(i=>i.name===ex.name)) rawItems.push(ex);

    const mythicKeywords = ["RTX 5090","RTX PRO 6000 Blackwell Server Edition","GB200","H200","H100","La Voiture Noire","Bolide","One:1","787B","Evija Fittipaldi","Jesko Absolut","EXE:5000","TWINSCAN EXE:5200B","Threadripper 3990X","EPYC 9965","RTX 5090 Ti","Zenvo ST1 50S","Avata 360","X2D II 100C","Centodieci","RTX PRO 5000 Blackwell 72GB"];
    function isMythic(name,cat){
        let up=name.toUpperCase();
        for(let kw of mythicKeywords) if(up.includes(kw.toUpperCase())) return true;
        if(cat==="柯尼塞格" && (name.includes("One:1")||name.includes("Jesko Absolut")||name.includes("CCGT"))) return true;
        if(cat==="布加迪" && (name.includes("La Voiture Noire")||name.includes("Bolide")||name.includes("Centodieci"))) return true;
        if(cat==="英伟达" && (name.includes("RTX 5090")||name.includes("H100")||name.includes("H200")||name.includes("GB200")||name.includes("RTX PRO 6000 Blackwell Server Edition"))) return true;
        if(cat==="AMD" && name.includes("Ryzen AI 9 HX 475")) return true;
        if(cat==="哈苏" && name.includes("X2D II 100C")) return true;
        if(cat==="ASML光刻机" && name.includes("TWINSCAN EXE:5200B")) return true;
        return false;
    }
    function assignRarity(name,cat){
        if(isMythic(name,cat)) return "mythic";
        let up=name.toUpperCase();
        const legendKeys=["RTX 4090","RTX 5080","RTX PRO 5000 Blackwell","THREADRIPPER 7970X","RYZEN 9 9950X","LA VOITURE NOIRE","BOLIDE","DIVO","MISTRAL","TOURBILLON","AGERA RS","JESKO ABSOLUT","CC850","REGERA","787B","EVIJA","EMIRA","INSPIRE 3","X2D II 100C","NXE:3800E","EXE:5200","A100","IPHONE 17 PRO MAX","GB200","BLACKWELL","RADEON RX 7900 XTX","TWINSCAN EXE:5200B"];
        for(let kw of legendKeys) if(up.includes(kw.toUpperCase())) return "legend";
        if(up.includes("RX-7")||up.includes("CHIRON")||up.includes("VEYRON")||up.includes("RYZEN 7 7800X3D")||up.includes("AGERA")||up.includes("IPHONE 15 PRO")) return "rare";
        return "common";
    }

    const finalPrizePool = [];
    for(let it of rawItems){
        let r=assignRarity(it.name,it.category);
        let w=r==="mythic"?0.12:r==="legend"?0.9:r==="rare"?5:12;
        finalPrizePool.push({name:it.name,type:it.category,rarity:r,weight:w});
    }

    let winRecord = {};
    function getKey(p){ return `${p.name}|${p.type}`; }
    function addToRecord(prize, skipRender=false){
        let k=getKey(prize);
        winRecord[k]=(winRecord[k]||0)+1;
        if(!skipRender) renderRecord();
    }
    function addBatchToRecord(countsMap){
        for(let [key,delta] of Object.entries(countsMap)) winRecord[key]=(winRecord[key]||0)+delta;
        renderRecord();
    }
    function renderRecord(){
        const recDiv=document.getElementById('recordContainer');
        if(!recDiv) return;
        recDiv.innerHTML='';
        let items=Object.entries(winRecord).map(([key,c])=>{
            let [n,t]=key.split('|');
            let orig=finalPrizePool.find(p=>p.name===n&&p.type===t);
            return {name:n,type:t,count:c,rarity:orig?orig.rarity:'common'};
        });
        const order={mythic:0,legend:1,rare:2,common:3};
        items.sort((a,b)=>order[a.rarity]-order[b.rarity] || a.name.localeCompare(b.name));
        for(let it of items){
            let card=document.createElement('div');
            card.className=`prize-card ${it.rarity}`;
            card.style.opacity='1'; card.style.transform='none';
            card.innerHTML=`<div class="prize-type">${it.type}</div><div class="prize-name">${it.name}</div>`;
            if(it.count>1){
                let b=document.createElement('div'); b.className='badge-count'; b.innerText=`×${it.count}`; card.appendChild(b);
            }
            recDiv.appendChild(card);
        }
        if(!items.length) recDiv.innerHTML='<div style="color:#aaa; text-align:center; width:100%;">暂无记录</div>';
    }

    function getRandomPrize(){
        let total=finalPrizePool.reduce((s,p)=>s+p.weight,0);
        let r=Math.random()*total;
        for(let p of finalPrizePool){ r-=p.weight; if(r<=0) return p; }
        return finalPrizePool[0];
    }
    function triggerFlash(r){
        if(r==='mythic'){ let f=document.createElement('div'); f.className='mythic-flash'; document.body.appendChild(f); setTimeout(()=>f.remove(),1000); }
        else if(r==='legend'){ let f=document.createElement('div'); f.className='legend-flash'; document.body.appendChild(f); setTimeout(()=>f.remove(),1000); }
    }
    function createCard(prize,parent,animate=false){
        let card=document.createElement('div');
        card.className=`prize-card ${prize.rarity}`;
        card.innerHTML=`<div class="prize-type">${prize.type}</div><div class="prize-name">${prize.name}</div>`;
        parent.appendChild(card);
        if(animate){ setTimeout(()=>card.classList.add('animate'),30); }
        else { card.style.opacity='1'; card.style.transform='translateY(0) rotateY(0) scale(1)'; }
        return card;
    }

    let isDrawing=false;
    function setBtnsDisabled(dis){
        document.querySelectorAll('.draw-btn').forEach(btn=>btn.disabled=dis);
    }

    // 单抽
    async function singleDraw(){
        if(isDrawing) return;
        isDrawing=true; setBtnsDisabled(true);
        const resDiv=document.getElementById('result');
        resDiv.innerHTML='';
        const prize=getRandomPrize();
        addToRecord(prize);
        const groupDiv=document.createElement('div');
        groupDiv.className=`group-title group-${prize.rarity}`;
        let gn=prize.rarity==='mythic'?'✨ 彩级 · 究极神物 ✨':prize.rarity==='legend'?'⭐ 金级 · 传说至宝 ⭐':prize.rarity==='rare'?'💜 紫级 · 稀有珍藏 💜':'🤍 白级 · 万象经典 🤍';
        groupDiv.innerText=gn;
        resDiv.appendChild(groupDiv);
        setTimeout(()=>createCard(prize,resDiv,true),30);
        if(prize.rarity==='mythic'||prize.rarity==='legend') triggerFlash(prize.rarity);
        setTimeout(()=>{ setBtnsDisabled(false); isDrawing=false; },800);
    }

    // 10连抽
    async function tenDraw(){
        if(isDrawing) return;
        isDrawing=true; setBtnsDisabled(true);
        const resDiv=document.getElementById('result');
        resDiv.innerHTML='';
        let drawn=[];
        for(let i=0;i<10;i++){ let p=getRandomPrize(); drawn.push(p); addToRecord(p,true); }
        renderRecord();
        const order={mythic:0,legend:1,rare:2,common:3};
        let sorted=[...drawn].sort((a,b)=>order[a.rarity]-order[b.rarity]);
        let last=null,delay=0;
        for(let p of sorted){
            if(p.rarity!==last){
                last=p.rarity;
                let gd=document.createElement('div'); gd.className=`group-title group-${p.rarity}`;
                let gn=p.rarity==='mythic'?'✨ 彩级 · 究极神物 ✨':p.rarity==='legend'?'⭐ 金级 · 传说至宝 ⭐':p.rarity==='rare'?'💜 紫级 · 稀有珍藏 💜':'🤍 白级 · 万象经典 🤍';
                gd.innerText=gn; resDiv.appendChild(gd); setTimeout(()=>gd.style.opacity='1',delay); delay+=80;
            }
            setTimeout(()=>{ createCard(p,resDiv,true); if(p.rarity==='mythic'||p.rarity==='legend') triggerFlash(p.rarity); },delay);
            delay+=220;
        }
        setTimeout(()=>{ setBtnsDisabled(false); isDrawing=false; },delay+500);
    }

    // 100连抽 (快速统计)
    function hundredDraw(){
        if(isDrawing) return;
        isDrawing=true; setBtnsDisabled(true);
        const resDiv=document.getElementById('result');
        resDiv.innerHTML='';
        let counter={mythic:0,legend:0,rare:0,common:0};
        let batchMap={};
        let highRarity=[];
        for(let i=0;i<100;i++){
            let p=getRandomPrize();
            let k=getKey(p);
            batchMap[k]=(batchMap[k]||0)+1;
            counter[p.rarity]++;
            if((p.rarity==='mythic'||p.rarity==='legend') && highRarity.length<100) highRarity.push(p);
        }
        addBatchToRecord(batchMap);
        let statsDiv=document.createElement('div'); statsDiv.className='stats-panel';
        statsDiv.innerHTML=`<div class="stats-title">📊 100连抽统计</div>
            <div class="stats-row"><span>✨ 彩级 (Mythic)</span><span class="mythic-count">${counter.mythic}</span></div>
            <div class="stats-row"><span>⭐ 金级 (Legend)</span><span class="legend-count">${counter.legend}</span></div>
            <div class="stats-row"><span>💜 紫级 (Rare)</span><span class="rare-count">${counter.rare}</span></div>
            <div class="stats-row"><span>🤍 白级 (Common)</span><span class="common-count">${counter.common}</span></div>
            <div class="highlight-list"><strong>🎉 高稀有度一览 (彩/金)</strong><br>${highRarity.map(p=>`<div class="highlight-item">【${p.rarity==='mythic'?'✨':'⭐'}】${p.name} (${p.type})</div>`).join('')||'无'}</div>`;
        resDiv.appendChild(statsDiv);
        if(counter.mythic) triggerFlash('mythic');
        else if(counter.legend) triggerFlash('legend');
        setTimeout(()=>{ setBtnsDisabled(false); isDrawing=false; },800);
    }

    // 通用分片抽奖 (支持超大量自定义)
    async function customDrawWithChunks(totalCount, chunkSize = 2000) {
        if(isDrawing) return;
        isDrawing=true;
        setBtnsDisabled(true);
        const resDiv = document.getElementById('result');
        resDiv.innerHTML = '';
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        progressContainer.style.display = 'block';
        
        let processed = 0;
        let counter = { mythic:0, legend:0, rare:0, common:0 };
        let batchMap = {};
        let highRarity = [];  // 只保留前300个彩/金
        
        while (processed < totalCount) {
            let batchSize = Math.min(chunkSize, totalCount - processed);
            for (let i=0; i<batchSize; i++) {
                let p = getRandomPrize();
                let k = getKey(p);
                batchMap[k] = (batchMap[k]||0) + 1;
                counter[p.rarity]++;
                if ((p.rarity==='mythic'||p.rarity==='legend') && highRarity.length < 300) {
                    highRarity.push(p);
                }
            }
            processed += batchSize;
            let percent = (processed / totalCount * 100).toFixed(1);
            progressBar.style.width = percent + '%';
            progressText.innerText = `正在抽取中... ${processed} / ${totalCount} (${percent}%)`;
            // 让出线程，保持UI响应
            await new Promise(resolve => setTimeout(resolve, 0));
        }
        
        // 批量更新记录
        addBatchToRecord(batchMap);
        
        // 生成报告
        let statsDiv = document.createElement('div'); statsDiv.className = 'stats-panel';
        statsDiv.innerHTML = `<div class="stats-title">📊 ${totalCount}连抽 统计报告</div>
            <div class="stats-row"><span>✨ 彩级 (Mythic)</span><span class="mythic-count">${counter.mythic}</span></div>
            <div class="stats-row"><span>⭐ 金级 (Legend)</span><span class="legend-count">${counter.legend}</span></div>
            <div class="stats-row"><span>💜 紫级 (Rare)</span><span class="rare-count">${counter.rare}</span></div>
            <div class="stats-row"><span>🤍 白级 (Common)</span><span class="common-count">${counter.common}</span></div>
            <div class="highlight-list"><strong>🏆 部分高稀有度展示 (彩/金，最多300)</strong><br>${highRarity.map(p=>`<div class="highlight-item">【${p.rarity==='mythic'?'✨':'⭐'}】${p.name} (${p.type})</div>`).join('')||'无'}</div>`;
        resDiv.appendChild(statsDiv);
        if(counter.mythic) triggerFlash('mythic');
        else if(counter.legend) triggerFlash('legend');
        
        progressContainer.style.display = 'none';
        setBtnsDisabled(false);
        isDrawing = false;
    }
    
    function thousandDraw() { customDrawWithChunks(1000, 1000); }
    function tenThousandDraw() { customDrawWithChunks(10000, 2000); }
    function customDraw() {
        let countInput = document.getElementById('customCount');
        let count = parseInt(countInput.value, 10);
        if (isNaN(count) || count < 1) {
            alert('请输入有效的正整数（≥1）');
            return;
        }
        if (count > 500000) {
            if (!confirm(`抽奖次数高达 ${count} 次，可能会消耗较长时间，确定继续吗？`)) return;
        }
        customDrawWithChunks(count, 2000);
    }

    function initHandbook(){
        const hb=document.getElementById('handbook');
        let sorted=[...finalPrizePool].sort((a,b)=>{ let o={mythic:0,legend:1,rare:2,common:3}; return o[a.rarity]-o[b.rarity]; });
        for(let p of sorted) createCard(p,hb,false);
    }
    window.onload=()=>{ initHandbook(); renderRecord(); };
    document.getElementById('singleDrawBtn').addEventListener('click', singleDraw);
    document.getElementById('drawBtn').addEventListener('click', tenDraw);
    document.getElementById('hundredDrawBtn').addEventListener('click', hundredDraw);
    document.getElementById('thousandDrawBtn').addEventListener('click', thousandDraw);
    document.getElementById('tenkDrawBtn').addEventListener('click', tenThousandDraw);
    document.getElementById('customDrawBtn').addEventListener('click', customDraw);
</script>
