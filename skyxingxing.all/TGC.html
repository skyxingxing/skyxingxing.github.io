<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TGC · 跃迁传送门</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0710;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态深邃背景 —— 流动星云 + 柔和光晕 */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(120, 80, 200, 0.25) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(255, 140, 200, 0.2) 0%, transparent 35%),
                        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.02) 0px, rgba(255, 255, 255, 0.02) 2px, 
                                                  transparent 2px, transparent 8px),
                        linear-gradient(145deg, #0a051e 0%, #18122f 100%);
            z-index: -2;
        }

        /* 浮动的光点层 — 增加梦幻感 */
        body::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg width="70" height="70" viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="15" r="1.8" fill="rgba(200,180,255,0.25)"/><circle cx="52" cy="35" r="2.2" fill="rgba(160,130,255,0.2)"/><circle cx="30" cy="60" r="1.5" fill="rgba(220,170,255,0.3)"/><circle cx="68" cy="12" r="1.2" fill="rgba(180,210,255,0.2)"/></svg>');
            background-size: 90px 90px;
            opacity: 0.5;
            animation: floatDots 48s linear infinite;
            z-index: -1;
        }

        @keyframes floatDots {
            0% { background-position: 0 0; }
            100% { background-position: 180px 180px; }
        }

        /* 主卡片 — 半透明磨砂 + 科技光边 */
        .gateway {
            background: rgba(18, 20, 42, 0.55);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 5rem;
            padding: 3rem 4rem;
            border: 1px solid rgba(180, 150, 255, 0.3);
            box-shadow: 0 40px 70px -15px rgba(0, 0, 0, 0.9),
                        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
                        0 0 40px rgba(140, 100, 255, 0.3);
            transition: box-shadow 0.4s ease;
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .gateway:hover {
            box-shadow: 0 50px 90px -15px #2a1f60,
                        0 0 0 1px rgba(210, 190, 255, 0.4) inset,
                        0 0 70px #8f7eff;
        }

        /* 按钮 — 霓虹光晕 + 流光纹理 */
        .warp-button {
            position: relative;
            background: linear-gradient(125deg, #3a2b8c, #21185e);
            color: #f5f0ff;
            border: none;
            padding: 1.5rem 3.8rem;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            border-radius: 4rem;
            cursor: pointer;
            box-shadow: 0 15px 25px -5px #100e2c,
                        0 0 0 2px rgba(180, 150, 255, 0.5) inset,
                        0 0 20px #7a6aff;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            overflow: hidden;
            z-index: 2;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
        }

        /* 动态流光环 (旋转光晕) */
        .warp-button::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -60%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg at 50% 50%, 
                        transparent 0deg, 
                        rgba(255, 245, 200, 0.2) 25deg, 
                        rgba(200, 180, 255, 0.5) 55deg, 
                        transparent 100deg);
            animation: rotateGlow 8s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .warp-button:hover {
            transform: scale(1.06) translateY(-4px);
            background: linear-gradient(125deg, #4f3aa8, #2e2280);
            box-shadow: 0 25px 35px -5px #2c2360,
                        0 0 0 2px rgba(240, 220, 255, 0.8) inset,
                        0 0 45px #b09eff;
        }

        .warp-button:active {
            transform: scale(0.96) translateY(3px);
            box-shadow: 0 12px 20px -3px #1c154b,
                        0 0 0 2px rgba(200, 180, 255, 0.6) inset;
        }

        /* 图标粒子效果 */
        .game-icon {
            display: inline-block;
            font-size: 2.5rem;
            filter: drop-shadow(0 0 8px #c2b0ff);
            transition: transform 0.3s ease;
        }

        .warp-button:hover .game-icon {
            transform: translate(4px, -4px) rotate(6deg);
        }

        /* 点击跃迁动画 — 华丽消失 + 扭曲 */
        .warp-button.warp-out {
            animation: hyperjump 0.7s cubic-bezier(0.6, 0.1, 0.3, 1) forwards;
            pointer-events: none;
        }

        @keyframes hyperjump {
            0% {
                transform: scale(1) translateY(0) rotate(0deg);
                opacity: 1;
                filter: blur(0px);
                box-shadow: 0 15px 25px -5px #0e0c2c, 0 0 0 2px rgba(180,150,255,0.5) inset, 0 0 20px #7a6aff;
            }
            20% {
                transform: scale(1.3) translateY(-45px) rotate(4deg);
                opacity: 1;
                filter: blur(1px);
                box-shadow: 0 35px 45px 0px #4f3dbb, 0 0 0 3px #d4c0ff inset, 0 0 60px #9e8cff;
            }
            45% {
                transform: scale(0.95) translateY(20px) rotate(-6deg) skewX(4deg);
                opacity: 0.8;
                filter: blur(5px);
                box-shadow: 0 20px 30px -5px #392d86, 0 0 0 3px #ede0ff inset, 0 0 75px #b7a5ff;
            }
            75% {
                transform: scale(0.5) translateY(120px) rotate(-18deg);
                opacity: 0.3;
                filter: blur(12px);
                box-shadow: 0 0 30px 15px #6b56dd;
            }
            100% {
                transform: scale(0) translateY(280px) rotate(-35deg);
                opacity: 0;
                filter: blur(18px);
                box-shadow: 0 0 45px 25px #8e77ff;
            }
        }

        /* 下方装饰文字 */
        .hint {
            text-align: center;
            margin-top: 2.2rem;
            color: #b8ade6;
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.7;
            transition: opacity 0.3s, text-shadow 0.3s;
            text-shadow: 0 0 8px rgba(150, 130, 255, 0.3);
        }

        .gateway:hover .hint {
            opacity: 1;
            text-shadow: 0 0 18px #bdb0ff;
        }

        /* 卡片顶部流光线条 */
        .gateway::after {
            content: "";
            position: absolute;
            top: -2px;
            left: 15%;
            width: 70%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #cbb5ff, #a38eff, transparent);
            border-radius: 50%;
            filter: blur(3px);
            opacity: 0.7;
            animation: borderPulse 3.5s infinite;
        }

        @keyframes borderPulse {
            0% { opacity: 0.4; width: 45%; left: 27.5%; }
            50% { opacity: 1; width: 78%; left: 11%; }
            100% { opacity: 0.4; width: 45%; left: 27.5%; }
        }

        /* 响应式适应 */
        @media (max-width: 580px) {
            .gateway {
                padding: 2rem 1.8rem;
                border-radius: 3rem;
                margin: 1rem;
            }
            .warp-button {
                padding: 1.2rem 2rem;
                font-size: 1.5rem;
                gap: 0.6rem;
                white-space: normal;
                word-break: keep-all;
            }
            .game-icon {
                font-size: 2rem;
            }
            .hint {
                font-size: 0.85rem;
                margin-top: 1.5rem;
            }
        }

        /* 极简但保留气质 */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            border: 0;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="gateway">
        <!-- 主按钮：我最喜欢的游戏公司 — Thatgamecompany -->
        <button class="warp-button" id="tgcWarpBtn">
            <span>✨ 我最喜欢的游戏公司 ✨</span>
            <span class="game-icon">🎮</span>
        </button>
        <div class="hint">
            ✦ 点击跃迁 · 前往 TGC 光之世界 ✦
        </div>
    </div>

    <script>
        (function() {
            const btn = document.getElementById('tgcWarpBtn');
            // Thatgamecompany 官方网址 (https://thatgamecompany.com/)
            const targetUrl = 'https://thatgamecompany.com/';
            let isWarping = false;

            if (!btn) return;

            btn.addEventListener('click', function(e) {
                e.preventDefault();     // 阻止任何默认跳跃前的干扰

                if (isWarping) return;   // 动画未完成时不能重复触发

                // 添加跃迁动画类
                btn.classList.add('warp-out');
                isWarping = true;

                // 动画时长与CSS动画保持一致 (0.7秒)
                setTimeout(() => {
                    // 跳转到 TGC 官网
                    window.location.href = targetUrl;
                    // 页面跳转后当前页面销毁，无需额外清理
                }, 700);  // 700ms 与 hyperjump 动画时长精确匹配
            });
        })();
    </script>
</body>
</html>
