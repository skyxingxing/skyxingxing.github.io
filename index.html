<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>星星的梦幻主页 · 物理小球</title>
    <!-- 引入不蒜子计数器脚本 -->
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <style>
        /* 全局设置 */
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', sans-serif;
            background-image: url('https://cdn.pixabay.com/photo/2017/08/30/01/05/milky-way-2695569_1280.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #0a0c10;
        }

        /* 画布：用于绘制闪烁的星星 */
        #starCanvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 标题容器 */
        .title-container {
            position: fixed;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            animation: titleRise 2s ease-out forwards;
        }

        /* 标题纯文字 */
        .pure-title {
            display: inline-block;
            font-size: 48px;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            letter-spacing: 4px;
        }

        @keyframes titleRise {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 按钮容器 */
        .button-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 6;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .collidable-btn {
            /* 仅用于标识碰撞箱 */
        }

        /* 液态玻璃按钮 */
        .liquid-glass-btn {
            display: inline-block;
            padding: 18px 45px;
            font-size: 26px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            letter-spacing: 2px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.1) 70%);
            border-radius: 80px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 
                0 0 20px rgba(255, 255, 255, 0.2),
                inset 2px 2px 5px rgba(255, 255, 255, 0.5),
                inset -2px -2px 5px rgba(0, 0, 0, 0.1);
            transition: all 0.4s ease;
            cursor: pointer;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .liquid-glass-btn:hover {
            transform: scale(1.05);
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.15) 70%);
            box-shadow: 
                0 0 30px rgba(255, 255, 255, 0.4),
                inset 3px 3px 8px rgba(255, 255, 255, 0.6),
                inset -3px -3px 8px rgba(0, 0, 0, 0.15);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .liquid-glass-btn:active {
            transform: scale(0.98);
        }

        /* 管理面板 */
        .manage-panel {
            position: fixed;
            top: 60%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 7;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.1) 70%);
            backdrop-filter: blur(5px);
            border-radius: 60px;
            padding: 15px 30px;
            display: flex;
            gap: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: opacity 0.3s;
            opacity: 0;
            pointer-events: none;
        }
        .manage-panel.show {
            opacity: 1;
            pointer-events: auto;
        }
        .manage-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: inset 0 0 5px rgba(255,255,255,0.3);
            white-space: nowrap;
        }
        .manage-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }
        .manage-btn.active {
            background: rgba(255, 100, 100, 0.5);
            border-color: rgba(255, 200, 200, 0.8);
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
        }
        body.delete-mode {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><path fill="white" stroke="black" stroke-width="2" d="M8 4 L24 4 L28 12 L24 20 L8 20 L4 12 L8 4 Z M10 8 L14 8 L14 16 L10 16 L10 8 Z M18 8 L22 8 L22 16 L18 16 L18 8 Z M12 22 L20 22 L18 28 L14 28 L12 22 Z"/></svg>') 16 16, auto;
        }
        body.delete-mode .ball {
            filter: drop-shadow(0 0 8px red);
            transition: filter 0.1s;
        }

        /* 模态框遮罩 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            z-index: 10;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            backdrop-filter: blur(2px);
        }

        .modal-content {
            width: 80%;
            max-width: 400px;
            max-height: 60vh;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.1) 70%);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2), inset 2px 2px 5px rgba(255, 255, 255, 0.5), inset -2px -2px 5px rgba(0, 0, 0, 0.1);
            color: white;
            transform: translateY(100%);
            transition: transform 0.4s ease-out;
            overflow-y: auto;
        }

        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }

        .modal-overlay.hide .modal-content {
            transform: translateY(100%);
        }

        .friend-list {
            list-style: none;
            padding: 0;
            margin: 20px 0 0;
            text-align: left;
        }

        .friend-list li {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 12px 20px;
            margin-bottom: 10px;
            font-size: 18px;
            font-family: monospace;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .modal-title {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .modal-sub {
            text-align: center;
            font-size: 16px;
            opacity: 0.8;
            margin-top: -5px;
        }

        .close-hint {
            text-align: center;
            font-size: 14px;
            opacity: 0.6;
            margin-top: 15px;
            font-style: italic;
        }

        /* 小球样式 */
        .ball {
            position: fixed;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            z-index: 5;
            cursor: grab;
            user-select: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            will-change: left, top;
            transition: box-shadow 0.1s;
            touch-action: none; /* 禁止触摸时页面滚动 */
        }

        .ball-liquid {
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8) 5%, rgba(255, 255, 255, 0.2) 60%, rgba(255, 255, 255, 0) 80%);
            background-color: rgba(100, 200, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 
                0 0 20px rgba(255, 255, 255, 0.3),
                inset 5px 5px 10px rgba(255, 255, 255, 0.6),
                inset -5px -5px 10px rgba(0, 0, 0, 0.2);
        }

        .ball-frosted {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 
                0 0 30px rgba(255, 255, 255, 0.2),
                inset 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .ball:active {
            cursor: grabbing;
        }

        /* 访问计数器 */
        .visit-counter {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 16px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none;
            font-family: 'Microsoft YaHei', sans-serif;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .pure-title {
                font-size: 32px;
            }
            .liquid-glass-btn {
                font-size: 22px;
                padding: 15px 35px;
            }
            .modal-content {
                width: 90%;
                padding: 20px;
            }
            .friend-list li {
                font-size: 16px;
                padding: 10px 15px;
            }
            .ball {
                width: 60px;
                height: 60px;
            }
            .manage-panel {
                top: 65%;
                padding: 10px 15px;
                gap: 10px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .manage-btn {
                font-size: 14px;
                padding: 8px 12px;
            }
            .visit-counter {
                bottom: 10px;
                right: 10px;
                font-size: 14px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="starCanvas"></canvas>

    <!-- 初始两个小球 -->
    <div class="ball ball-liquid" id="ballLiquid"></div>
    <div class="ball ball-frosted" id="ballFrosted"></div>

    <div class="title-container">
        <div class="pure-title">✨ 欢迎来到星星的网页 ✨</div>
    </div>

    <div class="button-container">
        <button class="liquid-glass-btn collidable-btn" onclick="window.open('https://www.douyin.com/user/MS4wLjABAAAAJJh4FxMqbYWsxMzsWNA6-loe2r78IwfbvLA7GK3JiA8PI_IKH7OGeleF4TY_ikOb?from_tab_name=main', '_blank')">
            ✨ 去星星的抖音 ✨
        </button>
        <button class="liquid-glass-btn collidable-btn" id="friendBtn">
            ✨ 添加星星的好友 ✨
        </button>
        <!-- 新增管理小球按钮 -->
        <button class="liquid-glass-btn collidable-btn" id="manageBallBtn">
            ✨ 管理小球 ✨
        </button>
    </div>

    <!-- 管理面板（默认隐藏） -->
    <div class="manage-panel" id="managePanel">
        <button class="manage-btn" id="deleteModeBtn">🔨 删除模式</button>
        <button class="manage-btn" id="addLiquidBtn">➕ 新增液态球</button>
        <button class="manage-btn" id="addFrostedBtn">➕ 新增磨砂球</button>
    </div>

    <!-- 模态框（好友码） -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-title">🌟 星星的好友码</div>
            <div class="modal-sub">选择一个复制添加</div>
            <ul class="friend-list" id="friendList"></ul>
            <div class="close-hint">点击空白处关闭</div>
        </div>
    </div>

    <!-- 访问计数器（使用不蒜子） -->
    <div class="visit-counter">
        👁️ 总访问人次：<span id="busuanzi_value_site_pv"></span>
    </div>

    <script>
        (function() {
            // ---------- 闪烁星星动画 ----------
            const canvas = document.getElementById('starCanvas');
            const ctx = canvas.getContext('2d');

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            const stars = [];
            const starCount = 200;
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2 + 1,
                    brightness: Math.random() * 0.8 + 0.2,
                    speed: 0.002 + Math.random() * 0.005
                });
            }

            function animateStars() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(star => {
                    const twinkle = Math.sin(Date.now() * star.speed + star.x) * 0.2 + 0.8;
                    const alpha = star.brightness * twinkle;
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    ctx.fill();
                });
                requestAnimationFrame(animateStars);
            }
            animateStars();

            // ---------- 好友码数据 ----------
            const friendCodesRaw = "abc123,def456,ghi789,jkl012,mno345"; // 可修改
            const friendCodes = friendCodesRaw.split(/[，,]+/).filter(code => code.trim() !== '');
            const friendList = document.getElementById('friendList');
            friendList.innerHTML = friendCodes.map(code => `<li>${code.trim()}</li>`).join('');

            // ---------- 模态框逻辑 ----------
            const modalOverlay = document.getElementById('modalOverlay');
            const friendBtn = document.getElementById('friendBtn');

            let isModalOpen = false;
            let hideTimeout = null;

            // 获取小球元素（动态数组，会变化）
            const ballLiquid = document.getElementById('ballLiquid');
            const ballFrosted = document.getElementById('ballFrosted');
            let balls = [ballLiquid, ballFrosted]; // 后续会动态更新

            // ---------- 管理小球相关 ----------
            const manageBtn = document.getElementById('manageBallBtn');
            const managePanel = document.getElementById('managePanel');
            const deleteModeBtn = document.getElementById('deleteModeBtn');
            const addLiquidBtn = document.getElementById('addLiquidBtn');
            const addFrostedBtn = document.getElementById('addFrostedBtn');

            let deleteMode = false; // 是否处于删除模式

            // 显示/隐藏管理面板
            manageBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                managePanel.classList.toggle('show');
            });

            // 点击其他地方隐藏管理面板
            document.addEventListener('click', (e) => {
                if (!managePanel.contains(e.target) && e.target !== manageBtn) {
                    managePanel.classList.remove('show');
                }
            });

            // 删除模式切换
            deleteModeBtn.addEventListener('click', () => {
                deleteMode = !deleteMode;
                deleteModeBtn.classList.toggle('active', deleteMode);
                if (deleteMode) {
                    document.body.classList.add('delete-mode');
                } else {
                    document.body.classList.remove('delete-mode');
                }
            });

            // 新增液态玻璃球
            addLiquidBtn.addEventListener('click', () => {
                createNewBall('liquid');
            });

            // 新增磨砂玻璃球
            addFrostedBtn.addEventListener('click', () => {
                createNewBall('frosted');
            });

            // 创建新球的函数
            function createNewBall(type) {
                const id = 'ball_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                const ballDiv = document.createElement('div');
                ballDiv.className = `ball ball-${type}`;
                ballDiv.id = id;
                document.body.appendChild(ballDiv);

                const ballSize = 80; // 与CSS一致
                const maxLeft = window.innerWidth - ballSize;
                const left = Math.random() * maxLeft;
                const top = -100; // 从上方掉下

                ballDiv.style.left = left + 'px';
                ballDiv.style.top = top + 'px';

                balls.push(ballDiv);

                const radius = ballSize / 2;
                const physicsObj = {
                    x: left,
                    y: top,
                    vx: (Math.random() - 0.5) * 2,
                    vy: Math.random() * 2,
                    radius: radius,
                    dragging: false,
                    mass: 1,
                    id: id,
                    lastMouseX: 0, lastMouseY: 0, lastMouseTime: 0,
                    dragOffsetX: 0, dragOffsetY: 0,
                    touchId: null // 用于触摸识别
                };
                physics.push(physicsObj);
            }

            // ---------- 删除小球（带破碎效果）----------
            function deleteBall(ballElement) {
                const id = ballElement.id;
                // 找到对应的物理对象
                const pIndex = physics.findIndex(p => p.id === id);
                if (pIndex === -1) return;
                const p = physics[pIndex];

                // 获取小球的类型（液态还是磨砂）
                const isLiquid = ballElement.classList.contains('ball-liquid');
                const type = isLiquid ? 'liquid' : 'frosted';

                // 原球的位置、速度、半径
                const x = p.x;
                const y = p.y;
                const vx = p.vx;
                const vy = p.vy;
                const originalRadius = p.radius;

                // 从物理数组和DOM移除原球
                physics.splice(pIndex, 1);
                const ballIndex = balls.findIndex(b => b.id === id);
                if (ballIndex !== -1) balls.splice(ballIndex, 1);
                ballElement.remove();

                // 生成碎片：4~6个
                const fragmentCount = 4 + Math.floor(Math.random() * 3); // 4~6
                for (let i = 0; i < fragmentCount; i++) {
                    // 碎片半径：原半径的0.2~0.4
                    const fragRadius = originalRadius * (0.2 + Math.random() * 0.2);
                    // 碎片位置：在原球中心附近随机偏移
                    const angle = Math.random() * Math.PI * 2;
                    const dist = originalRadius * 0.5 * Math.random();
                    const fragX = x + Math.cos(angle) * dist;
                    const fragY = y + Math.sin(angle) * dist;

                    // 碎片速度：在原球速度基础上加随机
                    const fragVx = vx + (Math.random() - 0.5) * 4;
                    const fragVy = vy + (Math.random() - 0.5) * 4 - 2; // 略微向上飘散

                    // 创建碎片DOM
                    const fragId = 'frag_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                    const fragDiv = document.createElement('div');
                    fragDiv.className = `ball ball-${type}`; // 继承原球样式
                    fragDiv.id = fragId;
                    fragDiv.style.width = (fragRadius * 2) + 'px';
                    fragDiv.style.height = (fragRadius * 2) + 'px';
                    fragDiv.style.left = fragX + 'px';
                    fragDiv.style.top = fragY + 'px';
                    document.body.appendChild(fragDiv);
                    balls.push(fragDiv);

                    // 碎片物理对象
                    const fragPhysics = {
                        x: fragX,
                        y: fragY,
                        vx: fragVx,
                        vy: fragVy,
                        radius: fragRadius,
                        dragging: false,
                        mass: 0.3, // 质量轻一些
                        id: fragId,
                        lastMouseX: 0, lastMouseY: 0, lastMouseTime: 0,
                        dragOffsetX: 0, dragOffsetY: 0,
                        touchId: null
                    };
                    physics.push(fragPhysics);

                    // 设置定时器，2秒后移除碎片
                    setTimeout(() => {
                        const idx = physics.findIndex(fp => fp.id === fragId);
                        if (idx !== -1) {
                            physics.splice(idx, 1);
                        }
                        const ballIdx = balls.findIndex(b => b.id === fragId);
                        if (ballIdx !== -1) {
                            balls.splice(ballIdx, 1);
                        }
                        const fragElem = document.getElementById(fragId);
                        if (fragElem) fragElem.remove();
                    }, 2000);
                }
            }

            // ---------- 物理引擎相关 ----------
            const BASE_GRAVITY = 0.3;      // 基础重力加速度
            const GRAVITY_SENSITIVITY = 0.2; // 重力感应灵敏度（避免太灵敏）
            let gravityX = 0;
            let gravityY = BASE_GRAVITY;

            const BOUNCE = 0.7;
            const FRICTION = 0.99;
            const BUTTON_BOUNCE = 0.6;

            const physics = [];

            // 初始化两个小球的物理状态
            function initPhysics() {
                balls.forEach((ball, idx) => {
                    const rect = ball.getBoundingClientRect();
                    const radius = rect.width / 2;
                    physics[idx] = {
                        x: parseFloat(ball.style.left) || rect.left,
                        y: parseFloat(ball.style.top) || rect.top,
                        vx: (Math.random() - 0.5) * 2,
                        vy: Math.random() * 2,
                        radius: radius,
                        dragging: false,
                        mass: 1,
                        id: ball.id,
                        lastMouseX: 0, lastMouseY: 0, lastMouseTime: 0,
                        dragOffsetX: 0, dragOffsetY: 0,
                        touchId: null
                    };
                });
            }
            initPhysics();

            const collidableBtns = document.querySelectorAll('.collidable-btn');
            let buttonRects = [];

            function updateButtonRects() {
                buttonRects = Array.from(collidableBtns).map(btn => {
                    const rect = btn.getBoundingClientRect();
                    return {
                        left: rect.left,
                        top: rect.top,
                        right: rect.right,
                        bottom: rect.bottom,
                        width: rect.width,
                        height: rect.height
                    };
                });
            }
            updateButtonRects();
            window.addEventListener('resize', updateButtonRects);

            function handleCollisionWithButton(p, rect) {
                const closestX = Math.max(rect.left, Math.min(p.x, rect.right));
                const closestY = Math.max(rect.top, Math.min(p.y, rect.bottom));

                const dx = p.x - closestX;
                const dy = p.y - closestY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const minDist = p.radius;

                if (dist < minDist && dist > 0.001) {
                    const nx = dx / dist;
                    const ny = dy / dist;

                    const overlap = minDist - dist;
                    p.x += nx * overlap;
                    p.y += ny * overlap;

                    const vn = p.vx * nx + p.vy * ny;
                    if (vn < 0) {
                        const vt_x = p.vx - vn * nx;
                        const vt_y = p.vy - vn * ny;
                        p.vx = vt_x - vn * BUTTON_BOUNCE * nx;
                        p.vy = vt_y - vn * BUTTON_BOUNCE * ny;
                    }
                    return true;
                }
                return false;
            }

            function updatePhysics() {
                const width = window.innerWidth;
                const height = window.innerHeight;

                physics.forEach((p, idx) => {
                    if (p.dragging) return;

                    p.vx *= FRICTION;
                    p.vy *= FRICTION;
                    p.vx += gravityX;
                    p.vy += gravityY;

                    let newX = p.x + p.vx;
                    let newY = p.y + p.vy;

                    const r = p.radius;
                    if (newX < r) { newX = r; p.vx = -p.vx * BOUNCE; }
                    if (newX > width - r) { newX = width - r; p.vx = -p.vx * BOUNCE; }
                    if (newY < r) { newY = r; p.vy = -p.vy * BOUNCE; }
                    if (newY > height - r) { newY = height - r; p.vy = -p.vy * BOUNCE; }

                    p.x = newX;
                    p.y = newY;

                    const ball = document.getElementById(p.id);
                    if (ball) {
                        ball.style.left = p.x + 'px';
                        ball.style.top = p.y + 'px';
                    }
                });

                // 小球之间碰撞
                for (let i = 0; i < physics.length; i++) {
                    for (let j = i + 1; j < physics.length; j++) {
                        const p1 = physics[i];
                        const p2 = physics[j];
                        if (p1.dragging && p2.dragging) continue;

                        const dx = p2.x - p1.x;
                        const dy = p2.y - p1.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const minDist = p1.radius + p2.radius;

                        if (dist < minDist && dist > 0.001) {
                            const nx = dx / dist;
                            const ny = dy / dist;
                            const vRelX = p2.vx - p1.vx;
                            const vRelY = p2.vy - p1.vy;
                            const vRelN = vRelX * nx + vRelY * ny;

                            if (vRelN < 0) {
                                const e = 0.7;
                                const impulse = -(1 + e) * vRelN / (1/p1.mass + 1/p2.mass);
                                if (!p1.dragging) {
                                    p1.vx -= impulse / p1.mass * nx;
                                    p1.vy -= impulse / p1.mass * ny;
                                }
                                if (!p2.dragging) {
                                    p2.vx += impulse / p2.mass * nx;
                                    p2.vy += impulse / p2.mass * ny;
                                }

                                const overlap = minDist - dist;
                                if (!p1.dragging && !p2.dragging) {
                                    p1.x -= overlap * nx * 0.5;
                                    p1.y -= overlap * ny * 0.5;
                                    p2.x += overlap * nx * 0.5;
                                    p2.y += overlap * ny * 0.5;
                                } else if (!p1.dragging) {
                                    p1.x -= overlap * nx;
                                    p1.y -= overlap * ny;
                                } else if (!p2.dragging) {
                                    p2.x += overlap * nx;
                                    p2.y += overlap * ny;
                                }
                            }
                        }
                    }
                }

                // 小球与按钮碰撞
                physics.forEach(p => {
                    if (p.dragging) return;
                    buttonRects.forEach(rect => {
                        handleCollisionWithButton(p, rect);
                    });
                    const ball = document.getElementById(p.id);
                    if (ball) {
                        ball.style.left = p.x + 'px';
                        ball.style.top = p.y + 'px';
                    }
                });
            }

            function animate() {
                updatePhysics();
                requestAnimationFrame(animate);
            }
            animate();

            // ---------- 设备方向重力感应 ----------
            function handleOrientation(event) {
                // 获取设备的倾斜角度（单位：度）
                // beta: 前后倾斜（-180~180），手机竖屏时平放为0，向前倾斜为正
                // gamma: 左右倾斜（-90~90），向右倾斜为正
                let beta = event.beta;    // 前后
                let gamma = event.gamma;  // 左右

                // 限制范围，避免过于极端
                if (beta === null || gamma === null) return;

                // 将角度映射到重力分量，最大倾斜90度对应最大重力
                const maxAngle = 60; // 最大有效角度，超过时重力不再增加
                let x = gamma / maxAngle;
                let y = beta / maxAngle;
                // 限制在[-1,1]范围内
                x = Math.max(-1, Math.min(1, x));
                y = Math.max(-1, Math.min(1, y));

                // 调整灵敏度，并保持基础重力向下
                gravityX = x * BASE_GRAVITY * GRAVITY_SENSITIVITY;
                gravityY = BASE_GRAVITY + y * BASE_GRAVITY * GRAVITY_SENSITIVITY; // 基础向下加上前后倾斜影响
            }

            // 请求设备运动权限（iOS 13+ 需要）
            function requestDeviceOrientation() {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    // iOS 需要请求权限
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation);
                            }
                        })
                        .catch(console.error);
                } else {
                    // 非iOS或旧版本，直接监听
                    window.addEventListener('deviceorientation', handleOrientation);
                }
            }

            // 启动重力感应（可以在用户点击后请求，避免自动请求被拒）
            // 这里简单地在页面加载后尝试请求（需要用户交互触发？iOS要求用户手势触发）
            // 为了兼容，可以在任意按钮点击后请求。我们可以在管理面板中添加一个按钮，或者简单地在document触摸时请求。
            // 这里简单地在页面加载后尝试，但iOS会失败，所以我们增加一个按钮来手动开启。
            // 增加一个隐藏的开关？为了简化，我们直接在body上绑定一次触摸事件来请求权限。
            function enableOrientationOnUserGesture() {
                requestDeviceOrientation();
                // 移除监听，只触发一次
                document.removeEventListener('touchstart', enableOrientationOnUserGesture);
                document.removeEventListener('click', enableOrientationOnUserGesture);
            }
            document.addEventListener('touchstart', enableOrientationOnUserGesture);
            document.addEventListener('click', enableOrientationOnUserGesture);

            // 如果没有权限，至少保持默认重力
            // ---------- 事件监听（支持鼠标和触摸）----------
            function getPointerEvent(e) {
                if (e.touches) {
                    return e.touches[0];
                }
                return e;
            }

            function handlePointerStart(e) {
                const target = e.target;
                if (!target.classList.contains('ball')) return;

                // 阻止默认事件（避免页面滚动）
                e.preventDefault();

                // 如果是删除模式，则删除小球
                if (deleteMode) {
                    deleteBall(target);
                    return;
                }

                const pointer = getPointerEvent(e);
                const id = target.id;
                const p = physics.find(p => p.id === id);
                if (!p) return;

                // 如果已经拖拽中，忽略
                if (p.dragging) return;

                p.dragging = true;
                target.style.cursor = 'grabbing';

                // 记录触摸点ID（用于多点触摸）
                if (e.touches) {
                    p.touchId = e.touches[0].identifier;
                }

                const rect = target.getBoundingClientRect();
                p.dragOffsetX = pointer.clientX - rect.left;
                p.dragOffsetY = pointer.clientY - rect.top;

                p.lastMouseX = pointer.clientX;
                p.lastMouseY = pointer.clientY;
                p.lastMouseTime = performance.now();

                p.vx = 0;
                p.vy = 0;
            }

            function handlePointerMove(e) {
                // 阻止默认滚动
                e.preventDefault();

                const pointer = getPointerEvent(e);
                physics.forEach(p => {
                    if (!p.dragging) return;

                    // 对于触摸，检查是否是同一个触摸点
                    if (e.touches && p.touchId !== undefined) {
                        // 找到对应的touch
                        let matchedTouch = null;
                        for (let i = 0; i < e.touches.length; i++) {
                            if (e.touches[i].identifier === p.touchId) {
                                matchedTouch = e.touches[i];
                                break;
                            }
                        }
                        if (!matchedTouch) return; // 不是这个触摸点
                        // 使用matchedTouch更新位置
                        const ball = document.getElementById(p.id);
                        if (!ball) return;

                        let newLeft = matchedTouch.clientX - p.dragOffsetX;
                        let newTop = matchedTouch.clientY - p.dragOffsetY;

                        const ballSize = ball.offsetWidth;
                        const maxLeft = window.innerWidth - ballSize;
                        const maxTop = window.innerHeight - ballSize;
                        newLeft = Math.max(0, Math.min(newLeft, maxLeft));
                        newTop = Math.max(0, Math.min(newTop, maxTop));

                        p.x = newLeft;
                        p.y = newTop;
                        ball.style.left = newLeft + 'px';
                        ball.style.top = newTop + 'px';

                        const now = performance.now();
                        const dt = now - p.lastMouseTime;
                        if (dt > 5) {
                            p.vx = (matchedTouch.clientX - p.lastMouseX) / dt * 15;
                            p.vy = (matchedTouch.clientY - p.lastMouseY) / dt * 15;
                            p.lastMouseX = matchedTouch.clientX;
                            p.lastMouseY = matchedTouch.clientY;
                            p.lastMouseTime = now;
                        }
                    } else if (!e.touches) {
                        // 鼠标移动
                        const ball = document.getElementById(p.id);
                        if (!ball) return;

                        let newLeft = pointer.clientX - p.dragOffsetX;
                        let newTop = pointer.clientY - p.dragOffsetY;

                        const ballSize = ball.offsetWidth;
                        const maxLeft = window.innerWidth - ballSize;
                        const maxTop = window.innerHeight - ballSize;
                        newLeft = Math.max(0, Math.min(newLeft, maxLeft));
                        newTop = Math.max(0, Math.min(newTop, maxTop));

                        p.x = newLeft;
                        p.y = newTop;
                        ball.style.left = newLeft + 'px';
                        ball.style.top = newTop + 'px';

                        const now = performance.now();
                        const dt = now - p.lastMouseTime;
                        if (dt > 5) {
                            p.vx = (pointer.clientX - p.lastMouseX) / dt * 15;
                            p.vy = (pointer.clientY - p.lastMouseY) / dt * 15;
                            p.lastMouseX = pointer.clientX;
                            p.lastMouseY = pointer.clientY;
                            p.lastMouseTime = now;
                        }
                    }
                });
            }

            function handlePointerEnd(e) {
                // 触摸结束
                if (e.touches) {
                    // 遍历所有physics，释放对应touchId的拖拽
                    physics.forEach(p => {
                        if (p.dragging && p.touchId !== undefined) {
                            // 检查该touch是否还在touches中（如果有多个触摸点）
                            let stillExists = false;
                            for (let i = 0; i < e.touches.length; i++) {
                                if (e.touches[i].identifier === p.touchId) {
                                    stillExists = true;
                                    break;
                                }
                            }
                            if (!stillExists) {
                                p.dragging = false;
                                p.touchId = undefined;
                                const ball = document.getElementById(p.id);
                                if (ball) ball.style.cursor = 'grab';
                                const maxSpeed = 10;
                                if (Math.abs(p.vx) > maxSpeed) p.vx = (p.vx > 0 ? maxSpeed : -maxSpeed);
                                if (Math.abs(p.vy) > maxSpeed) p.vy = (p.vy > 0 ? maxSpeed : -maxSpeed);
                            }
                        }
                    });
                } else {
                    // 鼠标释放
                    physics.forEach(p => {
                        if (p.dragging) {
                            p.dragging = false;
                            const ball = document.getElementById(p.id);
                            if (ball) ball.style.cursor = 'grab';
                            const maxSpeed = 10;
                            if (Math.abs(p.vx) > maxSpeed) p.vx = (p.vx > 0 ? maxSpeed : -maxSpeed);
                            if (Math.abs(p.vy) > maxSpeed) p.vy = (p.vy > 0 ? maxSpeed : -maxSpeed);
                        }
                    });
                }
            }

            // 添加事件监听
            document.addEventListener('mousedown', handlePointerStart);
            document.addEventListener('touchstart', handlePointerStart, { passive: false });
            document.addEventListener('mousemove', handlePointerMove);
            document.addEventListener('touchmove', handlePointerMove, { passive: false });
            document.addEventListener('mouseup', handlePointerEnd);
            document.addEventListener('touchend', handlePointerEnd);
            document.addEventListener('touchcancel', handlePointerEnd);

            // 阻止拖拽时页面的默认拖拽行为
            document.addEventListener('dragstart', (e) => {
                if (e.target.classList.contains('ball')) e.preventDefault();
            });

            // 窗口大小改变时，防止小球超出边界
            window.addEventListener('resize', () => {
                updateButtonRects();
                physics.forEach(p => {
                    const ball = document.getElementById(p.id);
                    if (!ball) return;
                    const ballSize = ball.offsetWidth;
                    p.radius = ballSize / 2;
                    const maxLeft = window.innerWidth - ballSize;
                    const maxTop = window.innerHeight - ballSize;
                    p.x = Math.max(0, Math.min(p.x, maxLeft));
                    p.y = Math.max(0, Math.min(p.y, maxTop));
                    ball.style.left = p.x + 'px';
                    ball.style.top = p.y + 'px';
                });
            });

            // ---------- 模态框逻辑（同前）----------
            function openModal() {
                if (isModalOpen) return;
                if (hideTimeout) {
                    clearTimeout(hideTimeout);
                    hideTimeout = null;
                }

                // 弹窗打开时，如果小球没被拖拽，就把它们移到两侧
                physics.forEach(p => {
                    if (!p.dragging) {
                        const ball = document.getElementById(p.id);
                        if (!ball) return;
                        const ballSize = ball.offsetWidth;
                        // 简单判断：如果是液态球（ball-liquid）靠左，否则靠右
                        if (ball.classList.contains('ball-liquid')) {
                            p.x = 10;
                        } else {
                            p.x = window.innerWidth - ballSize - 10;
                        }
                        p.y = Math.max(p.radius, Math.min(p.y, window.innerHeight - p.radius));
                        p.vx = 0;
                        p.vy = 0;
                        ball.style.left = p.x + 'px';
                        ball.style.top = p.y + 'px';
                    }
                });

                modalOverlay.classList.remove('hide');
                modalOverlay.style.display = 'flex';
                void modalOverlay.offsetWidth;
                modalOverlay.classList.add('show');
                isModalOpen = true;
            }

            function closeModal() {
                if (!isModalOpen) return;
                modalOverlay.classList.remove('show');
                modalOverlay.classList.add('hide');
                hideTimeout = setTimeout(() => {
                    modalOverlay.style.display = 'none';
                    modalOverlay.classList.remove('hide');
                    isModalOpen = false;
                    hideTimeout = null;
                }, 400);
            }

            friendBtn.addEventListener('click', openModal);
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && isModalOpen) closeModal();
            });
        })();
    </script>
</body>
</html>
