<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>星星的网页</title>
    <!-- 不蒜子计数器 -->
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <style>
        /* ========== 全局样式 ========== */
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', sans-serif;
            background-image: url('https://cdn.pixabay.com/photo/2017/08/30/01/05/milky-way-2695569_1280.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #0a0c10;
        }

        /* 星星画布 */
        #starCanvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 标题 */
        .title-container {
            position: fixed;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            animation: titleRise 2s ease-out forwards;
        }
        .pure-title {
            display: inline-block;
            font-size: 48px;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            letter-spacing: 4px;
        }
        @keyframes titleRise {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 主按钮容器 */
        .button-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 6;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* 液态玻璃按钮通用 */
        .liquid-glass-btn {
            display: inline-block;
            padding: 18px 45px;
            font-size: 26px;
            font-weight: bold;
            color: white;
            text-decoration: none;
            letter-spacing: 2px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.1) 70%);
            border-radius: 80px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 
                0 0 20px rgba(255, 255, 255, 0.2),
                inset 2px 2px 5px rgba(255, 255, 255, 0.5),
                inset -2px -2px 5px rgba(0, 0, 0, 0.1);
            transition: all 0.4s ease;
            cursor: pointer;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        .liquid-glass-btn:hover {
            transform: scale(1.05);
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.15) 70%);
            box-shadow: 
                0 0 30px rgba(255, 255, 255, 0.4),
                inset 3px 3px 8px rgba(255, 255, 255, 0.6),
                inset -3px -3px 8px rgba(0, 0, 0, 0.15);
            border-color: rgba(255, 255, 255, 0.6);
        }
        .liquid-glass-btn:active {
            transform: scale(0.98);
        }

        /* 管理面板 */
        .manage-panel {
            position: fixed;
            top: 60%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 7;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.1) 70%);
            backdrop-filter: blur(5px);
            border-radius: 60px;
            padding: 15px 30px;
            display: flex;
            gap: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: opacity 0.3s;
            opacity: 0;
            pointer-events: none;
        }
        .manage-panel.show {
            opacity: 1;
            pointer-events: auto;
        }
        .manage-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: inset 0 0 5px rgba(255,255,255,0.3);
            white-space: nowrap;
        }
        .manage-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }
        .manage-btn.active {
            background: rgba(255, 100, 100, 0.5);
            border-color: rgba(255, 200, 200, 0.8);
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
        }
        body.delete-mode {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><path fill="white" stroke="black" stroke-width="2" d="M8 4 L24 4 L28 12 L24 20 L8 20 L4 12 L8 4 Z M10 8 L14 8 L14 16 L10 16 L10 8 Z M18 8 L22 8 L22 16 L18 16 L18 8 Z M12 22 L20 22 L18 28 L14 28 L12 22 Z"/></svg>') 16 16, auto;
        }
        body.delete-mode .ball {
            filter: drop-shadow(0 0 8px red);
            transition: filter 0.1s;
        }

        /* 模态框通用样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            z-index: 10;
            display: none;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            backdrop-filter: blur(2px);
        }
        .modal-content {
            width: 80%;
            max-width: 400px;
            max-height: 60vh;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.1) 70%);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2), inset 2px 2px 5px rgba(255, 255, 255, 0.5), inset -2px -2px 5px rgba(0, 0, 0, 0.1);
            color: white;
            transform: translateY(100%);
            transition: transform 0.4s ease-out;
            overflow-y: auto;
        }
        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }
        .modal-overlay.hide .modal-content {
            transform: translateY(100%);
        }
        .friend-list {
            list-style: none;
            padding: 0;
            margin: 20px 0 0;
            text-align: left;
        }
        .friend-list li {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 12px 20px;
            margin-bottom: 10px;
            font-size: 18px;
            font-family: monospace;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .modal-title {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .modal-sub {
            text-align: center;
            font-size: 16px;
            opacity: 0.8;
            margin-top: -5px;
        }
        .close-hint {
            text-align: center;
            font-size: 14px;
            opacity: 0.6;
            margin-top: 15px;
            font-style: italic;
        }

        /* 主页小球样式 */
        .ball {
            position: fixed;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            z-index: 5;
            cursor: grab;
            user-select: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            will-change: left, top;
            transition: box-shadow 0.1s;
            touch-action: none; /* 防止触摸滚动 */
        }
        .ball-liquid {
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.8) 5%, rgba(255, 255, 255, 0.2) 60%, rgba(255, 255, 255, 0) 80%);
            background-color: rgba(100, 200, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 
                0 0 20px rgba(255, 255, 255, 0.3),
                inset 5px 5px 10px rgba(255, 255, 255, 0.6),
                inset -5px -5px 10px rgba(0, 0, 0, 0.2);
        }
        .ball-frosted {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 
                0 0 30px rgba(255, 255, 255, 0.2),
                inset 0 0 20px rgba(255, 255, 255, 0.5);
        }
        .ball:active {
            cursor: grabbing;
        }

        /* 访问计数器 */
        .visit-counter {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 16px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none;
            font-family: 'Microsoft YaHei', sans-serif;
            letter-spacing: 1px;
        }

        /* 游戏菜单 */
        .game-menu-content {
            text-align: center;
        }
        .game-menu-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 15px 30px;
            border-radius: 60px;
            font-size: 24px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        .game-menu-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }

        /* 游戏容器 */
        #gameContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 30;
            display: none;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            color: white;
            overflow: hidden;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
        }
        .game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 31;
            pointer-events: none;
        }
        .game-ui button {
            pointer-events: auto;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 18px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        .score {
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 20px;
        }
        #addGameBallBtn {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            font-size: 18px;
            backdrop-filter: blur(5px);
            cursor: pointer;
            z-index: 31;
        }

        @media (max-width: 768px) {
            .pure-title { font-size: 32px; }
            .liquid-glass-btn { font-size: 22px; padding: 15px 35px; }
            .modal-content { width: 90%; padding: 20px; }
            .friend-list li { font-size: 16px; padding: 10px 15px; }
            .ball { width: 60px; height: 60px; }
            .manage-panel { top: 65%; padding: 10px 15px; gap: 10px; flex-wrap: wrap; justify-content: center; }
            .manage-btn { font-size: 14px; padding: 8px 12px; }
            .visit-counter { bottom: 10px; right: 10px; font-size: 14px; padding: 6px 12px; }
            .game-menu-btn { font-size: 20px; padding: 12px 25px; }
        }
    </style>
</head>
<body>
    <!-- 星星画布 -->
    <canvas id="starCanvas"></canvas>

    <!-- 初始两个小球 -->
    <div class="ball ball-liquid" id="ballLiquid"></div>
    <div class="ball ball-frosted" id="ballFrosted"></div>

    <!-- 标题 -->
    <div class="title-container">
        <div class="pure-title">✨ 欢迎来到星星的网页 ✨</div>
    </div>

    <!-- 主按钮容器 -->
    <div class="button-container">
        <button class="liquid-glass-btn collidable-btn" onclick="window.open('https://www.douyin.com/user/MS4wLjABAAAAJJh4FxMqbYWsxMzsWNA6-loe2r78IwfbvLA7GK3JiA8PI_IKH7OGeleF4TY_ikOb?from_tab_name=main', '_blank')">
            去星星的抖音
        </button>
        <button class="liquid-glass-btn collidable-btn" id="friendBtn">
            添加星星的好友
        </button>
        <button class="liquid-glass-btn collidable-btn" id="manageBallBtn">
            管理小球
        </button>
        <button class="liquid-glass-btn collidable-btn" id="gameMenuBtn">
            🎮小游戏
        </button>
    </div>

    <!-- 管理面板 -->
    <div class="manage-panel" id="managePanel">
        <button class="manage-btn" id="deleteModeBtn">🔨 删除模式</button>
        <button class="manage-btn" id="addLiquidBtn">➕ 新增液态球</button>
        <button class="manage-btn" id="addFrostedBtn">➕ 新增磨砂球</button>
    </div>

    <!-- 好友码模态框 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-title">星星的好友码</div>
            <div class="modal-sub">选择一个复制添加(记得告诉星星你叫什么哦)</div>
            <ul class="friend-list" id="friendList"></ul>
            <div class="close-hint">我也是有底线的[○･｀Д´･○]点击空白处关闭</div>
        </div>
    </div>

    <!-- 游戏菜单模态框 -->
    <div class="modal-overlay" id="gameMenuOverlay">
        <div class="modal-content game-menu-content">
            <div class="modal-title">🎮 选择游戏</div>
            <div class="game-menu-btn" id="curlingGameBtn">🥌 冰壶游戏</div>
            <div class="close-hint">点击空白处关闭</div>
        </div>
    </div>

    <!-- 游戏容器 -->
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div class="game-ui">
            <button id="backToHomeBtn">⬅️ 返回主页</button>
            <div class="score" id="gameScore">得分: 0</div>
        </div>
        <button id="addGameBallBtn">➕ 增加冰球</button>
    </div>

    <!-- 访问计数器 -->
    <div class="visit-counter">
        👁️ 总访问人次：<span id="busuanzi_value_site_pv"></span>
    </div>

    <script>
        (function() {
            // ==================== 主页功能 ====================
            // 星星动画
            const canvas = document.getElementById('starCanvas');
            const ctx = canvas.getContext('2d');
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            const stars = [];
            const starCount = 200;
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2 + 1,
                    brightness: Math.random() * 0.8 + 0.2,
                    speed: 0.002 + Math.random() * 0.005
                });
            }
            function animateStars() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(star => {
                    const twinkle = Math.sin(Date.now() * star.speed + star.x) * 0.2 + 0.8;
                    const alpha = star.brightness * twinkle;
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    ctx.fill();
                });
                requestAnimationFrame(animateStars);
            }
            animateStars();

            // 好友码数据
            const friendCodesRaw = "6RCW-6P8T-Y9XV,FD5H-D56D-P9Q0,5N12-S9CM-H10N";
            const friendCodes = friendCodesRaw.split(/[，,]+/).filter(code => code.trim() !== '');
            const friendList = document.getElementById('friendList');
            friendList.innerHTML = friendCodes.map(code => `<li>${code.trim()}</li>`).join('');

            // 模态框控制
            const modalOverlay = document.getElementById('modalOverlay');
            const friendBtn = document.getElementById('friendBtn');
            let isModalOpen = false;
            let hideTimeout = null;

            function openModal() {
                if (isModalOpen) return;
                if (hideTimeout) clearTimeout(hideTimeout);
                modalOverlay.classList.remove('hide');
                modalOverlay.style.display = 'flex';
                void modalOverlay.offsetWidth;
                modalOverlay.classList.add('show');
                isModalOpen = true;
            }
            function closeModal() {
                if (!isModalOpen) return;
                modalOverlay.classList.remove('show');
                modalOverlay.classList.add('hide');
                hideTimeout = setTimeout(() => {
                    modalOverlay.style.display = 'none';
                    modalOverlay.classList.remove('hide');
                    isModalOpen = false;
                    hideTimeout = null;
                }, 400);
            }
            friendBtn.addEventListener('click', openModal);
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && isModalOpen) closeModal();
            });

            // 小球物理引擎
            const ballLiquid = document.getElementById('ballLiquid');
            const ballFrosted = document.getElementById('ballFrosted');
            let balls = [ballLiquid, ballFrosted];

            const GRAVITY = 0.3;
            const BOUNCE = 0.7;
            const FRICTION = 0.99;
            const BUTTON_BOUNCE = 0.6;

            let physics = [];
            let buttonRects = [];
            const collidableBtns = document.querySelectorAll('.collidable-btn');

            function updateButtonRects() {
                buttonRects = Array.from(collidableBtns).map(btn => {
                    const rect = btn.getBoundingClientRect();
                    return {
                        left: rect.left,
                        top: rect.top,
                        right: rect.right,
                        bottom: rect.bottom,
                        width: rect.width,
                        height: rect.height
                    };
                });
            }
            updateButtonRects();
            window.addEventListener('resize', updateButtonRects);

            function handleCollisionWithButton(p, rect) {
                const closestX = Math.max(rect.left, Math.min(p.x, rect.right));
                const closestY = Math.max(rect.top, Math.min(p.y, rect.bottom));
                const dx = p.x - closestX;
                const dy = p.y - closestY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const minDist = p.radius;

                if (dist < minDist && dist > 0.001) {
                    const nx = dx / dist;
                    const ny = dy / dist;
                    const overlap = minDist - dist;
                    p.x += nx * overlap;
                    p.y += ny * overlap;
                    const vn = p.vx * nx + p.vy * ny;
                    if (vn < 0) {
                        const vt_x = p.vx - vn * nx;
                        const vt_y = p.vy - vn * ny;
                        p.vx = vt_x - vn * BUTTON_BOUNCE * nx;
                        p.vy = vt_y - vn * BUTTON_BOUNCE * ny;
                    }
                    return true;
                }
                return false;
            }

            function initPhysics() {
                physics = [];
                balls.forEach((ball, idx) => {
                    const rect = ball.getBoundingClientRect();
                    const radius = rect.width / 2;
                    physics.push({
                        x: parseFloat(ball.style.left) || rect.left,
                        y: parseFloat(ball.style.top) || rect.top,
                        vx: (Math.random() - 0.5) * 2,
                        vy: Math.random() * 2,
                        radius: radius,
                        dragging: false,
                        mass: 1,
                        id: ball.id,
                        lastMouseX: 0, lastMouseY: 0, lastMouseTime: 0,
                        dragOffsetX: 0, dragOffsetY: 0,
                        touchId: null
                    });
                });
            }
            initPhysics();

            // 重力感应
            let gravityX = 0, gravityY = GRAVITY;
            const GRAVITY_SENSITIVITY = 0.2;
            function handleOrientation(event) {
                let beta = event.beta;   // 前后
                let gamma = event.gamma;  // 左右
                if (beta === null || gamma === null) return;
                const maxAngle = 60;
                let x = gamma / maxAngle;
                let y = beta / maxAngle;
                x = Math.max(-1, Math.min(1, x));
                y = Math.max(-1, Math.min(1, y));
                gravityX = x * GRAVITY * GRAVITY_SENSITIVITY;
                gravityY = GRAVITY + y * GRAVITY * GRAVITY_SENSITIVITY;
            }
            function requestDeviceOrientation() {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation);
                            }
                        })
                        .catch(console.error);
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
            }
            function enableOrientationOnUserGesture() {
                requestDeviceOrientation();
                document.removeEventListener('touchstart', enableOrientationOnUserGesture);
                document.removeEventListener('click', enableOrientationOnUserGesture);
            }
            document.addEventListener('touchstart', enableOrientationOnUserGesture);
            document.addEventListener('click', enableOrientationOnUserGesture);

            // 物理更新
            function updatePhysics() {
                const width = window.innerWidth;
                const height = window.innerHeight;

                physics.forEach(p => {
                    if (p.dragging) return;
                    p.vx *= FRICTION;
                    p.vy *= FRICTION;
                    p.vx += gravityX;
                    p.vy += gravityY;

                    let newX = p.x + p.vx;
                    let newY = p.y + p.vy;
                    const r = p.radius;
                    if (newX < r) { newX = r; p.vx = -p.vx * BOUNCE; }
                    if (newX > width - r) { newX = width - r; p.vx = -p.vx * BOUNCE; }
                    if (newY < r) { newY = r; p.vy = -p.vy * BOUNCE; }
                    if (newY > height - r) { newY = height - r; p.vy = -p.vy * BOUNCE; }
                    p.x = newX;
                    p.y = newY;

                    const ball = document.getElementById(p.id);
                    if (ball) {
                        ball.style.left = p.x + 'px';
                        ball.style.top = p.y + 'px';
                    }
                });

                // 小球之间碰撞
                for (let i = 0; i < physics.length; i++) {
                    for (let j = i + 1; j < physics.length; j++) {
                        const p1 = physics[i];
                        const p2 = physics[j];
                        if (p1.dragging && p2.dragging) continue;

                        const dx = p2.x - p1.x;
                        const dy = p2.y - p1.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        const minDist = p1.radius + p2.radius;

                        if (dist < minDist && dist > 0.001) {
                            const nx = dx / dist;
                            const ny = dy / dist;
                            const vRelX = p2.vx - p1.vx;
                            const vRelY = p2.vy - p1.vy;
                            const vRelN = vRelX * nx + vRelY * ny;

                            if (vRelN < 0) {
                                const e = 0.7;
                                const impulse = -(1 + e) * vRelN / (1/p1.mass + 1/p2.mass);
                                if (!p1.dragging) {
                                    p1.vx -= impulse / p1.mass * nx;
                                    p1.vy -= impulse / p1.mass * ny;
                                }
                                if (!p2.dragging) {
                                    p2.vx += impulse / p2.mass * nx;
                                    p2.vy += impulse / p2.mass * ny;
                                }

                                const overlap = minDist - dist;
                                if (!p1.dragging && !p2.dragging) {
                                    p1.x -= overlap * nx * 0.5;
                                    p1.y -= overlap * ny * 0.5;
                                    p2.x += overlap * nx * 0.5;
                                    p2.y += overlap * ny * 0.5;
                                } else if (!p1.dragging) {
                                    p1.x -= overlap * nx;
                                    p1.y -= overlap * ny;
                                } else if (!p2.dragging) {
                                    p2.x += overlap * nx;
                                    p2.y += overlap * ny;
                                }
                            }
                        }
                    }
                }

                // 小球与按钮碰撞
                physics.forEach(p => {
                    if (p.dragging) return;
                    buttonRects.forEach(rect => {
                        handleCollisionWithButton(p, rect);
                    });
                    const ball = document.getElementById(p.id);
                    if (ball) {
                        ball.style.left = p.x + 'px';
                        ball.style.top = p.y + 'px';
                    }
                });
            }

            // 拖拽处理（鼠标+触摸）
            function getPointerEvent(e) {
                if (e.touches) return e.touches[0];
                return e;
            }
            function handlePointerStart(e) {
                const target = e.target;
                if (!target.classList.contains('ball')) return;
                e.preventDefault();

                // 删除模式
                if (deleteMode) {
                    deleteBall(target);
                    return;
                }

                const id = target.id;
                const p = physics.find(p => p.id === id);
                if (!p || p.dragging) return;

                p.dragging = true;
                target.style.cursor = 'grabbing';

                const pointer = getPointerEvent(e);
                if (e.touches) p.touchId = e.touches[0].identifier;

                const rect = target.getBoundingClientRect();
                p.dragOffsetX = pointer.clientX - rect.left;
                p.dragOffsetY = pointer.clientY - rect.top;
                p.lastMouseX = pointer.clientX;
                p.lastMouseY = pointer.clientY;
                p.lastMouseTime = performance.now();
                p.vx = 0;
                p.vy = 0;
            }
            function handlePointerMove(e) {
                e.preventDefault();
                const pointer = getPointerEvent(e);
                physics.forEach(p => {
                    if (!p.dragging) return;

                    if (e.touches && p.touchId !== undefined) {
                        let matchedTouch = null;
                        for (let i = 0; i < e.touches.length; i++) {
                            if (e.touches[i].identifier === p.touchId) {
                                matchedTouch = e.touches[i];
                                break;
                            }
                        }
                        if (!matchedTouch) return;
                        const ball = document.getElementById(p.id);
                        if (!ball) return;
                        let newLeft = matchedTouch.clientX - p.dragOffsetX;
                        let newTop = matchedTouch.clientY - p.dragOffsetY;
                        const ballSize = ball.offsetWidth;
                        const maxLeft = window.innerWidth - ballSize;
                        const maxTop = window.innerHeight - ballSize;
                        newLeft = Math.max(0, Math.min(newLeft, maxLeft));
                        newTop = Math.max(0, Math.min(newTop, maxTop));
                        p.x = newLeft;
                        p.y = newTop;
                        ball.style.left = newLeft + 'px';
                        ball.style.top = newTop + 'px';

                        const now = performance.now();
                        const dt = now - p.lastMouseTime;
                        if (dt > 5) {
                            p.vx = (matchedTouch.clientX - p.lastMouseX) / dt * 15;
                            p.vy = (matchedTouch.clientY - p.lastMouseY) / dt * 15;
                            p.lastMouseX = matchedTouch.clientX;
                            p.lastMouseY = matchedTouch.clientY;
                            p.lastMouseTime = now;
                        }
                    } else if (!e.touches) {
                        const ball = document.getElementById(p.id);
                        if (!ball) return;
                        let newLeft = pointer.clientX - p.dragOffsetX;
                        let newTop = pointer.clientY - p.dragOffsetY;
                        const ballSize = ball.offsetWidth;
                        const maxLeft = window.innerWidth - ballSize;
                        const maxTop = window.innerHeight - ballSize;
                        newLeft = Math.max(0, Math.min(newLeft, maxLeft));
                        newTop = Math.max(0, Math.min(newTop, maxTop));
                        p.x = newLeft;
                        p.y = newTop;
                        ball.style.left = newLeft + 'px';
                        ball.style.top = newTop + 'px';

                        const now = performance.now();
                        const dt = now - p.lastMouseTime;
                        if (dt > 5) {
                            p.vx = (pointer.clientX - p.lastMouseX) / dt * 15;
                            p.vy = (pointer.clientY - p.lastMouseY) / dt * 15;
                            p.lastMouseX = pointer.clientX;
                            p.lastMouseY = pointer.clientY;
                            p.lastMouseTime = now;
                        }
                    }
                });
            }
            function handlePointerEnd(e) {
                if (e.touches) {
                    physics.forEach(p => {
                        if (p.dragging && p.touchId !== undefined) {
                            let stillExists = false;
                            for (let i = 0; i < e.touches.length; i++) {
                                if (e.touches[i].identifier === p.touchId) {
                                    stillExists = true;
                                    break;
                                }
                            }
                            if (!stillExists) {
                                p.dragging = false;
                                p.touchId = undefined;
                                const ball = document.getElementById(p.id);
                                if (ball) ball.style.cursor = 'grab';
                                const maxSpeed = 10;
                                if (Math.abs(p.vx) > maxSpeed) p.vx = (p.vx > 0 ? maxSpeed : -maxSpeed);
                                if (Math.abs(p.vy) > maxSpeed) p.vy = (p.vy > 0 ? maxSpeed : -maxSpeed);
                            }
                        }
                    });
                } else {
                    physics.forEach(p => {
                        if (p.dragging) {
                            p.dragging = false;
                            const ball = document.getElementById(p.id);
                            if (ball) ball.style.cursor = 'grab';
                            const maxSpeed = 10;
                            if (Math.abs(p.vx) > maxSpeed) p.vx = (p.vx > 0 ? maxSpeed : -maxSpeed);
                            if (Math.abs(p.vy) > maxSpeed) p.vy = (p.vy > 0 ? maxSpeed : -maxSpeed);
                        }
                    });
                }
            }

            document.addEventListener('mousedown', handlePointerStart);
            document.addEventListener('touchstart', handlePointerStart, { passive: false });
            document.addEventListener('mousemove', handlePointerMove);
            document.addEventListener('touchmove', handlePointerMove, { passive: false });
            document.addEventListener('mouseup', handlePointerEnd);
            document.addEventListener('touchend', handlePointerEnd);
            document.addEventListener('touchcancel', handlePointerEnd);
            document.addEventListener('dragstart', (e) => {
                if (e.target.classList.contains('ball')) e.preventDefault();
            });

            // 管理面板逻辑
            const manageBtn = document.getElementById('manageBallBtn');
            const managePanel = document.getElementById('managePanel');
            const deleteModeBtn = document.getElementById('deleteModeBtn');
            const addLiquidBtn = document.getElementById('addLiquidBtn');
            const addFrostedBtn = document.getElementById('addFrostedBtn');
            let deleteMode = false;

            manageBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                managePanel.classList.toggle('show');
            });
            document.addEventListener('click', (e) => {
                if (!managePanel.contains(e.target) && e.target !== manageBtn) {
                    managePanel.classList.remove('show');
                }
            });
            deleteModeBtn.addEventListener('click', () => {
                deleteMode = !deleteMode;
                deleteModeBtn.classList.toggle('active', deleteMode);
                if (deleteMode) {
                    document.body.classList.add('delete-mode');
                } else {
                    document.body.classList.remove('delete-mode');
                }
            });

            function createNewBall(type) {
                const id = 'ball_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                const ballDiv = document.createElement('div');
                ballDiv.className = `ball ball-${type}`;
                ballDiv.id = id;
                document.body.appendChild(ballDiv);

                const ballSize = 80;
                const maxLeft = window.innerWidth - ballSize;
                const left = Math.random() * maxLeft;
                const top = -100;

                ballDiv.style.left = left + 'px';
                ballDiv.style.top = top + 'px';

                balls.push(ballDiv);
                const radius = ballSize / 2;
                physics.push({
                    x: left, y: top,
                    vx: (Math.random() - 0.5) * 2,
                    vy: Math.random() * 2,
                    radius, dragging: false, mass: 1, id,
                    lastMouseX:0,lastMouseY:0,lastMouseTime:0,
                    dragOffsetX:0,dragOffsetY:0, touchId:null
                });
            }
            addLiquidBtn.addEventListener('click', () => createNewBall('liquid'));
            addFrostedBtn.addEventListener('click', () => createNewBall('frosted'));

            function deleteBall(ballElement) {
                const id = ballElement.id;
                const pIndex = physics.findIndex(p => p.id === id);
                if (pIndex === -1) return;
                const p = physics[pIndex];
                const isLiquid = ballElement.classList.contains('ball-liquid');
                const type = isLiquid ? 'liquid' : 'frosted';
                const x = p.x, y = p.y, vx = p.vx, vy = p.vy, originalRadius = p.radius;

                physics.splice(pIndex, 1);
                const ballIndex = balls.findIndex(b => b.id === id);
                if (ballIndex !== -1) balls.splice(ballIndex, 1);
                ballElement.remove();

                // 破碎效果
                const fragmentCount = 4 + Math.floor(Math.random() * 3);
                for (let i = 0; i < fragmentCount; i++) {
                    const fragRadius = originalRadius * (0.2 + Math.random() * 0.2);
                    const angle = Math.random() * Math.PI * 2;
                    const dist = originalRadius * 0.5 * Math.random();
                    const fragX = x + Math.cos(angle) * dist;
                    const fragY = y + Math.sin(angle) * dist;
                    const fragVx = vx + (Math.random() - 0.5) * 4;
                    const fragVy = vy + (Math.random() - 0.5) * 4 - 2;
                    const fragId = 'frag_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                    const fragDiv = document.createElement('div');
                    fragDiv.className = `ball ball-${type}`;
                    fragDiv.id = fragId;
                    fragDiv.style.width = (fragRadius * 2) + 'px';
                    fragDiv.style.height = (fragRadius * 2) + 'px';
                    fragDiv.style.left = fragX + 'px';
                    fragDiv.style.top = fragY + 'px';
                    document.body.appendChild(fragDiv);
                    balls.push(fragDiv);
                    physics.push({
                        x: fragX, y: fragY, vx: fragVx, vy: fragVy, radius: fragRadius,
                        dragging: false, mass: 0.3, id: fragId,
                        lastMouseX:0,lastMouseY:0,lastMouseTime:0,
                        dragOffsetX:0,dragOffsetY:0, touchId:null
                    });
                    setTimeout(() => {
                        const idx = physics.findIndex(fp => fp.id === fragId);
                        if (idx !== -1) physics.splice(idx, 1);
                        const ballIdx = balls.findIndex(b => b.id === fragId);
                        if (ballIdx !== -1) balls.splice(ballIdx, 1);
                        document.getElementById(fragId)?.remove();
                    }, 2000);
                }
            }

            // 物理动画循环
            function animatePhysics() {
                updatePhysics();
                requestAnimationFrame(animatePhysics);
            }
            animatePhysics();

            // 窗口大小变化调整
            window.addEventListener('resize', () => {
                updateButtonRects();
                physics.forEach(p => {
                    const ball = document.getElementById(p.id);
                    if (!ball) return;
                    const ballSize = ball.offsetWidth;
                    p.radius = ballSize / 2;
                    const maxLeft = window.innerWidth - ballSize;
                    const maxTop = window.innerHeight - ballSize;
                    p.x = Math.max(0, Math.min(p.x, maxLeft));
                    p.y = Math.max(0, Math.min(p.y, maxTop));
                    ball.style.left = p.x + 'px';
                    ball.style.top = p.y + 'px';
                });
            });

            // ==================== 游戏模块 ====================
            const gameMenuOverlay = document.getElementById('gameMenuOverlay');
            const gameMenuBtn = document.getElementById('gameMenuBtn');
            const curlingGameBtn = document.getElementById('curlingGameBtn');
            const gameContainer = document.getElementById('gameContainer');
            const gameCanvas = document.getElementById('gameCanvas');
            const ctxGame = gameCanvas.getContext('2d');
            const backToHomeBtn = document.getElementById('backToHomeBtn');
            const addGameBallBtn = document.getElementById('addGameBallBtn');
            const gameScoreSpan = document.getElementById('gameScore');

            let gameActive = false;
            let gameObjects = [];
            let stone = null;
            let draggingStone = false;
            let dragOffset = { x: 0, y: 0 }; // 鼠标相对于石壶中心的偏移
            let score = 0;
            let gameAnimationId = null;
            let MID_LINE = window.innerWidth / 2;
            const LEFT_GOAL = { x1: 0, x2: 80 };
            const RIGHT_GOAL = { x1: window.innerWidth-80, x2: window.innerWidth };

            function updateGoalPositions() {
                RIGHT_GOAL.x1 = window.innerWidth - 80;
                RIGHT_GOAL.x2 = window.innerWidth;
                LEFT_GOAL.x2 = 80;
            }

            function initGame() {
                gameObjects = [];
                stone = {
                    x: 200,
                    y: window.innerHeight/2,
                    vx: 0,
                    vy: 0,
                    radius: 40,
                    color: '#333',
                    type: 'stone'
                };
                gameObjects.push({
                    x: window.innerWidth * 0.7,
                    y: window.innerHeight/2,
                    vx: 0,
                    vy: 0,
                    radius: 30,
                    color: 'rgba(100,200,255,0.8)',
                    type: 'target'
                });
                score = 0;
                updateScore();
            }

            function updateScore() {
                gameScoreSpan.textContent = `得分: ${score}`;
            }

            function updateGame() {
                if (!gameActive) return;

                // 摩擦力减小：速度衰减从0.98改为0.995
                const friction = 0.995; // 更小的摩擦力，滑行更远

                // 更新石壶（仅在未被拖动时应用物理）
                if (!draggingStone) {
                    stone.vx *= friction;
                    stone.vy *= friction;
                    stone.x += stone.vx;
                    stone.y += stone.vy;

                    // 边界碰撞（石壶不能越过中线）
                    if (stone.x < stone.radius) {
                        stone.x = stone.radius;
                        stone.vx = -stone.vx * 0.5;
                    }
                    if (stone.x > MID_LINE - stone.radius) {
                        stone.x = MID_LINE - stone.radius;
                        stone.vx = -stone.vx * 0.5;
                    }
                    if (stone.y < stone.radius) {
                        stone.y = stone.radius;
                        stone.vy = -stone.vy * 0.5;
                    }
                    if (stone.y > window.innerHeight - stone.radius) {
                        stone.y = window.innerHeight - stone.radius;
                        stone.vy = -stone.vy * 0.5;
                    }
                }

                // 更新目标球（同样使用减小后的摩擦力）
                for (let i = 0; i < gameObjects.length; i++) {
                    const obj = gameObjects[i];
                    obj.vx *= friction;
                    obj.vy *= friction;
                    obj.x += obj.vx;
                    obj.y += obj.vy;

                    if (obj.x < obj.radius) {
                        obj.x = obj.radius;
                        obj.vx = -obj.vx * 0.5;
                    }
                    if (obj.x > window.innerWidth - obj.radius) {
                        obj.x = window.innerWidth - obj.radius;
                        obj.vx = -obj.vx * 0.5;
                    }
                    if (obj.y < obj.radius) {
                        obj.y = obj.radius;
                        obj.vy = -obj.vy * 0.5;
                    }
                    if (obj.y > window.innerHeight - obj.radius) {
                        obj.y = window.innerHeight - obj.radius;
                        obj.vy = -obj.vy * 0.5;
                    }

                    // 得分检测（进入右侧球门）
                    if (obj.x + obj.radius > RIGHT_GOAL.x1 && obj.x - obj.radius < RIGHT_GOAL.x2) {
                        gameObjects.splice(i, 1);
                        i--;
                        score++;
                        updateScore();
                        continue;
                    }
                }

                // 石壶与目标球碰撞
                for (let i = 0; i < gameObjects.length; i++) {
                    const obj = gameObjects[i];
                    const dx = obj.x - stone.x;
                    const dy = obj.y - stone.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const minDist = stone.radius + obj.radius;
                    if (dist < minDist) {
                        const angle = Math.atan2(dy, dx);
                        const sin = Math.sin(angle);
                        const cos = Math.cos(angle);
                        const v1 = stone.vx * cos + stone.vy * sin;
                        const v2 = obj.vx * cos + obj.vy * sin;
                        const v1After = v2;
                        const v2After = v1;
                        stone.vx = v1After * cos;
                        stone.vy = v1After * sin;
                        obj.vx = v2After * cos;
                        obj.vy = v2After * sin;

                        const overlap = minDist - dist;
                        const moveX = dx / dist * overlap * 0.5;
                        const moveY = dy / dist * overlap * 0.5;
                        stone.x -= moveX;
                        stone.y -= moveY;
                        obj.x += moveX;
                        obj.y += moveY;
                    }
                }
            }

            function drawGame() {
                ctxGame.clearRect(0, 0, window.innerWidth, window.innerHeight);
                ctxGame.fillStyle = 'rgba(0,0,0,0.3)';
                ctxGame.fillRect(0, 0, window.innerWidth, window.innerHeight);

                ctxGame.strokeStyle = 'rgba(255,255,255,0.3)';
                ctxGame.lineWidth = 2;
                ctxGame.beginPath();
                ctxGame.moveTo(MID_LINE, 0);
                ctxGame.lineTo(MID_LINE, window.innerHeight);
                ctxGame.stroke();

                ctxGame.fillStyle = 'rgba(255,255,255,0.1)';
                ctxGame.fillRect(0, 0, 80, window.innerHeight);
                ctxGame.fillRect(window.innerWidth-80, 0, 80, window.innerHeight);

                ctxGame.shadowColor = 'rgba(0,0,0,0.5)';
                ctxGame.shadowBlur = 10;
                ctxGame.beginPath();
                ctxGame.arc(stone.x, stone.y, stone.radius, 0, Math.PI*2);
                ctxGame.fillStyle = stone.color;
                ctxGame.fill();
                ctxGame.strokeStyle = 'white';
                ctxGame.lineWidth = 2;
                ctxGame.stroke();

                gameObjects.forEach(obj => {
                    ctxGame.beginPath();
                    ctxGame.arc(obj.x, obj.y, obj.radius, 0, Math.PI*2);
                    ctxGame.fillStyle = obj.color;
                    ctxGame.fill();
                    ctxGame.strokeStyle = 'white';
                    ctxGame.lineWidth = 2;
                    ctxGame.stroke();
                });

                // 不再绘制拖拽指示线，因为现在是直接跟随鼠标
                ctxGame.shadowBlur = 0;
            }

            function gameLoop() {
                if (!gameActive) return;
                updateGame();
                drawGame();
                gameAnimationId = requestAnimationFrame(gameLoop);
            }

            // 游戏拖拽：直接跟随鼠标，释放后停止
            function handleGamePointerStart(e) {
                if (!gameActive) return;
                e.preventDefault();
                const rect = gameCanvas.getBoundingClientRect();
                const scaleX = gameCanvas.width / rect.width;
                const scaleY = gameCanvas.height / rect.height;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                const canvasX = (clientX - rect.left) * scaleX;
                const canvasY = (clientY - rect.top) * scaleY;

                // 检查是否点击到石壶
                const dx = canvasX - stone.x;
                const dy = canvasY - stone.y;
                if (Math.sqrt(dx*dx + dy*dy) < stone.radius) {
                    draggingStone = true;
                    // 计算鼠标相对于石壶中心的偏移
                    dragOffset.x = canvasX - stone.x;
                    dragOffset.y = canvasY - stone.y;
                    stone.vx = 0; // 拖拽时速度清零
                    stone.vy = 0;
                }
            }

            function handleGamePointerMove(e) {
                if (!gameActive || !draggingStone) return;
                e.preventDefault();
                const rect = gameCanvas.getBoundingClientRect();
                const scaleX = gameCanvas.width / rect.width;
                const scaleY = gameCanvas.height / rect.height;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                const canvasX = (clientX - rect.left) * scaleX;
                const canvasY = (clientY - rect.top) * scaleY;

                // 直接设置石壶位置，保持偏移
                let newX = canvasX - dragOffset.x;
                let newY = canvasY - dragOffset.y;

                // 边界限制（石壶不能越过中线）
                newX = Math.max(stone.radius, Math.min(newX, MID_LINE - stone.radius));
                newY = Math.max(stone.radius, Math.min(newY, window.innerHeight - stone.radius));

                stone.x = newX;
                stone.y = newY;
            }

            function handleGamePointerEnd(e) {
                if (!gameActive || !draggingStone) return;
                e.preventDefault();
                draggingStone = false;
                // 释放后速度保持为0，石壶立即停止
            }

            function enterGame() {
                // 隐藏主页元素
                document.querySelectorAll('.button-container, .manage-panel, .title-container, .visit-counter, .ball').forEach(el => {
                    if (el) el.style.display = 'none';
                });
                gameContainer.style.display = 'block';
                gameActive = true;
                gameCanvas.width = window.innerWidth;
                gameCanvas.height = window.innerHeight;
                MID_LINE = window.innerWidth / 2;
                updateGoalPositions();
                initGame();
                gameLoop();
            }

            function exitGame() {
                gameActive = false;
                if (gameAnimationId) {
                    cancelAnimationFrame(gameAnimationId);
                    gameAnimationId = null;
                }
                gameContainer.style.display = 'none';
                // 恢复主页元素
                document.querySelectorAll('.button-container, .manage-panel, .title-container, .visit-counter, .ball').forEach(el => {
                    if (el) el.style.display = '';
                });
            }

            // 游戏事件监听
            gameCanvas.addEventListener('mousedown', handleGamePointerStart);
            gameCanvas.addEventListener('mousemove', handleGamePointerMove);
            gameCanvas.addEventListener('mouseup', handleGamePointerEnd);
            gameCanvas.addEventListener('touchstart', handleGamePointerStart, { passive: false });
            gameCanvas.addEventListener('touchmove', handleGamePointerMove, { passive: false });
            gameCanvas.addEventListener('touchend', handleGamePointerEnd);
            gameCanvas.addEventListener('touchcancel', handleGamePointerEnd);

            addGameBallBtn.addEventListener('click', () => {
                if (!gameActive) return;
                gameObjects.push({
                    x: 100 + Math.random() * (MID_LINE - 200),
                    y: 100 + Math.random() * (window.innerHeight - 200),
                    vx: 0,
                    vy: 0,
                    radius: 30,
                    color: 'rgba(100,200,255,0.8)',
                    type: 'target'
                });
            });

            backToHomeBtn.addEventListener('click', exitGame);

            gameMenuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                gameMenuOverlay.style.display = 'flex';
                gameMenuOverlay.classList.add('show');
            });
            gameMenuOverlay.addEventListener('click', (e) => {
                if (e.target === gameMenuOverlay) {
                    gameMenuOverlay.classList.remove('show');
                    setTimeout(() => {
                        gameMenuOverlay.style.display = 'none';
                    }, 400);
                }
            });
            curlingGameBtn.addEventListener('click', () => {
                gameMenuOverlay.classList.remove('show');
                setTimeout(() => {
                    gameMenuOverlay.style.display = 'none';
                }, 400);
                enterGame();
            });

            window.addEventListener('resize', () => {
                if (gameActive) {
                    gameCanvas.width = window.innerWidth;
                    gameCanvas.height = window.innerHeight;
                    MID_LINE = window.innerWidth / 2;
                    updateGoalPositions();
                    stone.x = Math.min(stone.x, MID_LINE - stone.radius);
                    stone.x = Math.max(stone.x, stone.radius);
                    stone.y = Math.min(stone.y, window.innerHeight - stone.radius);
                    stone.y = Math.max(stone.y, stone.radius);
                }
            });
        })();
    </script>
</body>
</html>
