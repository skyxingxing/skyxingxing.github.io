<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>丝滑控件 · 滑动胶囊切换</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            --bg-start: #f5f7fc;
            --bg-end: #e9ecf5;
            --card-bg: rgba(255, 255, 255, 0.75);
            --text-primary: #1e293b;
            --text-secondary: #5b677b;
            --label-color: #1e293b;
            --badge-bg: rgba(58, 123, 213, 0.12);
            --badge-text: #1e4f8a;
            --toggle-bg: rgba(0,0,0,0.08);
            --slider-bg: rgba(0,0,0,0.08);
            --progress-bg: rgba(0,0,0,0.06);
            
            background: linear-gradient(145deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 24px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.night-theme {
            --bg-start: #1a1f2c;
            --bg-end: #0f131c;
            --card-bg: rgba(30, 35, 48, 0.75);
            --text-primary: #e0e6f0;
            --text-secondary: #a0aec0;
            --label-color: #cbd5e0;
            --badge-bg: rgba(129, 170, 255, 0.15);
            --badge-text: #b3cdff;
            --toggle-bg: rgba(255,255,255,0.1);
            --slider-bg: rgba(255,255,255,0.1);
            --progress-bg: rgba(255,255,255,0.08);
        }

        .card {
            max-width: 680px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 48px;
            padding: 40px 36px;
            box-shadow: 
                0 30px 60px rgba(0, 10, 30, 0.08),
                0 10px 30px rgba(0, 0, 0, 0.03),
                inset 0 1px 1px rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: background 0.5s cubic-bezier(0.23, 1, 0.32, 1),
                        box-shadow 0.4s ease,
                        border-color 0.4s ease;
            color: var(--text-primary);
        }

        body.night-theme .card {
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.3),
                0 10px 30px rgba(0, 0, 0, 0.2),
                inset 0 1px 1px rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .card:hover {
            box-shadow: 
                0 40px 80px rgba(0, 10, 30, 0.12),
                0 15px 35px rgba(0, 0, 0, 0.05),
                inset 0 1px 1px rgba(255, 255, 255, 0.8);
        }

        h1 {
            font-weight: 600;
            font-size: 2.4rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1e263a, #2a3448);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(45, 85, 255, 0.1);
            margin-bottom: 8px;
            transition: background 0.4s ease, text-shadow 0.4s;
        }

        body.night-theme h1 {
            background: linear-gradient(135deg, #bdd3ff, #e0e9ff);
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 2px 15px rgba(100, 160, 255, 0.3);
        }

        .subhead {
            font-weight: 400;
            color: var(--text-secondary);
            margin-bottom: 42px;
            font-size: 1.1rem;
            border-left: 4px solid #3a7bd5;
            padding-left: 18px;
            transition: color 0.4s ease, border-color 0.3s;
        }

        body.night-theme .subhead {
            border-left-color: #5f9cff;
        }

        .control-group {
            margin-bottom: 44px;
        }

        .label-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .label {
            font-weight: 600;
            color: var(--label-color);
            font-size: 1.1rem;
            letter-spacing: -0.01em;
            transition: color 0.4s;
        }

        .value-badge {
            background: var(--badge-bg);
            padding: 6px 14px;
            border-radius: 40px;
            color: var(--badge-text);
            font-weight: 500;
            font-size: 0.9rem;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(58, 123, 213, 0.2);
            transition: background 0.4s, color 0.4s, border-color 0.4s;
        }

        .progress-container {
            background: var(--progress-bg);
            border-radius: 100px;
            height: 20px;
            padding: 3px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.3);
            transition: background 0.4s, border-color 0.4s;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 100px;
            background: linear-gradient(90deg, #3a7bd5, #5b9eff);
            box-shadow: 0 0 12px rgba(58, 123, 213, 0.6);
            transition: width 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.0);
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            animation: shimmer 2.8s infinite;
            transform: skewX(-20deg);
        }

        @keyframes shimmer {
            0% { left: -100%; }
            80%, 100% { left: 160%; }
        }

        .indeterminate-wrapper {
            background: var(--progress-bg);
            border-radius: 100px;
            height: 20px;
            padding: 3px;
            margin-top: 24px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            overflow: hidden;
            transition: background 0.4s, border-color 0.4s;
        }

        .indeterminate-bar {
            height: 100%;
            width: 40%;
            border-radius: 100px;
            background: linear-gradient(90deg, #9f7aea, #d53f8c, #f6ad55, #9f7aea);
            background-size: 300% 100%;
            animation: indeterminateSlide 2s cubic-bezier(0.45, 0.05, 0.2, 0.99) infinite;
            box-shadow: 0 0 18px rgba(213, 63, 140, 0.5);
            will-change: margin-left, width;
        }

        @keyframes indeterminateSlide {
            0% { margin-left: -40%; width: 40%; }
            40% { margin-left: 30%; width: 50%; }
            80% { margin-left: 70%; width: 40%; }
            100% { margin-left: 100%; width: 40%; }
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 12px;
        }

        .btn {
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.8);
            padding: 14px 28px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            color: #1e293b;
            box-shadow: 0 6px 12px rgba(0,0,0,0.02);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.23, 1, 0.32, 1);
            letter-spacing: 0.3px;
            flex: 0 0 auto;
            outline: none;
            user-select: none;
        }

        body.night-theme .btn {
            background: rgba(50, 60, 80, 0.6);
            border-color: rgba(255,255,255,0.2);
            color: #e0e6f0;
        }

        .btn:hover {
            background: rgba(255,255,255,0.9);
            box-shadow: 0 18px 28px -8px rgba(0, 35, 70, 0.15), 0 0 0 1px rgba(58,123,213,0.2);
            transform: scale(1.02) translateY(-2px);
            border-color: #fff;
        }

        body.night-theme .btn:hover {
            background: rgba(70, 85, 110, 0.8);
            box-shadow: 0 18px 28px -8px rgba(0,0,0,0.3);
            color: white;
        }

        .btn:active {
            transform: scale(0.98) translateY(2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition-duration: 0.1s;
        }

        .btn-primary {
            background: #1e293b;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px -5px rgba(30, 41, 59, 0.3);
        }

        body.night-theme .btn-primary {
            background: #3a5a8c;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5);
        }

        .btn-primary:hover {
            background: #2d3a52;
            box-shadow: 0 20px 30px -8px #1e293b66;
        }

        body.night-theme .btn-primary:hover {
            background: #4d6fa8;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .toggle-switch {
            position: relative;
            width: 64px;
            height: 34px;
            background: var(--toggle-bg);
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.03);
            cursor: pointer;
            transition: background 0.25s ease, border-color 0.4s;
        }

        .toggle-switch.active {
            background: #3a7bd5;
            border-color: rgba(255,255,255,0.6);
        }

        .toggle-knob {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 28px;
            height: 28px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.02);
            transition: left 0.35s cubic-bezier(0.34, 1.3, 0.64, 1), box-shadow 0.25s ease;
            will-change: left;
            pointer-events: none;
        }

        .toggle-switch.active .toggle-knob {
            left: 33px;
            box-shadow: 0 6px 14px rgba(58, 123, 213, 0.4), 0 0 0 1px rgba(255,255,255,0.5);
        }

        .toggle-switch:hover .toggle-knob {
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
        }

        .toggle-label {
            font-weight: 500;
            color: var(--text-primary);
            transition: color 0.4s;
        }

        /* 滑动胶囊控制 */
        .segmented-control {
            position: relative;
            display: inline-flex;
            background: rgba(0,0,0,0.04);
            border-radius: 60px;
            padding: 5px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.4);
            transition: background 0.4s, border-color 0.4s;
        }

        body.night-theme .segmented-control {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.15);
        }

        .segmented-slider {
            position: absolute;
            top: 5px;
            left: 5px;
            height: calc(100% - 10px);
            width: 80px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.06), 0 0 0 1px rgba(255,255,255,0.8);
            transition: left 0.4s cubic-bezier(0.34, 1.3, 0.64, 1), 
                        width 0.4s cubic-bezier(0.34, 1.3, 0.64, 1),
                        background 0.4s;
            z-index: 0;
            pointer-events: none;
        }

        body.night-theme .segmented-slider {
            background: #2d3b52;
            box-shadow: 0 6px 16px rgba(0,0,0,0.3);
        }

        .segmented-option {
            position: relative;
            z-index: 1;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            color: #4a5568;
            cursor: pointer;
            transition: color 0.3s ease;
            background: transparent;
            border: none;
            font-size: 0.95rem;
            user-select: none;
            white-space: nowrap;
        }

        body.night-theme .segmented-option {
            color: #b0bed0;
        }

        .segmented-option.active {
            color: #1e293b;
        }

        body.night-theme .segmented-option.active {
            color: #ffffff;
        }

        .slider-container {
            margin: 20px 0 10px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            background: var(--slider-bg);
            border-radius: 20px;
            outline: none;
            backdrop-filter: blur(4px);
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.4);
            transition: background 0.4s, border-color 0.4s;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 26px;
            height: 26px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 8px 20px rgba(58, 123, 213, 0.3), 0 0 0 1px rgba(58,123,213,0.2);
            cursor: grab;
            transition: transform 0.15s cubic-bezier(0.2, 0.9, 0.4, 1.0), box-shadow 0.2s;
            border: 2px solid rgba(255,255,255,0.9);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.18);
            box-shadow: 0 12px 28px rgba(58, 123, 213, 0.45);
            cursor: grab;
        }

        input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.08);
            box-shadow: 0 4px 12px rgba(58, 123, 213, 0.5);
            cursor: grabbing;
        }

        .slider-value {
            font-weight: 700;
            color: #1e3a8a;
            transition: color 0.4s;
        }

        body.night-theme .slider-value {
            color: #b0cdff;
        }

        .footnote {
            margin-top: 32px;
            text-align: right;
            color: var(--text-secondary);
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            opacity: 0.8;
            transition: color 0.4s;
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.05), transparent);
            margin: 32px 0 20px;
            transition: background 0.4s;
        }

        body.night-theme .divider {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        }

        @media (max-width: 520px) {
            .card { padding: 28px 20px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>✨ 无比丝滑</h1>
        <div class="subhead">进度条 · 按钮 · 切换 · 滑块</div>

        <!-- 确定进度条 -->
        <div class="control-group">
            <div class="label-row">
                <span class="label">📊 确定进度条</span>
                <span class="value-badge" id="progressValueDisplay">65%</span>
            </div>
            <div class="progress-container">
                <div class="progress-fill" id="progressFill" style="width: 65%;"></div>
            </div>
            <div class="button-group" style="margin-top: 16px;">
                <button class="btn" data-progress="25">25%</button>
                <button class="btn" data-progress="50">50%</button>
                <button class="btn" data-progress="75">75%</button>
                <button class="btn btn-primary" data-progress="100">100%</button>
            </div>
        </div>

        <!-- 不确定进度条 -->
        <div class="control-group">
            <div class="label-row">
                <span class="label">🌀 不确定进度条</span>
                <span class="value-badge">加载中…</span>
            </div>
            <div class="indeterminate-wrapper">
                <div class="indeterminate-bar"></div>
            </div>
            <p style="font-size: 0.85rem; margin-top: 10px; color: var(--text-secondary); letter-spacing: 0.3px; transition: color 0.4s;">
                无限循环 · 丝滑流光 · 无穿模
            </p>
        </div>

        <div class="divider"></div>

        <!-- 按钮区 + 切换开关 -->
        <div class="control-group">
            <div class="label-row">
                <span class="label">🎛️ 按钮 & 切换</span>
            </div>
            <div class="button-group">
                <button class="btn">默认按钮</button>
                <button class="btn btn-primary">主要操作</button>
                <button class="btn" id="ghostButton">✨ 悬停我</button>
            </div>
        </div>

        <!-- Toggle 开关 + 滑动胶囊切换 -->
        <div class="control-group">
            <div class="toggle-row">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <div class="toggle-switch" id="mainToggle" role="switch" aria-checked="false" tabindex="0">
                        <div class="toggle-knob"></div>
                    </div>
                    <span class="toggle-label" id="toggleStatusLabel">关闭</span>
                </div>
                
                <div class="segmented-control" id="segmentedToggle">
                    <div class="segmented-slider" id="segmentedSlider"></div>
                    <button class="segmented-option active" data-segment="day">🌞 日间</button>
                    <button class="segmented-option" data-segment="night">🌙 夜间</button>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- 滑块控件 -->
        <div class="control-group">
            <div class="label-row">
                <span class="label">🎚️ 丝滑滑块</span>
                <span class="value-badge slider-value" id="sliderValueDisplay">50</span>
            </div>
            <div class="slider-container">
                <input type="range" id="smoothSlider" min="0" max="100" value="50" step="1">
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 8px; color: var(--text-secondary); font-size: 0.8rem; padding: 0 6px; transition: color 0.4s;">
                <span>0</span>
                <span>50</span>
                <span>100</span>
            </div>
        </div>

        <div class="footnote">
            <span>⚡ 所有交互均使用 cubic-bezier 缓动 · 胶囊滑动切换</span>
        </div>
    </div>

    <script>
        (function(){
            "use strict";

            // 确定进度条
            const progressFill = document.getElementById('progressFill');
            const progressDisplay = document.getElementById('progressValueDisplay');
            document.querySelectorAll('[data-progress]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const percent = btn.getAttribute('data-progress') + '%';
                    progressFill.style.width = percent;
                    progressDisplay.textContent = percent;
                    btn.style.transform = 'scale(0.97)';
                    setTimeout(() => btn.style.transform = '', 120);
                });
            });

            // 开关 Toggle
            const toggleSwitch = document.getElementById('mainToggle');
            const toggleLabel = document.getElementById('toggleStatusLabel');
            function updateToggleUI(active) {
                toggleSwitch.classList.toggle('active', active);
                toggleSwitch.setAttribute('aria-checked', active);
                toggleLabel.textContent = active ? '开启' : '关闭';
            }
            toggleSwitch.addEventListener('click', () => {
                updateToggleUI(!toggleSwitch.classList.contains('active'));
            });
            toggleSwitch.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    updateToggleUI(!toggleSwitch.classList.contains('active'));
                }
            });

            // 滑动胶囊切换 (带滑块动画)
            const segmentControl = document.getElementById('segmentedToggle');
            const segmentOptions = document.querySelectorAll('.segmented-option');
            const sliderBlock = document.getElementById('segmentedSlider');
            const bodyEl = document.body;

            function moveSegmentedSlider() {
                const activeOption = document.querySelector('.segmented-option.active');
                if (!activeOption) return;
                const optionRect = activeOption.getBoundingClientRect();
                const controlRect = segmentControl.getBoundingClientRect();
                const leftOffset = optionRect.left - controlRect.left;
                const width = optionRect.width;
                sliderBlock.style.left = leftOffset + 'px';
                sliderBlock.style.width = width + 'px';
            }

            segmentOptions.forEach(opt => {
                opt.addEventListener('click', () => {
                    segmentOptions.forEach(o => o.classList.remove('active'));
                    opt.classList.add('active');
                    moveSegmentedSlider();
                    
                    const segment = opt.getAttribute('data-segment');
                    bodyEl.classList.toggle('night-theme', segment === 'night');
                });
            });

            window.addEventListener('resize', moveSegmentedSlider);
            setTimeout(moveSegmentedSlider, 30);
            new MutationObserver(moveSegmentedSlider).observe(document.body, { attributes: true, attributeFilter: ['class'] });

            // 滑块 Range
            const slider = document.getElementById('smoothSlider');
            const sliderValDisplay = document.getElementById('sliderValueDisplay');
            function updateSliderUI() {
                const val = slider.value;
                sliderValDisplay.textContent = val;
                const percent = (val - slider.min) / (slider.max - slider.min) * 100;
                const baseBg = getComputedStyle(document.body).getPropertyValue('--slider-bg').trim() || 'rgba(0,0,0,0.08)';
                slider.style.background = `linear-gradient(90deg, #3a7bd5 0%, #3a7bd5 ${percent}%, ${baseBg} ${percent}%)`;
            }
            slider.addEventListener('input', updateSliderUI);
            const themeObserver2 = new MutationObserver(updateSliderUI);
            themeObserver2.observe(document.body, { attributes: true, attributeFilter: ['class'] });
            updateSliderUI();

            console.log('✨ 丝滑控件 · 滑动胶囊切换 · 已激活');
        })();
    </script>
</body>
</html>
