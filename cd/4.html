<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>钢琴 & C4</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #0a1a28;
      overflow: hidden;
      font-family: 'Segoe UI', '华文楷体', 'Helvetica Neue', sans-serif;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, #1a3345, #0c1a28);
      cursor: crosshair;
    }

    /* 悬浮控件层 */
    .controls {
      position: absolute;
      bottom: 30px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      z-index: 20;
      pointer-events: none;
    }

    .instrument-selector {
      background: #1f4058b0;
      backdrop-filter: blur(8px);
      border-radius: 60px;
      padding: 8px 16px;
      display: flex;
      gap: 12px;
      border: 1px solid #8fc0d0;
      pointer-events: auto;
    }

    .inst-btn {
      background: #2a4a6e80;
      border: none;
      color: #d6edff;
      font-size: 1.4rem;
      padding: 8px 24px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.1s ease;
      font-weight: 500;
      backdrop-filter: blur(4px);
      letter-spacing: 2px;
    }

    .inst-btn.active {
      background: #3f78a5;
      color: #fff9e6;
      box-shadow: 0 0 12px #7fb0d0;
    }

    .inst-btn:active {
      transform: scale(0.96);
    }

    .info-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #1f4058b0;
      backdrop-filter: blur(8px);
      border-radius: 40px;
      padding: 8px 20px;
      color: #e0f3ff;
      font-size: 1.4rem;
      font-weight: 300;
      border: 1px solid #8fc0d0;
      pointer-events: none;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .note-count {
      background: #0c2a3a;
      padding: 2px 14px;
      border-radius: 30px;
      font-size: 1.6rem;
      font-weight: 500;
      min-width: 70px;
      text-align: center;
    }

    .reset-btn {
      position: absolute;
      bottom: 100px;
      right: 20px;
      background: #1f4058b0;
      backdrop-filter: blur(4px);
      border: 1px solid #8fc0d0;
      color: #f0f9ff;
      font-size: 0.9rem;
      padding: 8px 20px;
      border-radius: 40px;
      cursor: pointer;
      z-index: 20;
      transition: 0.2s;
      opacity: 0.6;
      pointer-events: auto;
    }

    .reset-btn:hover {
      opacity: 1;
      background: #2e6885;
    }

    .hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #c0e0f0;
      font-size: 0.8rem;
      background: #1f405880;
      backdrop-filter: blur(4px);
      padding: 4px 16px;
      border-radius: 40px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 20;
    }
  </style>
</head>
<body>
  <canvas id="mainCanvas"></canvas>

  <div class="info-panel">
    <span>点击次数</span>
    <span class="note-count" id="noteCounter">0</span>
  </div>

  <div class="controls">
    <div class="instrument-selector">
      <button class="inst-btn active" id="btnPiano">钢琴</button>
      <button class="inst-btn" id="btnGuitar">C4</button>
    </div>
  </div>

  <button class="reset-btn" id="resetBtn">重置计数</button>
  <div class="hint">💧 点击水面可泛起涟漪</div>

  <script>
    (function() {
      // ----- 画布与上下文 -----
      const canvas = document.getElementById('mainCanvas');
      const ctx = canvas.getContext('2d');
      let width, height;

      // ----- 音频上下文 -----
      let audioCtx = null;
      let audioInitPromise = null;
      let currentInstrument = 'piano';

      // ----- 琴键配置 (3行 x 5列 = 15个自然音阶 C4 - C6) -----
      const noteNames = [
        'C4', 'D4', 'E4', 'F4', 'G4',
        'A4', 'B4', 'C5', 'D5', 'E5',
        'F5', 'G5', 'A5', 'B5', 'C6'
      ];
      const baseFreqs = [
        261.63, 293.66, 329.63, 349.23, 392.00,
        440.00, 493.88, 523.25, 587.33, 659.25,
        698.46, 783.99, 880.00, 987.77, 1046.50
      ];

      // 布局参数
      const cols = 5, rows = 3;
      const keyRadius = 36;
      const hitRadius = 48;
      const spacingX = 86;
      const spacingY = 78;
      let keyPositions = [];

      // 琴键动画时间戳
      let lastPlayedAt = new Array(15).fill(0);

      // 音符计数
      let totalNotes = 0;
      const noteCounterSpan = document.getElementById('noteCounter');

      // ----- 涟漪系统 -----
      let ripples = [];

      // ----- 初始化琴键坐标 (动态适应画布) -----
      function updateKeyPositions() {
        const gridWidth = (cols - 1) * spacingX;
        const gridHeight = (rows - 1) * spacingY;
        const startX = (width - gridWidth) / 2;
        const baseY = height * 0.58;
        const startY = baseY - gridHeight / 2;

        keyPositions = [];
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const x = startX + c * spacingX;
            const y = startY + r * spacingY;
            keyPositions.push({ x, y });
          }
        }
      }

      // 涟漪逻辑 (与之前相同，保留)
      function createRipple(x, y) {
        x = Math.max(0, Math.min(width, x));
        y = Math.max(0, Math.min(height, y));
        ripples.push({
          x, y,
          radius: 5,
          maxRadius: Math.min(width, height) * 0.45,
          speed: 0.8 + Math.random() * 0.5,
          opacity: 0.9,
          fade: 0.008 + Math.random() * 0.005,
          color: `hsl(${180 + Math.random() * 60}, 90%, 70%)`,
        });
      }

      function updateRipples() {
        for (let i = ripples.length - 1; i >= 0; i--) {
          const r = ripples[i];
          r.radius += r.speed;
          r.opacity -= r.fade;
          if (r.opacity <= 0.02 || r.radius >= r.maxRadius) {
            ripples.splice(i, 1);
          }
        }
      }

      function drawRipples() {
        for (let r of ripples) {
          ctx.shadowBlur = 30;
          ctx.shadowColor = r.color;
          ctx.strokeStyle = r.color;
          ctx.lineWidth = 2 + (1 - r.opacity) * 4;
          ctx.globalAlpha = r.opacity * 0.8;
          ctx.beginPath();
          ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
          ctx.stroke();

          ctx.shadowBlur = 25;
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(r.x, r.y, r.radius * 0.6, 0, Math.PI * 2);
          ctx.stroke();

          ctx.shadowBlur = 30;
          ctx.fillStyle = r.color;
          ctx.globalAlpha = r.opacity * 0.5;
          ctx.beginPath();
          ctx.arc(r.x, r.y, 4 + r.radius * 0.1, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
      }

      // 背景绘制 (纯水色渐变)
      function drawBackground() {
        const grad = ctx.createLinearGradient(0, 0, width * 0.6, height);
        grad.addColorStop(0, '#102d3a');
        grad.addColorStop(1, '#1b4f60');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);
      }

      // 绘制琴键
      function drawKeys() {
        const now = performance.now();
        for (let i = 0; i < 15; i++) {
          const { x, y } = keyPositions[i];
          const timeSinceLast = now - lastPlayedAt[i];
          let extraRadius = 0;
          if (timeSinceLast < 200) {
            const t = timeSinceLast / 200;
            extraRadius = 10 * (1 - t);
          }

          let baseHue = currentInstrument === 'piano' ? 190 : 140;
          let hue = (baseHue + i * 3) % 360;

          ctx.shadowBlur = 40;
          ctx.shadowColor = `hsl(${hue}, 85%, 70%)`;
          ctx.beginPath();
          ctx.arc(x, y, keyRadius + extraRadius, 0, 2 * Math.PI);
          ctx.fillStyle = `hsla(${hue}, 80%, 65%, 0.5)`;
          ctx.fill();

          ctx.shadowBlur = 32;
          ctx.shadowColor = '#ffffff';
          ctx.beginPath();
          ctx.arc(x, y, keyRadius * 0.7 + extraRadius * 0.5, 0, 2 * Math.PI);
          ctx.fillStyle = `hsla(${hue}, 90%, 80%, 0.9)`;
          ctx.fill();

          ctx.shadowBlur = 24;
          ctx.beginPath();
          ctx.arc(x, y, keyRadius * 0.45, 0, 2 * Math.PI);
          ctx.fillStyle = '#fffef0';
          ctx.fill();

          ctx.shadowBlur = 14;
          ctx.font = 'bold 15px "Segoe UI", "华文楷体", sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = '#1e3a55';
          ctx.fillText(noteNames[i], x, y - 2);
          ctx.fillStyle = '#f0fbff';
          ctx.shadowColor = '#b0e0ff';
          ctx.fillText(noteNames[i], x, y - 4);
        }
        ctx.shadowBlur = 0;
      }

      // ----- 音频初始化 -----
      function initAudioContext() {
        if (audioCtx) return;
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) { console.warn(e); }
      }

      function ensureAudioReady() {
        if (!audioCtx) initAudioContext();
        if (audioCtx.state === 'running') return Promise.resolve();
        if (!audioInitPromise) {
          audioInitPromise = audioCtx.resume().catch(err => {
            console.warn(err);
            audioInitPromise = null;
          });
        }
        return audioInitPromise;
      }

      // ========== 真实钢琴合成器 ==========
      // 物理建模: 基频 + 多个泛音，精确ADSR包络，加上音槌敲击噪声
      function playPiano(freq) {
        const now = audioCtx.currentTime;
        const vol = 0.18;

        // 钢琴包络参数 (ADSR)
        const attack = 0.002;   // 极快起音
        const decay = 0.12;     // 快速衰减
        const sustain = 0.28;   // 保持音量
        const release = 0.35;   // 释音

        const totalDuration = 1.2;

        // 泛音比例: 基频最高，二次谐波较强，三次稍弱，四次为点缀
        const harmonics = [
          { factor: 1,  gain: 1.0 },   // 基频
          { factor: 2,  gain: 0.65 },  // 八度
          { factor: 3,  gain: 0.35 },  // 十二度
          { factor: 4,  gain: 0.20 },  // 双八度
          { factor: 5,  gain: 0.12 }   // 三度泛音
        ];

        const oscillators = [];
        const gains = [];

        harmonics.forEach(h => {
          const osc = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq * h.factor;
          osc.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          
          // 包络: 每个泛音独立控制
          gainNode.gain.setValueAtTime(0, now);
          gainNode.gain.linearRampToValueAtTime(vol * h.gain, now + attack);
          gainNode.gain.exponentialRampToValueAtTime(vol * h.gain * sustain, now + attack + decay);
          gainNode.gain.exponentialRampToValueAtTime(0.001, now + totalDuration);
          
          osc.start(now);
          osc.stop(now + totalDuration);
          
          oscillators.push(osc);
          gains.push(gainNode);
        });

        // 音槌噪声: 短促白噪声模拟琴槌敲击弦瞬间
        const noiseDuration = 0.025;
        const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * noiseDuration, audioCtx.sampleRate);
        const noiseData = noiseBuffer.getChannelData(0);
        for (let i = 0; i < noiseBuffer.length; i++) {
          noiseData[i] = (Math.random() - 0.5) * 0.4;
        }
        const noiseSource = audioCtx.createBufferSource();
        noiseSource.buffer = noiseBuffer;
        const noiseGain = audioCtx.createGain();
        noiseSource.connect(noiseGain);
        noiseGain.connect(audioCtx.destination);
        noiseGain.gain.setValueAtTime(0, now);
        noiseGain.gain.linearRampToValueAtTime(0.12, now + 0.002);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, now + noiseDuration);
        noiseSource.start(now);
        noiseSource.stop(now + noiseDuration);

        // 清理
        setTimeout(() => {
          oscillators.forEach((osc, idx) => {
            try { osc.disconnect(); gains[idx].disconnect(); } catch(e) {}
          });
          try { noiseSource.disconnect(); noiseGain.disconnect(); } catch(e) {}
        }, totalDuration * 1000);
      }

      // ========== 原声吉他合成器 (Karplus-Strong 算法) ==========
      // 经典的拨弦合成，模拟吉他弦振动
      function playGuitar(freq) {
        const now = audioCtx.currentTime;
        const sampleRate = audioCtx.sampleRate;
        const delayTime = 1 / freq;          // 延迟时间 = 周期
        const delaySamples = Math.floor(delayTime * sampleRate);
        if (delaySamples < 2) return;

        const vol = 0.12;
        const duration = 1.5;                 // 总时长

        // 创建延迟节点
        const delay = audioCtx.createDelay();
        delay.delayTime.value = delayTime;

        // 反馈增益 (模拟能量损失，0.99 让声音慢慢衰减)
        const feedbackGain = audioCtx.createGain();
        feedbackGain.gain.value = 0.99;

        // 低通滤波器模拟吉他琴体共鸣
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 2800;         // 吉他琴体共振峰
        filter.Q.value = 1.5;

        // 主音量控制
        const masterGain = audioCtx.createGain();
        masterGain.gain.setValueAtTime(0, now);
        masterGain.gain.linearRampToValueAtTime(vol, now + 0.005);
        masterGain.gain.exponentialRampToValueAtTime(0.001, now + duration);

        // 连接: 激励源 -> 延迟 -> 反馈 -> 延迟 (循环)
        // 激励源为短脉冲噪声，模拟拨弦
        const noiseLength = 0.01;
        const noiseBuffer = audioCtx.createBuffer(1, noiseLength * sampleRate, sampleRate);
        const noiseData = noiseBuffer.getChannelData(0);
        for (let i = 0; i < noiseBuffer.length; i++) {
          noiseData[i] = (Math.random() - 0.5) * 0.8;
        }
        const noise = audioCtx.createBufferSource();
        noise.buffer = noiseBuffer;

        // 连接路径: noise -> delay -> filter -> feedbackGain -> delay (反馈)
        noise.connect(delay);
        delay.connect(filter);
        filter.connect(feedbackGain);
        feedbackGain.connect(delay);
        // 同时从filter输出到主音量
        filter.connect(masterGain);
        masterGain.connect(audioCtx.destination);

        // 启动噪声激励
        noise.start(now);
        noise.stop(now + noiseLength);

        // 延迟线的能量会逐渐衰减，自动在duration后停止
        setTimeout(() => {
          try {
            delay.disconnect();
            filter.disconnect();
            feedbackGain.disconnect();
            masterGain.disconnect();
            noise.disconnect();
          } catch(e) {}
        }, duration * 1000);
      }

      // 统一播放入口
      function playNote(freq) {
        if (!audioCtx) initAudioContext();
        ensureAudioReady().then(() => {
          if (!audioCtx || audioCtx.state !== 'running') return;
          if (currentInstrument === 'piano') {
            playPiano(freq);
          } else {
            playGuitar(freq);
          }
        }).catch(e => console.warn);
      }

      // ----- 事件处理 -----
      function handleTap(e) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        let points = [];
        if (e.touches) {
          for (let i = 0; i < e.touches.length; i++) {
            points.push({
              x: (e.touches[i].clientX - rect.left) * scaleX,
              y: (e.touches[i].clientY - rect.top) * scaleY
            });
          }
        } else {
          points.push({
            x: (e.clientX - rect.left) * scaleX,
            y: (e.clientY - rect.top) * scaleY
          });
        }

        for (let p of points) {
          let hitKey = false;
          for (let i = 0; i < keyPositions.length; i++) {
            const k = keyPositions[i];
            const dx = p.x - k.x, dy = p.y - k.y;
            if (Math.hypot(dx, dy) < hitRadius) {
              playNote(baseFreqs[i]);
              totalNotes++;
              noteCounterSpan.textContent = totalNotes;
              lastPlayedAt[i] = performance.now();
              hitKey = true;
              break;
            }
          }
          if (!hitKey) {
            createRipple(p.x, p.y);
          }
        }
      }

      function resetAll() {
        totalNotes = 0;
        noteCounterSpan.textContent = '0';
        ripples = [];
      }

      // ----- 动画循环 -----
      function animate() {
        updateRipples();
        drawBackground();
        drawRipples();
        drawKeys();
        requestAnimationFrame(animate);
      }

      // ----- 窗口尺寸适应 -----
      function resizeHandler() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        updateKeyPositions();
      }

      // ----- 乐器切换 -----
      const pianoBtn = document.getElementById('btnPiano');
      const guitarBtn = document.getElementById('btnGuitar');
      pianoBtn.addEventListener('click', () => {
        pianoBtn.classList.add('active');
        guitarBtn.classList.remove('active');
        currentInstrument = 'piano';
      });
      guitarBtn.addEventListener('click', () => {
        guitarBtn.classList.add('active');
        pianoBtn.classList.remove('active');
        currentInstrument = 'guitar';
      });

      // 重置按钮
      const resetBtn = document.getElementById('resetBtn');
      resetBtn.addEventListener('click', () => resetAll());

      // 监听事件
      canvas.addEventListener('mousedown', handleTap);
      canvas.addEventListener('touchstart', handleTap, { passive: false });
      canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
      canvas.addEventListener('touchend', (e) => e.preventDefault());

      // 双击清空涟漪
      canvas.addEventListener('dblclick', (e) => {
        e.preventDefault();
        ripples = [];
      });

      window.addEventListener('resize', () => {
        resizeHandler();
      });

      // 音频唤醒
      document.body.addEventListener('touchstart', function initAudioOnce() {
        if (!audioCtx) initAudioContext();
      }, { once: true, passive: true });
      document.body.addEventListener('mousedown', function initAudioOnce() {
        if (!audioCtx) initAudioContext();
      }, { once: true, passive: true });

      // 启动
      resizeHandler();
      animate();
    })();
  </script>
</body>
</html>
