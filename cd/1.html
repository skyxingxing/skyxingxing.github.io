<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1130近防炮 · 双医疗船</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(45deg, #0a0f1e, #101624);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }
        .game-container {
            background: #1a1f2f;
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 2px #2f3b5c inset;
        }
        canvas {
            display: block;
            margin: 0 auto;
            width: 640px;
            height: 640px;
            border-radius: 50%;
            background: #0b0e17;
            box-shadow: 0 0 30px #3f5a9b55, 0 0 0 2px #4d68a0 inset;
            cursor: crosshair;
            border: none;
        }
        .stats-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.2rem;
            color: #b0e0ff;
            text-shadow: 0 0 8px #3e6bbf;
            font-weight: bold;
            font-size: 1.5rem;
            background: #0f1422cc;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid #4b69b0;
        }
        .stats-panel .ammo-box {
            display: flex;
            gap: 1rem;
        }
        .stats-panel .ammo-item {
            background: #232b44;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            box-shadow: inset 0 -2px 0 #0b0e1e;
            color: #f5d742;
        }
        .stats-panel .ally-hp {
            background: #2b3a4f;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            color: #aaffaa;
            box-shadow: inset 0 -2px 0 #0b0e1e;
        }
        .stats-panel .missile-hp {
            background: #4a2b4f;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            color: #ffaaee;
            box-shadow: inset 0 -2px 0 #0b0e1e;
        }
        .stats-panel .auto-missile-hp {
            background: #2b4f4a;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            color: #aaffdd;
            box-shadow: inset 0 -2px 0 #0b0e1e;
        }
        .stats-panel span {
            color: #f5d742;
            background: #232b44;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 2rem;
            box-shadow: inset 0 -2px 0 #0b0e1e;
        }
        button {
            background: #dc3545;
            border: none;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 0.6rem 2rem;
            border-radius: 40px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 6px 0 #7a1f2b, 0 10px 20px #020617;
            transition: 0.06s linear;
            font-family: inherit;
            border: 1px solid #ff7f8f;
        }
        button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #7a1f2b, 0 8px 16px #020617;
        }
        button:hover {
            background: #e04b5a;
        }
        .footer {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        .badge {
            background: #1f2a44;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            color: #aaccff;
            font-size: 1.1rem;
            border: 1px solid #5065a0;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="800" height="800"></canvas>
    <div class="stats-panel">
        <div class="ammo-box">
            <div class="ammo-item" id="leftAmmo">4000</div>
            <div class="ammo-item" id="rightAmmo">7000</div>
        </div>
        <div class="ally-hp" id="allyHp">❤️20</div>
        <div class="missile-hp" id="manualMissileHp">🔷5</div>
        <div class="auto-missile-hp" id="autoMissileHp">🔶0</div>
        <div>· <span id="modeDisplay">手动</span> · <span id="attackModeDisplay">拦截</span> · <span id="difficultyDisplay">普通</span></div>
        <div>❤️ <span id="lifeDisplay">3</span> · 🎯 <span id="scoreDisplay">0</span></div>
        <div class="footer">
            <div class="badge">WASD C自动 V攻击 Z难度 R换弹 拦截右键导弹(3s) 医疗船每5s治疗</div>
            <button id="restartBtn">重新装填</button>
        </div>
    </div>
</div>
<script>
    (function() {
        try {
            const canvas = document.getElementById('gameCanvas');
            if (!canvas) throw new Error('Canvas not found');
            const ctx = canvas.getContext('2d');
            if (!ctx) throw new Error('2D context not available');

            const lifeSpan = document.getElementById('lifeDisplay');
            const scoreSpan = document.getElementById('scoreDisplay');
            const modeSpan = document.getElementById('modeDisplay');
            const attackModeSpan = document.getElementById('attackModeDisplay');
            const difficultySpan = document.getElementById('difficultyDisplay');
            const leftAmmoSpan = document.getElementById('leftAmmo');
            const rightAmmoSpan = document.getElementById('rightAmmo');
            const allyHpSpan = document.getElementById('allyHp');
            const manualMissileHpSpan = document.getElementById('manualMissileHp');
            const autoMissileHpSpan = document.getElementById('autoMissileHp');
            const restartBtn = document.getElementById('restartBtn');

            const W = 800, H = 800;
            const CENTER_X = 400, CENTER_Y = 400;
            const WORLD_RADIUS = 370;

            let shipX = CENTER_X;
            let shipY = CENTER_Y;
            let shipAngle = 0;
            let shipSpeed = 0;
            const MAX_SPEED = 2.8;
            const TURN_SPEED = 0.03;
            const FRICTION = 0.96;
            const TURRET_BASE_OFFSET = -35;
            const TURRET_LATERAL_OFFSET = 25;

            let turrets = [
                { ammo: 4000, maxAmmo: 4000, reloading: false, reloadStartTime: 0, lastFireTime: performance.now(), barrelIndex: 0, angle: -Math.PI/2, x: 0, y: 0 },
                { ammo: 7000, maxAmmo: 7000, reloading: false, reloadStartTime: 0, lastFireTime: performance.now(), barrelIndex: 0, angle: -Math.PI/2, x: 0, y: 0 }
            ];

            const TURRET_ROTATE_SPEED = 0.20;
            const RELOAD_TIME = 2000;

            let autoMode = false;
            let attackMode = false;
            let difficultyMode = 0;
            const difficultyNames = ['普通', '困难', '地狱', '蜂群', '真实', '不可能', '绝望', '战场'];

            let allies = [];
            const ALLY_BULLET_SPEED = 12;
            const ALLY_BULLET_SIZE = 4;
            const ALLY_BULLET_MAX_AGE = 150;
            const ALLY_COUNT = 4;
            const ALLY_HP_PER_ALLY = 5;
            let totalAllyHp = ALLY_COUNT * ALLY_HP_PER_ALLY;

            // 手动导弹舰 (所有模式可用)
            let manualMissileShip = {
                x: 400,
                y: 450,
                hp: 5,
                maxHp: 5,
                active: true,
                lastFireTime: 0
            };

            // 自动导弹舰 (仅战场模式)
            let autoMissileShip = {
                x: 400,
                y: 350,
                hp: 5,
                maxHp: 5,
                active: false,
                lastFireTime: 0
            };
            const AUTO_MISSILE_COOLDOWN = 3000;

            // ========= 两艘医疗船 =========
            let healerFront = {
                x: 0, y: 0,  // 动态更新
                hp: 5,
                maxHp: 5,
                active: true,
                lastHealTime: 0  // 用于治疗计时
            };
            let healerRear = {
                x: 0, y: 0,
                hp: 5,
                maxHp: 5,
                active: true,
                lastHealTime: 0
            };
            const HEAL_COOLDOWN = 5000; // 5秒
            const HEALER_DISTANCE = 80; // 距离航母的距离

            let targetPoints = [];
            const MAX_TARGETS = 5;
            let missiles = [];
            const MISSILE_SPEED = 8;
            const MISSILE_RADIUS = 6;

            const MANUAL_MISSILE_COOLDOWN = 3000;

            const keys = { w: false, ArrowUp: false, s: false, ArrowDown: false, a: false, ArrowLeft: false, d: false, ArrowRight: false };

            window.addEventListener('keydown', (e) => {
                const key = e.key;
                if ([" ", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "w", "W", "a", "A", "s", "S", "d", "D", "c", "C", "v", "V", "z", "Z", "r", "R"].includes(key)) e.preventDefault();
                switch(key) {
                    case 'w': case 'W': keys.w = true; break;
                    case 'ArrowUp': keys.ArrowUp = true; break;
                    case 's': case 'S': keys.s = true; break;
                    case 'ArrowDown': keys.ArrowDown = true; break;
                    case 'a': case 'A': keys.a = true; break;
                    case 'ArrowLeft': keys.ArrowLeft = true; break;
                    case 'd': case 'D': keys.d = true; break;
                    case 'ArrowRight': keys.ArrowRight = true; break;
                    case 'c': case 'C':
                        autoMode = !autoMode;
                        modeSpan.textContent = autoMode ? '自动' : '手动';
                        break;
                    case 'v': case 'V':
                        if (attackMode !== !attackMode) {
                            if (!attackMode) freezeEnemies(true);
                            else freezeEnemies(false);
                        }
                        attackMode = !attackMode;
                        if (!attackMode) targetPoints = [];
                        attackModeSpan.textContent = attackMode ? '攻击' : '拦截';
                        break;
                    case 'z': case 'Z':
                        difficultyMode = (difficultyMode + 1) % 8;
                        difficultySpan.textContent = difficultyNames[difficultyMode];
                        // 切换难度：重置所有单位
                        enemies = [];
                        if (difficultyMode === 7) {
                            initAllies();
                            autoMissileShip.active = true;
                            autoMissileShip.hp = autoMissileShip.maxHp;
                            autoMissileShip.lastFireTime = 0;
                        } else {
                            allies = [];
                            totalAllyHp = 0;
                            autoMissileShip.active = false;
                        }
                        // 重置手动导弹舰
                        manualMissileShip.hp = manualMissileShip.maxHp;
                        manualMissileShip.active = true;
                        manualMissileShip.lastFireTime = 0;
                        // 重置医疗船
                        healerFront.hp = healerFront.maxHp;
                        healerFront.active = true;
                        healerFront.lastHealTime = 0;
                        healerRear.hp = healerRear.maxHp;
                        healerRear.active = true;
                        healerRear.lastHealTime = 0;
                        updateAllyHpDisplay();
                        updateMissileHpDisplay();
                        break;
                    case 'r': case 'R':
                        turrets.forEach(t => { if (!t.reloading && t.ammo < t.maxAmmo) { t.reloading = true; t.reloadStartTime = performance.now(); } });
                        break;
                    case ' ':
                        if (attackMode && targetPoints.length > 0) launchMissiles();
                        break;
                }
            });

            window.addEventListener('keyup', (e) => {
                const key = e.key;
                switch(key) {
                    case 'w': case 'W': keys.w = false; break;
                    case 'ArrowUp': keys.ArrowUp = false; break;
                    case 's': case 'S': keys.s = false; break;
                    case 'ArrowDown': keys.ArrowDown = false; break;
                    case 'a': case 'A': keys.a = false; break;
                    case 'ArrowLeft': keys.ArrowLeft = false; break;
                    case 'd': case 'D': keys.d = false; break;
                    case 'ArrowRight': keys.ArrowRight = false; break;
                }
            });

            function updateAmmoDisplay() { leftAmmoSpan.textContent = turrets[0].ammo; rightAmmoSpan.textContent = turrets[1].ammo; }
            function updateAllyHpDisplay() { allyHpSpan.textContent = `❤️${totalAllyHp}`; }
            function updateMissileHpDisplay() {
                manualMissileHpSpan.textContent = `🔷${manualMissileShip.active ? manualMissileShip.hp : 0}`;
                autoMissileHpSpan.textContent = `🔶${autoMissileShip.active ? autoMissileShip.hp : 0}`;
            }

            let gameActive = true;
            let lives = 3;
            let score = 0;

            let enemies = [];
            let bullets = [];
            let explosions = [];

            let mousePressed = false;
            let mouseX = turrets[0].x, mouseY = turrets[0].y - 80;

            const ENEMY_RADIUS = 12;
            const ENEMY_SPEED_BASE = 1.9;

            function getMaxEnemies() {
                switch(difficultyMode) {
                    case 0: return 35; case 1: return 105; case 2: return 175; case 3: return 250;
                    case 4: return 800; case 5: return 1500; case 6: return 2000; case 7: return 2000;
                    default: return 35;
                }
            }
            let spawnCounter = 0;
            function getSpawnParams() {
                switch(difficultyMode) {
                    case 0: return { interval: 18, batch: 1 }; case 1: return { interval: 12, batch: 1 };
                    case 2: return { interval: 8, batch: 1 }; case 3: return { interval: 5, batch: 3 };
                    case 4: return { interval: 1, batch: 1 }; case 5: return { interval: 1, batch: 3 };
                    case 6: return { interval: 1, batch: 6 }; case 7: return { interval: 1, batch: 6 };
                }
            }

            const BULLET_SIZE = 3.0, BULLET_SPEED = 17, BULLET_MAX_AGE = 130;
            const FIRE_RATE_RPM = 11000;
            const FIRE_INTERVAL_MS = 60 / (FIRE_RATE_RPM / 1000);
            const MAX_BARREL_ANGLE_RAD = 0.01 * Math.PI / 180;
            const BARREL_ANGLES = Array.from({ length: 11 }, (_, i) => ((i - 5) / 5) * MAX_BARREL_ANGLE_RAD);
            const BARREL_OFFSET_FACTOR = 0.01;
            const MAX_BULLETS = 20000;
            const BULLETS_CLEANUP_COUNT = 3000;

            function isInsideWorld(x, y, margin = 0) {
                const dx = x - CENTER_X, dy = y - CENTER_Y;
                return (dx * dx + dy * dy) <= (WORLD_RADIUS + margin) * (WORLD_RADIUS + margin);
            }

            function spawnEnemy() {
                if (!gameActive) return;
                const maxEnemies = getMaxEnemies();
                if (enemies.length >= maxEnemies) return;
                if (attackMode) return;
                const params = getSpawnParams();
                for (let b = 0; b < params.batch; b++) {
                    if (enemies.length >= maxEnemies) break;
                    const angle = Math.random() * 2 * Math.PI;
                    const r = WORLD_RADIUS - 15;
                    const x = CENTER_X + r * Math.cos(angle);
                    const y = CENTER_Y + r * Math.sin(angle);
                    const dx = CENTER_X - x, dy = CENTER_Y - y;
                    const len = Math.hypot(dx, dy);
                    if (len < 0.1) continue;
                    const baseAngle = Math.atan2(dy, dx);
                    const finalAngle = baseAngle + (Math.random() - 0.5) * 0.4;
                    let speed = ENEMY_SPEED_BASE * (0.9 + Math.random() * 0.3);
                    if (difficultyMode === 6) speed *= 2;
                    else if (difficultyMode === 7) speed *= 2.5;
                    enemies.push({ x, y, vx: Math.cos(finalAngle) * speed, vy: Math.sin(finalAngle) * speed, r: ENEMY_RADIUS, storedVx: 0, storedVy: 0 });
                }
            }

            function freezeEnemies(freeze) {
                if (freeze) {
                    for (let e of enemies) { e.storedVx = e.vx; e.storedVy = e.vy; e.vx = 0; e.vy = 0; }
                } else {
                    for (let e of enemies) {
                        if (e.storedVx !== undefined && e.storedVy !== undefined) { e.vx = e.storedVx; e.vy = e.storedVy; }
                        else {
                            const dx = CENTER_X - e.x, dy = CENTER_Y - e.y;
                            const len = Math.hypot(dx, dy);
                            if (len > 0.1) {
                                const angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.4;
                                const speed = ENEMY_SPEED_BASE * (0.9 + Math.random() * 0.3);
                                e.vx = Math.cos(angle) * speed;
                                e.vy = Math.sin(angle) * speed;
                            }
                        }
                    }
                }
            }

            function addExplosion(px, py) {
                if (difficultyMode === 6 || difficultyMode === 7) return;
                explosions.push({ x: px, y: py, life: 20, maxLife: 20 });
            }

            function fireManualMissile(targetX, targetY) {
                if (!manualMissileShip.active) return false;
                const now = performance.now();
                if (now - manualMissileShip.lastFireTime < MANUAL_MISSILE_COOLDOWN) return false;
                missiles.push({ x: manualMissileShip.x, y: manualMissileShip.y, targetX, targetY, radius: MISSILE_RADIUS });
                manualMissileShip.lastFireTime = now;
                return true;
            }

            function fireAutoMissile() {
                if (!autoMissileShip.active) return;
                if (attackMode) return;
                if (enemies.length === 0) return;
                const now = performance.now();
                if (now - autoMissileShip.lastFireTime < AUTO_MISSILE_COOLDOWN) return;
                let closestDist = Infinity, closestEnemy = null;
                for (let e of enemies) {
                    const dist = Math.hypot(e.x - autoMissileShip.x, e.y - autoMissileShip.y);
                    if (dist < closestDist) { closestDist = dist; closestEnemy = e; }
                }
                if (!closestEnemy) return;
                missiles.push({ x: autoMissileShip.x, y: autoMissileShip.y, targetX: closestEnemy.x, targetY: closestEnemy.y, radius: MISSILE_RADIUS });
                autoMissileShip.lastFireTime = now;
            }

            function launchMissiles() {
                for (let target of targetPoints) {
                    missiles.push({ x: shipX, y: shipY, targetX: target.x, targetY: target.y, radius: MISSILE_RADIUS });
                }
                targetPoints = [];
            }

            function initAllies() {
                allies = [];
                for (let i = 0; i < ALLY_COUNT; i++) {
                    const angle = (i / ALLY_COUNT) * 2 * Math.PI;
                    const x = CENTER_X + 150 * Math.cos(angle);
                    const y = CENTER_Y + 150 * Math.sin(angle);
                    allies.push({ x, y, hp: ALLY_HP_PER_ALLY, bullets: [] });
                }
                totalAllyHp = ALLY_COUNT * ALLY_HP_PER_ALLY;
            }

            // 治疗函数：寻找生命值最低的友方单位（不包括医疗船自身）加1点生命
            function performHeal() {
                // 收集所有可治疗的友方单位
                let candidates = [];
                // 绿色队友
                for (let ally of allies) {
                    if (ally.hp < ALLY_HP_PER_ALLY) candidates.push({ obj: ally, hp: ally.hp, maxHp: ALLY_HP_PER_ALLY });
                }
                // 手动导弹舰
                if (manualMissileShip.active && manualMissileShip.hp < manualMissileShip.maxHp) {
                    candidates.push({ obj: manualMissileShip, hp: manualMissileShip.hp, maxHp: manualMissileShip.maxHp });
                }
                // 自动导弹舰
                if (autoMissileShip.active && autoMissileShip.hp < autoMissileShip.maxHp) {
                    candidates.push({ obj: autoMissileShip, hp: autoMissileShip.hp, maxHp: autoMissileShip.maxHp });
                }
                if (candidates.length === 0) return;

                // 按当前血量升序排序，取第一个
                candidates.sort((a, b) => a.hp - b.hp);
                const target = candidates[0];
                target.obj.hp = Math.min(target.obj.hp + 1, target.maxHp);
                // 如果是导弹舰，更新显示
                updateMissileHpDisplay();
                // 如果是队友，totalAllyHp 需要重新计算，但治疗队友时队友hp增加，totalAllyHp也应增加
                // 为了方便，可以在治疗队友后重新计算 totalAllyHp
                let newTotal = 0;
                for (let ally of allies) newTotal += ally.hp;
                totalAllyHp = newTotal;
                updateAllyHpDisplay();
            }

            function resetGame() {
                gameActive = true;
                lives = 3;
                score = 0;
                enemies = [];
                bullets = [];
                explosions = [];
                missiles = [];
                targetPoints = [];
                mousePressed = false;
                autoMode = false;
                attackMode = false;
                difficultyMode = 0;
                difficultySpan.textContent = '普通';
                allies = [];
                totalAllyHp = 0;
                autoMissileShip.active = false;
                // 手动导弹舰重置
                manualMissileShip.hp = manualMissileShip.maxHp;
                manualMissileShip.active = true;
                manualMissileShip.lastFireTime = 0;
                // 医疗船重置
                healerFront.hp = healerFront.maxHp;
                healerFront.active = true;
                healerFront.lastHealTime = 0;
                healerRear.hp = healerRear.maxHp;
                healerRear.active = true;
                healerRear.lastHealTime = 0;
                turrets[0] = { ammo: 4000, maxAmmo: 4000, reloading: false, reloadStartTime: 0, lastFireTime: performance.now(), barrelIndex: 0, angle: -Math.PI/2, x: 0, y: 0 };
                turrets[1] = { ammo: 7000, maxAmmo: 7000, reloading: false, reloadStartTime: 0, lastFireTime: performance.now(), barrelIndex: 0, angle: -Math.PI/2, x: 0, y: 0 };
                updateAmmoDisplay();
                updateAllyHpDisplay();
                updateMissileHpDisplay();
                modeSpan.textContent = '手动';
                attackModeSpan.textContent = '拦截';
                shipX = CENTER_X;
                shipY = CENTER_Y;
                shipAngle = 0;
                shipSpeed = 0;
                updateTurretPositions();
                mouseX = turrets[0].x;
                mouseY = turrets[0].y - 80;
                spawnCounter = 0;
                updateDisplay();
            }

            function updateDisplay() {
                lifeSpan.textContent = lives;
                scoreSpan.textContent = score;
                updateAmmoDisplay();
                updateAllyHpDisplay();
                updateMissileHpDisplay();
            }

            function updateTurretPositions() {
                const baseX = shipX + TURRET_BASE_OFFSET * Math.cos(shipAngle);
                const baseY = shipY + TURRET_BASE_OFFSET * Math.sin(shipAngle);
                const leftOffsetX = -Math.sin(shipAngle) * TURRET_LATERAL_OFFSET;
                const leftOffsetY = Math.cos(shipAngle) * TURRET_LATERAL_OFFSET;
                turrets[0].x = baseX + leftOffsetX;
                turrets[0].y = baseY + leftOffsetY;
                turrets[1].x = baseX - leftOffsetX;
                turrets[1].y = baseY - leftOffsetY;
            }

            function getTargetAngleForTurret(turret) {
                if (enemies.length === 0) return null;
                let closestDist = Infinity, closestEnemy = null;
                for (let e of enemies) {
                    const dist = Math.hypot(e.x - turret.x, e.y - turret.y);
                    if (dist < closestDist) { closestDist = dist; closestEnemy = e; }
                }
                return closestEnemy ? Math.atan2(closestEnemy.y - turret.y, closestEnemy.x - turret.x) : null;
            }

            let shootingState = false;

            function shootBullets(now) {
                if (!gameActive || !shootingState) return;
                for (let t of turrets) {
                    if (t.reloading || t.ammo <= 0) continue;
                    const elapsed = now - t.lastFireTime;
                    if (elapsed < FIRE_INTERVAL_MS) continue;
                    const roundsToFire = Math.floor(elapsed / FIRE_INTERVAL_MS);
                    if (roundsToFire <= 0) continue;
                    const roundsActual = Math.min(roundsToFire, t.ammo);
                    if (roundsActual === 0) continue;
                    t.lastFireTime += roundsToFire * FIRE_INTERVAL_MS;
                    const baseAngle = t.angle;
                    for (let i = 0; i < roundsActual; i++) {
                        const barrelOffset = BARREL_ANGLES[t.barrelIndex];
                        const spread = (Math.random() - 0.5) * 0.0005;
                        const finalAngle = baseAngle + barrelOffset + spread;
                        const vx = Math.cos(finalAngle) * BULLET_SPEED;
                        const vy = Math.sin(finalAngle) * BULLET_SPEED;
                        const perpX = -Math.sin(baseAngle) * (t.barrelIndex - 5) * BARREL_OFFSET_FACTOR;
                        const perpY = Math.cos(baseAngle) * (t.barrelIndex - 5) * BARREL_OFFSET_FACTOR;
                        bullets.push({ x: t.x + perpX, y: t.y + perpY, vx, vy, age: 0 });
                        t.barrelIndex = (t.barrelIndex + 1) % 11;
                    }
                    t.ammo -= roundsActual;
                    updateAmmoDisplay();
                    if (bullets.length > MAX_BULLETS) bullets.splice(0, BULLETS_CLEANUP_COUNT);
                }
            }

            function alliesShoot() {
                if (allies.length === 0 || attackMode || enemies.length === 0) return;
                for (let ally of allies) {
                    for (let i = 0; i < 2; i++) {
                        let closestDist = Infinity, closestEnemy = null;
                        for (let e of enemies) {
                            const dist = Math.hypot(e.x - ally.x, e.y - ally.y);
                            if (dist < closestDist) { closestDist = dist; closestEnemy = e; }
                        }
                        if (!closestEnemy) continue;
                        const targetAngle = Math.atan2(closestEnemy.y - ally.y, closestEnemy.x - ally.x);
                        const spread = (Math.random() - 0.5) * 0.1;
                        const angle = targetAngle + spread;
                        ally.bullets.push({ x: ally.x, y: ally.y, vx: Math.cos(angle) * ALLY_BULLET_SPEED, vy: Math.sin(angle) * ALLY_BULLET_SPEED, age: 0 });
                    }
                }
            }

            function update() {
                if (!gameActive) return;
                const now = performance.now();

                // 更新医疗船位置（跟随航母）
                if (healerFront.active) {
                    healerFront.x = shipX + HEALER_DISTANCE * Math.cos(shipAngle);
                    healerFront.y = shipY + HEALER_DISTANCE * Math.sin(shipAngle);
                }
                if (healerRear.active) {
                    healerRear.x = shipX - HEALER_DISTANCE * Math.cos(shipAngle);
                    healerRear.y = shipY - HEALER_DISTANCE * Math.sin(shipAngle);
                }

                // 医疗船治疗逻辑
                if (healerFront.active && now - healerFront.lastHealTime >= HEAL_COOLDOWN) {
                    performHeal();
                    healerFront.lastHealTime = now;
                }
                if (healerRear.active && now - healerRear.lastHealTime >= HEAL_COOLDOWN) {
                    performHeal();
                    healerRear.lastHealTime = now;
                }

                for (let t of turrets) {
                    if (t.reloading && now - t.reloadStartTime >= RELOAD_TIME) {
                        t.ammo = t.maxAmmo;
                        t.reloading = false;
                        t.lastFireTime = now;
                        updateAmmoDisplay();
                    }
                }
                if (!attackMode) {
                    for (let t of turrets) {
                        if (t.ammo <= 0 && !t.reloading) { t.reloading = true; t.reloadStartTime = now; }
                    }
                }

                let forward = 0;
                if (keys.w || keys.ArrowUp) forward += 1;
                if (keys.s || keys.ArrowDown) forward -= 1;
                if (forward !== 0) {
                    shipSpeed += forward * 0.2;
                    if (shipSpeed > MAX_SPEED) shipSpeed = MAX_SPEED;
                    if (shipSpeed < -MAX_SPEED/2) shipSpeed = -MAX_SPEED/2;
                }
                let turn = 0;
                if (keys.a || keys.ArrowLeft) turn -= 1;
                if (keys.d || keys.ArrowRight) turn += 1;
                if (turn !== 0) shipAngle += turn * TURN_SPEED;
                shipSpeed *= FRICTION;

                let newX = shipX + shipSpeed * Math.cos(shipAngle);
                let newY = shipY + shipSpeed * Math.sin(shipAngle);
                const shipMargin = 35;
                if (isInsideWorld(newX, newY, -shipMargin)) { shipX = newX; shipY = newY; }
                else shipSpeed *= 0.5;
                updateTurretPositions();

                if (!attackMode) {
                    if (autoMode) {
                        for (let t of turrets) {
                            const targetAngle = getTargetAngleForTurret(t);
                            if (targetAngle !== null) {
                                let delta = targetAngle - t.angle;
                                while (delta > Math.PI) delta -= 2 * Math.PI;
                                while (delta < -Math.PI) delta += 2 * Math.PI;
                                const maxDelta = TURRET_ROTATE_SPEED;
                                t.angle += Math.sign(delta) * Math.min(Math.abs(delta), maxDelta);
                            }
                        }
                    } else {
                        const targetAngle = Math.atan2(mouseY - turrets[0].y, mouseX - turrets[0].x);
                        for (let t of turrets) {
                            let delta = targetAngle - t.angle;
                            while (delta > Math.PI) delta -= 2 * Math.PI;
                            while (delta < -Math.PI) delta += 2 * Math.PI;
                            const maxDelta = TURRET_ROTATE_SPEED;
                            t.angle += Math.sign(delta) * Math.min(Math.abs(delta), maxDelta);
                        }
                    }
                }

                shootingState = attackMode ? false : (autoMode ? enemies.length > 0 : mousePressed);
                shootBullets(now);
                alliesShoot();
                fireAutoMissile();

                if (!attackMode) {
                    const params = getSpawnParams();
                    spawnCounter++;
                    if (spawnCounter >= params.interval) { spawnCounter = 0; spawnEnemy(); }
                }

                for (let i = bullets.length - 1; i >= 0; i--) {
                    const b = bullets[i];
                    b.x += b.vx; b.y += b.vy; b.age++;
                    if (!isInsideWorld(b.x, b.y, 10) || b.age > BULLET_MAX_AGE) bullets.splice(i, 1);
                }

                for (let ally of allies) {
                    for (let i = ally.bullets.length - 1; i >= 0; i--) {
                        const b = ally.bullets[i];
                        b.x += b.vx; b.y += b.vy; b.age++;
                        if (!isInsideWorld(b.x, b.y, 10) || b.age > ALLY_BULLET_MAX_AGE) ally.bullets.splice(i, 1);
                    }
                }

                for (let i = missiles.length - 1; i >= 0; i--) {
                    const m = missiles[i];
                    const dx = m.targetX - m.x, dy = m.targetY - m.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < MISSILE_SPEED) {
                        m.x = m.targetX; m.y = m.targetY;
                        addExplosion(m.x, m.y);
                        for (let j = enemies.length - 1; j >= 0; j--) {
                            const e = enemies[j];
                            if (Math.hypot(e.x - m.x, e.y - m.y) < 120) {
                                enemies.splice(j, 1);
                                score += 10;
                                addExplosion(e.x, e.y);
                            }
                        }
                        missiles.splice(i, 1);
                    } else {
                        const angle = Math.atan2(dy, dx);
                        m.x += Math.cos(angle) * MISSILE_SPEED;
                        m.y += Math.sin(angle) * MISSILE_SPEED;
                    }
                }

                if (!attackMode) for (let e of enemies) { e.x += e.vx; e.y += e.vy; }

                for (let i = bullets.length - 1; i >= 0; i--) {
                    const bullet = bullets[i];
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const enemy = enemies[j];
                        if (Math.hypot(bullet.x - enemy.x, bullet.y - enemy.y) < BULLET_SIZE + enemy.r) {
                            bullets.splice(i, 1); enemies.splice(j, 1); score += 10; addExplosion(enemy.x, enemy.y); updateDisplay(); break;
                        }
                    }
                }

                for (let ally of allies) {
                    for (let i = ally.bullets.length - 1; i >= 0; i--) {
                        const bullet = ally.bullets[i];
                        for (let j = enemies.length - 1; j >= 0; j--) {
                            const enemy = enemies[j];
                            if (Math.hypot(bullet.x - enemy.x, bullet.y - enemy.y) < ALLY_BULLET_SIZE + enemy.r) {
                                ally.bullets.splice(i, 1); enemies.splice(j, 1); score += 10; addExplosion(enemy.x, enemy.y); updateDisplay(); break;
                            }
                        }
                    }
                }

                // 敌人撞击炮台
                if (!attackMode) {
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        const enemy = enemies[i];
                        let hit = false;
                        for (let t of turrets) {
                            if (Math.hypot(enemy.x - t.x, enemy.y - t.y) < enemy.r + 22) { hit = true; break; }
                        }
                        if (hit) {
                            enemies.splice(i, 1);
                            lives--;
                            addExplosion(enemy.x, enemy.y);
                            updateDisplay();
                            if (lives <= 0) {
                                gameActive = false; lives = 0; updateDisplay(); enemies = []; bullets = []; missiles = []; allies = []; totalAllyHp = 0; autoMissileShip.active = false; manualMissileShip.active = false; shootingState = false; break;
                            }
                        }
                    }
                }

                // 敌人撞击队友
                if (!attackMode && allies.length > 0) {
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        const enemy = enemies[i];
                        for (let j = allies.length - 1; j >= 0; j--) {
                            const ally = allies[j];
                            if (Math.hypot(enemy.x - ally.x, enemy.y - ally.y) < enemy.r + 22) {
                                enemies.splice(i, 1);
                                ally.hp--;
                                totalAllyHp--;
                                addExplosion(enemy.x, enemy.y);
                                if (ally.hp <= 0) allies.splice(j, 1);
                                updateAllyHpDisplay();
                                if (totalAllyHp <= 0) {
                                    gameActive = false; lives = 0; updateDisplay(); enemies = []; bullets = []; missiles = []; allies = []; autoMissileShip.active = false; manualMissileShip.active = false; shootingState = false; break;
                                }
                                break;
                            }
                        }
                        if (!gameActive) break;
                    }
                }

                // 敌人撞击手动导弹舰
                if (!attackMode && manualMissileShip.active) {
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        const enemy = enemies[i];
                        if (Math.hypot(enemy.x - manualMissileShip.x, enemy.y - manualMissileShip.y) < enemy.r + 22) {
                            enemies.splice(i, 1);
                            manualMissileShip.hp--;
                            addExplosion(enemy.x, enemy.y);
                            if (manualMissileShip.hp <= 0) manualMissileShip.active = false;
                            updateMissileHpDisplay();
                            break;
                        }
                    }
                }

                // 敌人撞击自动导弹舰
                if (!attackMode && autoMissileShip.active) {
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        const enemy = enemies[i];
                        if (Math.hypot(enemy.x - autoMissileShip.x, enemy.y - autoMissileShip.y) < enemy.r + 22) {
                            enemies.splice(i, 1);
                            autoMissileShip.hp--;
                            addExplosion(enemy.x, enemy.y);
                            if (autoMissileShip.hp <= 0) autoMissileShip.active = false;
                            updateMissileHpDisplay();
                            break;
                        }
                    }
                }

                // 敌人撞击医疗船
                if (!attackMode && healerFront.active) {
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        const enemy = enemies[i];
                        if (Math.hypot(enemy.x - healerFront.x, enemy.y - healerFront.y) < enemy.r + 22) {
                            enemies.splice(i, 1);
                            healerFront.hp--;
                            addExplosion(enemy.x, enemy.y);
                            if (healerFront.hp <= 0) healerFront.active = false;
                            break;
                        }
                    }
                }
                if (!attackMode && healerRear.active) {
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        const enemy = enemies[i];
                        if (Math.hypot(enemy.x - healerRear.x, enemy.y - healerRear.y) < enemy.r + 22) {
                            enemies.splice(i, 1);
                            healerRear.hp--;
                            addExplosion(enemy.x, enemy.y);
                            if (healerRear.hp <= 0) healerRear.active = false;
                            break;
                        }
                    }
                }

                for (let i = explosions.length - 1; i >= 0; i--) {
                    explosions[i].life--;
                    if (explosions[i].life <= 0) explosions.splice(i, 1);
                }
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);
                const grad = ctx.createRadialGradient(CENTER_X, CENTER_Y, 0, CENTER_X, CENTER_Y, WORLD_RADIUS);
                grad.addColorStop(0, '#14203b'); grad.addColorStop(1, '#020614');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(CENTER_X, CENTER_Y, WORLD_RADIUS, 0, 2 * Math.PI); ctx.fill();
                ctx.strokeStyle = '#4d68a0'; ctx.lineWidth = 3; ctx.stroke();

                ctx.strokeStyle = '#1f3a6b'; ctx.lineWidth = 0.8;
                for (let r = 80; r < WORLD_RADIUS; r += 80) { ctx.beginPath(); ctx.arc(CENTER_X, CENTER_Y, r, 0, 2 * Math.PI); ctx.stroke(); }
                for (let a = 0; a < 8; a++) {
                    const angle = a * Math.PI / 4;
                    ctx.beginPath(); ctx.moveTo(CENTER_X, CENTER_Y); ctx.lineTo(CENTER_X + WORLD_RADIUS * Math.cos(angle), CENTER_Y + WORLD_RADIUS * Math.sin(angle)); ctx.stroke();
                }

                for (let exp of explosions) {
                    const alpha = Math.min(1, exp.life / exp.maxLife * 1.2);
                    const size = 10 + (exp.maxLife - exp.life) * 0.5;
                    ctx.beginPath(); ctx.arc(exp.x, exp.y, size, 0, 2 * Math.PI);
                    ctx.fillStyle = `rgba(255, 200, 50, ${alpha})`;
                    ctx.shadowColor = '#faa000'; ctx.shadowBlur = 18; ctx.fill();
                }
                ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';

                for (let e of enemies) {
                    ctx.shadowColor = '#ff3a3a'; ctx.shadowBlur = 22;
                    ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, 2 * Math.PI); ctx.fillStyle = '#db2c2c'; ctx.fill();
                    ctx.shadowBlur = 18; ctx.beginPath(); ctx.arc(e.x-2, e.y-2, e.r-4, 0, 2 * Math.PI); ctx.fillStyle = '#ffb3b3'; ctx.fill();
                    ctx.shadowBlur = 20; ctx.beginPath(); ctx.moveTo(e.x-10, e.y-3); ctx.lineTo(e.x-18, e.y); ctx.lineTo(e.x-10, e.y+3); ctx.fillStyle = '#ff7b24'; ctx.fill();
                }

                for (let b of bullets) { ctx.beginPath(); ctx.arc(b.x, b.y, BULLET_SIZE, 0, 2 * Math.PI); ctx.fillStyle = '#f0fc6a'; ctx.fill(); }

                for (let ally of allies) {
                    for (let b of ally.bullets) {
                        ctx.beginPath(); ctx.arc(b.x, b.y, ALLY_BULLET_SIZE, 0, 2 * Math.PI);
                        ctx.fillStyle = '#aaffaa'; ctx.shadowColor = '#00ff00'; ctx.shadowBlur = 10; ctx.fill();
                    }
                }

                for (let m of missiles) {
                    ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 20;
                    ctx.beginPath(); ctx.arc(m.x, m.y, m.radius, 0, 2 * Math.PI); ctx.fillStyle = '#ffaa33'; ctx.fill();
                    const angleToTarget = Math.atan2(m.targetY - m.y, m.targetX - m.x);
                    ctx.beginPath(); ctx.arc(m.x - 6 * Math.cos(angleToTarget), m.y - 6 * Math.sin(angleToTarget), 4, 0, 2 * Math.PI); ctx.fillStyle = '#ff6600'; ctx.fill();
                }

                ctx.save(); ctx.translate(shipX, shipY); ctx.rotate(shipAngle);
                ctx.shadowBlur = 20; ctx.shadowColor = '#2a6f9c';
                ctx.fillStyle = '#3c4f6e'; ctx.beginPath(); ctx.moveTo(-20, -8); ctx.lineTo(35, -20); ctx.lineTo(35, 20); ctx.lineTo(-20, 8); ctx.closePath(); ctx.fill();
                ctx.fillStyle = '#5d7aa3'; ctx.beginPath(); ctx.moveTo(-12, -5); ctx.lineTo(25, -14); ctx.lineTo(25, 14); ctx.lineTo(-12, 5); ctx.closePath(); ctx.fill();
                ctx.fillStyle = '#2b3a4f'; ctx.fillRect(10, -10, 14, 20);
                ctx.fillStyle = '#7189b5'; ctx.fillRect(12, -6, 8, 12);
                ctx.restore();

                for (let t of turrets) {
                    ctx.save(); ctx.translate(t.x, t.y);
                    ctx.shadowBlur = 25; ctx.shadowColor = '#2aa0ff';
                    ctx.beginPath(); ctx.arc(0, 0, 30, 0, 2 * Math.PI); ctx.fillStyle = '#2b374b'; ctx.fill(); ctx.strokeStyle = '#6d93d4'; ctx.lineWidth = 2.5; ctx.stroke();
                    for (let j = 0; j < 11; j++) {
                        const angle = t.angle + BARREL_ANGLES[j];
                        const tipX = Math.cos(angle) * 40, tipY = Math.sin(angle) * 40;
                        const startX = Math.cos(angle) * 8, startY = Math.sin(angle) * 8;
                        ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(tipX, tipY);
                        ctx.lineWidth = 3.5; ctx.strokeStyle = (j === t.barrelIndex % 11) ? '#f2d96c' : '#adc0f0';
                        ctx.shadowBlur = (j === t.barrelIndex % 11) ? 30 : 18; ctx.stroke();
                    }
                    if (shootingState && gameActive && (performance.now() - t.lastFireTime < FIRE_INTERVAL_MS * 2)) {
                        for (let f = 0; f < 3; f++) {
                            const randAngle = t.angle + (Math.random() - 0.5) * 0.1;
                            ctx.shadowBlur = 40; ctx.beginPath(); ctx.arc(Math.cos(randAngle) * 46, Math.sin(randAngle) * 46, 14 + Math.random() * 6, 0, 2 * Math.PI);
                            ctx.fillStyle = `rgba(255, 200, 30, ${0.5+Math.random()*0.4})`; ctx.fill();
                        }
                    }
                    ctx.restore();
                }

                for (let ally of allies) {
                    ctx.save(); ctx.translate(ally.x, ally.y);
                    ctx.shadowBlur = 20; ctx.shadowColor = '#00ffaa';
                    ctx.fillStyle = '#3f9f6e'; ctx.beginPath(); ctx.moveTo(-15, -6); ctx.lineTo(25, -15); ctx.lineTo(25, 15); ctx.lineTo(-15, 6); ctx.closePath(); ctx.fill();
                    ctx.fillStyle = '#7fdfae'; ctx.beginPath(); ctx.moveTo(-8, -4); ctx.lineTo(18, -10); ctx.lineTo(18, 10); ctx.lineTo(-8, 4); ctx.closePath(); ctx.fill();
                    ctx.fillStyle = '#2b6f4e'; ctx.beginPath(); ctx.arc(0, 0, 10, 0, 2 * Math.PI); ctx.fill();
                    ctx.font = 'bold 12px "Courier New"'; ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 5; ctx.fillText(ally.hp, -8, -15);
                    ctx.restore();
                }

                if (manualMissileShip.active) {
                    ctx.save(); ctx.translate(manualMissileShip.x, manualMissileShip.y);
                    ctx.shadowBlur = 20; ctx.shadowColor = '#aa00ff';
                    ctx.fillStyle = '#8a4f9f'; ctx.beginPath(); ctx.moveTo(-15, -6); ctx.lineTo(25, -15); ctx.lineTo(25, 15); ctx.lineTo(-15, 6); ctx.closePath(); ctx.fill();
                    ctx.fillStyle = '#bf7fdf'; ctx.beginPath(); ctx.moveTo(-8, -4); ctx.lineTo(18, -10); ctx.lineTo(18, 10); ctx.lineTo(-8, 4); ctx.closePath(); ctx.fill();
                    ctx.fillStyle = '#8f5fbf'; ctx.beginPath(); ctx.arc(0, 0, 12, 0, 2 * Math.PI); ctx.fill();
                    ctx.font = 'bold 12px "Courier New"'; ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 5; ctx.fillText(manualMissileShip.hp, -8, -15);
                    ctx.restore();
                }

                if (autoMissileShip.active) {
                    ctx.save(); ctx.translate(autoMissileShip.x, autoMissileShip.y);
                    ctx.shadowBlur = 20; ctx.shadowColor = '#00aaff';
                    ctx.fillStyle = '#2f9f8a'; ctx.beginPath(); ctx.moveTo(-15, -6); ctx.lineTo(25, -15); ctx.lineTo(25, 15); ctx.lineTo(-15, 6); ctx.closePath(); ctx.fill();
                    ctx.fillStyle = '#7fdfcf'; ctx.beginPath(); ctx.moveTo(-8, -4); ctx.lineTo(18, -10); ctx.lineTo(18, 10); ctx.lineTo(-8, 4); ctx.closePath(); ctx.fill();
                    ctx.fillStyle = '#2fbfaf'; ctx.beginPath(); ctx.arc(0, 0, 12, 0, 2 * Math.PI); ctx.fill();
                    ctx.font = 'bold 12px "Courier New"'; ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 5; ctx.fillText(autoMissileShip.hp, -8, -15);
                    ctx.restore();
                }

                // 绘制医疗船
                if (healerFront.active) {
                    ctx.save(); ctx.translate(healerFront.x, healerFront.y);
                    ctx.shadowBlur = 20; ctx.shadowColor = '#ffffff';
                    ctx.fillStyle = '#f0f0f0'; ctx.beginPath(); ctx.moveTo(-12, -5); ctx.lineTo(20, -12); ctx.lineTo(20, 12); ctx.lineTo(-12, 5); ctx.closePath(); ctx.fill();
                    ctx.fillStyle = '#d0d0d0'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, 2 * Math.PI); ctx.fill();
                    ctx.font = 'bold 10px "Courier New"'; ctx.fillStyle = '#ff0000'; ctx.shadowBlur = 5; ctx.fillText('+', -5, 4);
                    ctx.font = 'bold 8px "Courier New"'; ctx.fillStyle = '#000000'; ctx.shadowBlur = 5; ctx.fillText(healerFront.hp, 10, -10);
                    ctx.restore();
                }
                if (healerRear.active) {
                    ctx.save(); ctx.translate(healerRear.x, healerRear.y);
                    ctx.shadowBlur = 20; ctx.shadowColor = '#ffffff';
                    ctx.fillStyle = '#f0f0f0'; ctx.beginPath(); ctx.moveTo(-12, -5); ctx.lineTo(20, -12); ctx.lineTo(20, 12); ctx.lineTo(-12, 5); ctx.closePath(); ctx.fill();
                    ctx.fillStyle = '#d0d0d0'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, 2 * Math.PI); ctx.fill();
                    ctx.font = 'bold 10px "Courier New"'; ctx.fillStyle = '#ff0000'; ctx.shadowBlur = 5; ctx.fillText('+', -5, 4);
                    ctx.font = 'bold 8px "Courier New"'; ctx.fillStyle = '#000000'; ctx.shadowBlur = 5; ctx.fillText(healerRear.hp, 10, -10);
                    ctx.restore();
                }

                if (attackMode) {
                    for (let i = 0; i < targetPoints.length; i++) {
                        const p = targetPoints[i];
                        ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, 2 * Math.PI);
                        ctx.strokeStyle = '#ffaa00'; ctx.lineWidth = 3; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);
                        ctx.font = 'bold 16px "Courier New"'; ctx.fillStyle = '#ffaa00'; ctx.fillText(i+1, p.x-8, p.y-15);
                    }
                    ctx.font = 'bold 20px "Courier New"'; ctx.fillStyle = '#ffaa00'; ctx.shadowBlur = 10;
                    ctx.fillText('左键圈外放置目标点', 20, 50);
                    ctx.fillText('空格发射全部(航母)', 20, 80);
                } else {
                    ctx.font = 'bold 20px "Courier New"'; ctx.fillStyle = '#ffaa00'; ctx.shadowBlur = 10;
                    ctx.fillText('拦截模式 - 右键手动导弹', 20, 50);
                    const now = performance.now();
                    if (manualMissileShip.active) {
                        const timeSinceLast = now - manualMissileShip.lastFireTime;
                        if (timeSinceLast < MANUAL_MISSILE_COOLDOWN) {
                            const remaining = Math.ceil((MANUAL_MISSILE_COOLDOWN - timeSinceLast) / 1000);
                            ctx.fillText(`手动冷却: ${remaining}s`, 20, 80);
                        } else ctx.fillText('手动就绪', 20, 80);
                    } else ctx.fillText('手动舰已毁', 20, 80);
                }

                if (autoMissileShip.active) {
                    const now = performance.now();
                    const timeSinceLast = now - autoMissileShip.lastFireTime;
                    const remaining = Math.ceil((AUTO_MISSILE_COOLDOWN - timeSinceLast) / 1000);
                    ctx.font = 'bold 20px "Courier New"'; ctx.fillStyle = '#aaffdd';
                    ctx.fillText(`自动冷却: ${remaining}s`, 20, 110);
                }

                if (turrets.some(t => t.reloading)) {
                    ctx.font = 'bold 36px "Courier New"'; ctx.fillStyle = '#ffaa00'; ctx.shadowBlur = 20;
                    ctx.fillText('RELOADING...', 200, 350);
                } else if (turrets.every(t => t.ammo === 0)) {
                    ctx.font = 'bold 36px "Courier New"'; ctx.fillStyle = '#ff6666'; ctx.shadowBlur = 20;
                    ctx.fillText('OUT OF AMMO', 180, 350);
                }

                ctx.font = 'bold 24px "Courier New"'; ctx.fillStyle = '#ffaa00'; ctx.shadowBlur = 10;
                ctx.fillText(difficultyNames[difficultyMode], 20, 200);

                ctx.shadowBlur = 16; ctx.shadowColor = '#8ec0fc';
                ctx.beginPath(); ctx.arc(mouseX, mouseY, 20, 0, 2 * Math.PI);
                ctx.strokeStyle = autoMode ? '#aaffaa' : '#bae1ff'; ctx.lineWidth = 2; ctx.setLineDash([5, 8]); ctx.stroke(); ctx.setLineDash([]);
                ctx.beginPath(); ctx.moveTo(mouseX-24, mouseY); ctx.lineTo(mouseX-10, mouseY);
                ctx.moveTo(mouseX+10, mouseY); ctx.lineTo(mouseX+24, mouseY);
                ctx.moveTo(mouseX, mouseY-24); ctx.lineTo(mouseX, mouseY-10);
                ctx.moveTo(mouseX, mouseY+10); ctx.lineTo(mouseX, mouseY+24);
                ctx.strokeStyle = autoMode ? '#aaffaa' : '#cce5ff'; ctx.lineWidth = 2; ctx.stroke();

                ctx.beginPath(); ctx.arc(CENTER_X, CENTER_Y, 5, 0, 2 * Math.PI); ctx.fillStyle = '#b0e0ff'; ctx.shadowBlur = 15; ctx.fill();

                if (!gameActive && lives === 0) {
                    ctx.shadowBlur = 0; ctx.font = 'bold 40px "Courier New"'; ctx.fillStyle = '#ff4a6e'; ctx.shadowBlur = 40; ctx.shadowColor = '#ff0000';
                    ctx.fillText('GAME OVER', 200, 420); ctx.shadowBlur = 0;
                }

                if (autoMode && !attackMode) {
                    ctx.font = 'bold 28px "Courier New"'; ctx.fillStyle = '#aaffaa'; ctx.shadowBlur = 20;
                    ctx.fillText('AUTO', 20, 120);
                }
            }

            function handleMouseMove(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
                const rawX = (e.clientX - rect.left) * scaleX, rawY = (e.clientY - rect.top) * scaleY;
                mouseX = Math.min(W - 5, Math.max(5, rawX)); mouseY = Math.min(H - 5, Math.max(5, rawY));
            }

            function handleMouseDown(e) {
                e.preventDefault();
                if (!gameActive) return;
                if (attackMode) {
                    if (!isInsideWorld(mouseX, mouseY, 0) && targetPoints.length < MAX_TARGETS) {
                        targetPoints.push({ x: mouseX, y: mouseY });
                    }
                } else {
                    mousePressed = true;
                    turrets.forEach(t => t.lastFireTime = performance.now() - FIRE_INTERVAL_MS * 1.5);
                }
            }

            function handleMouseUp() { mousePressed = false; }
            function handleRightClick(e) {
                e.preventDefault();
                if (!gameActive || attackMode) return;
                fireManualMissile(mouseX, mouseY);
            }

            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mouseup', handleMouseUp);
            canvas.addEventListener('contextmenu', handleRightClick);
            canvas.addEventListener('mouseleave', () => { mousePressed = false; });
            window.addEventListener('mouseup', handleMouseUp);

            restartBtn.addEventListener('click', resetGame);

            resetGame();
            function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
            gameLoop();

        } catch (error) { console.error('游戏初始化失败:', error); alert('游戏加载失败: ' + error.message); }
    })();
</script>
</body>
</html>
